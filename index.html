// Update a numeric / string setting with validation and re-render.
function updateSetting(key, value) {
  const limits = SETTING_LIMITS[key];
  if (limits) {
    if (limits.min !== undefined && value < limits.min) value = limits.min;
    if (limits.max !== undefined && value > limits.max) value = limits.max;
    if (limits.options && !limits.options.includes(value)) {
      console.warn(`Invalid value for ${key}:`, value);
      return;
    }
  }
  state.settings[key] = value;
  saveState();
  playClick();

  // Apply side-effects immediately
  if (key === 'theme') {
    applyTheme();
  }

  // Update the visible display for sliders without a full re-render
  if (key === 'passMark') {
    const el = document.getElementById('passmark-value');
    if (el) el.textContent = value + '%';
    return;
  }

  // Re-render settings view to reflect segmented/toggle changes
  renderSettings();
}

function toggleSetting(key) {
  state.settings[key] = !state.settings[key];
  saveState();
  playClick();
  renderSettings();
}

// Apply theme based on settings (used by theme: 'light' | 'dark' | 'auto')
function applyTheme() {
  let target = state.settings.theme;
  if (target === 'auto') {
    target = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  state.theme = target;
  document.documentElement.setAttribute('data-theme', target);
  const lightIcon = document.querySelector('.theme-icon-light');
  const darkIcon = document.querySelector('.theme-icon-dark');
  if (lightIcon) lightIcon.classList.toggle('hidden', target === 'dark');
  if (darkIcon) darkIcon.classList.toggle('hidden', target === 'light');
}

  const container = document.getElementById('progress-content');

    gold: ACHIEVEMENTS.filter(a => a.tier === 'gold'),
    silver: ACHIEVEMENTS.filter(a => a.tier === 'silver'),
    bronze: ACHIEVEMENTS.filter(a => a.tier === 'bronze')
  };

  const renderBadge = (a) => {
    const unlocked = isAchievementUnlocked(a.id);
    const unlockedData = state.achievements.find(x => x.id === a.id);
    const unlockedDate = unlockedData ? new Date(unlockedData.unlockedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    return `
      <div class="badge-card tier-${a.tier} ${unlocked ? 'unlocked' : 'locked'}" title="${a.description}">

// ========== PRACTICE HISTORY TIMELINE ==========
// Current timeline filters (in-memory, not persisted)
let _timelineFilters = {
  dateRange: 'all',  // 'all', 'today', 'week', 'month'
  scoreRange: 'all', // 'all', 'high' (85+), 'mid' (70-84), 'low' (<70)
  expandedEntry: null // index of entry currently expanded
};

function filterTimelineEntries() {
  const now = Date.now();
  const ranges = {
    today: 86400000,
    week: 7 * 86400000,
    month: 30 * 86400000
  };
  const cutoff = ranges[_timelineFilters.dateRange];

  return [...state.practiceLog].reverse().filter(entry => {
    // Date filter
    if (cutoff) {
      const entryTime = new Date(entry.date).getTime();
      if (now - entryTime > cutoff) return false;
    }
    // Score filter
    if (_timelineFilters.scoreRange === 'high' && entry.score < 85) return false;
    if (_timelineFilters.scoreRange === 'mid' && (entry.score < 70 || entry.score >= 85)) return false;
    if (_timelineFilters.scoreRange === 'low' && entry.score >= 70) return false;
    return true;
  });
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  if (!container) return;

  const allEntries = state.practiceLog.length;
  if (allEntries === 0) {
    container.innerHTML = `
      <p style="font-size:0.85rem;color:var(--text-muted);text-align:center;padding:1rem 0">
        Your practice history will appear here as you complete lessons.
      </p>
    `;
    return;
  }

  const filtered = filterTimelineEntries();
  const f = _timelineFilters;

  // Filter controls
  const dateOptions = [
    { key: 'all', label: 'All Time' },
    { key: 'today', label: 'Today' },
    { key: 'week', label: 'This Week' },
    { key: 'month', label: 'Past Month' }
  ];
  const scoreOptions = [
    { key: 'all', label: 'Any Score' },
    { key: 'high', label: '85+ (Mastery)' },
    { key: 'mid', label: '70–84' },
    { key: 'low', label: 'Below 70' }
  ];

  container.innerHTML = `
    <div class="timeline-filters">
      <div class="timeline-filter-row">
        <div class="timeline-filter-label">Date</div>
        <div class="segmented" style="max-width:none">
          ${dateOptions.map(o => `
            <button class="${f.dateRange === o.key ? 'active' : ''}"
              onclick="setTimelineFilter('dateRange', '${o.key}')">${o.label}</button>
          `).join('')}
        </div>
      </div>
      <div class="timeline-filter-row">
        <div class="timeline-filter-label">Score</div>
        <div class="segmented" style="max-width:none">
          ${scoreOptions.map(o => `
            <button class="${f.scoreRange === o.key ? 'active' : ''}"
              onclick="setTimelineFilter('scoreRange', '${o.key}')">${o.label}</button>
          `).join('')}
        </div>
      </div>
      <div class="timeline-count">
        ${filtered.length} of ${allEntries} ${filtered.length === 1 ? 'session' : 'sessions'}
      </div>
    </div>

    ${filtered.length === 0 ? `
      <p style="font-size:0.85rem;color:var(--text-muted);text-align:center;padding:1.5rem 0">
        No sessions match these filters. Try broadening your selection.
      </p>
    ` : `
      <div class="timeline-list">
        ${filtered.slice(0, 50).map((entry, idx) => {
          const d = new Date(entry.date);
          const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          const scoreTier = entry.score >= 85 ? 'high' : entry.score >= 70 ? 'mid' : 'low';
          const isExpanded = f.expandedEntry === idx;
          const truncatedPrompt = (entry.prompt || '').length > 70
            ? entry.prompt.substring(0, 70) + '…'
            : (entry.prompt || '');
          return `
            <div class="timeline-entry tier-${scoreTier}" onclick="toggleTimelineEntry(${idx})">
              <div class="timeline-entry-date-col">
                <div class="timeline-entry-weekday">${dateStr}</div>
                <div class="timeline-entry-time">${timeStr}</div>
              </div>
              <div class="timeline-entry-content">
                <div class="timeline-entry-title">${entry.lessonTitle}</div>
                ${truncatedPrompt ? `<div class="timeline-entry-prompt">"${truncatedPrompt}"</div>` : ''}
                ${isExpanded && entry.response ? `
                  <div class="timeline-entry-response">
                    <div class="timeline-entry-response-label">Your Response</div>
                    ${entry.response}
                  </div>
                ` : ''}
              </div>
              <div class="timeline-entry-score-col">
                <div class="timeline-entry-score">${entry.score}</div>
                <div class="timeline-entry-score-max">/100</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      ${filtered.length > 50 ? `
        <p style="font-size:0.72rem;color:var(--text-muted);text-align:center;margin-top:0.5rem">
          Showing most recent 50 of ${filtered.length} matching sessions
        </p>
      ` : ''}
    `}
  `;
  lucide.createIcons();
}

function setTimelineFilter(key, value) {
  playClick();
  _timelineFilters[key] = value;
  _timelineFilters.expandedEntry = null; // Reset expansion when filters change
  renderTimeline();
}

function toggleTimelineEntry(idx) {
  playClick();
  _timelineFilters.expandedEntry = _timelineFilters.expandedEntry === idx ? null : idx;
  renderTimeline();
}

// ---------- SESSION HISTORY FEED ----------
// Ephemeral filter state — lives for the lifetime of the Progress view render.
const _historyFilters = {
  track: 'all',    // 'all' | '1' ... '6'
  range: 'all',    // 'all' | 'today' | 'week' | 'month'
  result: 'all',   // 'all' | 'pass' | 'fail' | 'mastery'
  mode: 'all'      // 'all' | 'practice' | 'drill'
};

function renderHistoryFilters() {
  const container = document.getElementById('history-filters');
  if (!container) return;
  const f = _historyFilters;
  const chip = (key, value, label) => `
    <button class="history-chip ${f[key] === value ? 'active' : ''}"
      onclick="setHistoryFilter('${key}','${value}')">${label}</button>
  `;
  container.innerHTML = `
    <div class="history-filter-row">
      <span class="history-filter-label">Track</span>
      ${chip('track', 'all', 'All')}
      ${TRACKS.map(t => chip('track', String(t.id), String(t.id))).join('')}
    </div>
    <div class="history-filter-row">
      <span class="history-filter-label">When</span>
      ${chip('range', 'all', 'All time')}
      ${chip('range', 'today', 'Today')}
      ${chip('range', 'week', '7 days')}
      ${chip('range', 'month', '30 days')}
    </div>
    <div class="history-filter-row">
      <span class="history-filter-label">Result</span>
      ${chip('result', 'all', 'Any')}
      ${chip('result', 'mastery', 'Mastery')}
      ${chip('result', 'pass', 'Passed')}
      ${chip('result', 'fail', 'Below pass')}
    </div>
    <div class="history-filter-row">
      <span class="history-filter-label">Type</span>
      ${chip('mode', 'all', 'All')}
      ${chip('mode', 'practice', 'Practice')}
      ${chip('mode', 'drill', 'Drill')}
    </div>
  `;
}

function setHistoryFilter(key, value) {
  _historyFilters[key] = value;
  renderHistoryFilters();
  renderHistoryList();
}

function filterHistoryEntries() {
  const f = _historyFilters;
  const passMark = (state.settings && state.settings.passMark) || 70;
  const masteryMark = Math.min(95, passMark + 15);
  const now = Date.now();
  const DAY = 86400000;
  return [...state.practiceLog].reverse().filter(entry => {
    if (f.track !== 'all' && String(entry.trackId) !== f.track) return false;
    if (f.mode !== 'all' && (entry.mode || 'practice') !== f.mode) return false;
    if (f.range !== 'all') {
      const age = now - new Date(entry.date).getTime();
      if (f.range === 'today' && age > DAY) return false;
      if (f.range === 'week' && age > 7 * DAY) return false;
      if (f.range === 'month' && age > 30 * DAY) return false;
    }
    if (f.result !== 'all') {
      const s = entry.score || 0;
      if (f.result === 'mastery' && s < masteryMark) return false;
      if (f.result === 'pass' && (s < passMark || s >= masteryMark)) return false;
      if (f.result === 'fail' && s >= passMark) return false;
    }
    return true;
  });
}

function renderHistoryList() {
  const container = document.getElementById('history-list');
  if (!container) return;
  const passMark = (state.settings && state.settings.passMark) || 70;
  const masteryMark = Math.min(95, passMark + 15);
  const entries = filterHistoryEntries();

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="history-empty">No sessions match your filters. Try widening the range.</div>
    `;
    return;
  }

  container.innerHTML = entries.map((entry, idx) => {
    // We pass the reversed-array index back through the handler so we can find
    // this exact log entry again. Since we reversed, translate to original index.
    const originalIdx = state.practiceLog.length - 1 - state.practiceLog.indexOf(entry);
    const realIdx = state.practiceLog.lastIndexOf(entry);

    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const score = entry.score || 0;
    const tierClass = score >= masteryMark ? 'mastery' : score >= passMark ? 'pass' : 'fail';
    const track = TRACKS.find(t => t.id === entry.trackId);
    const trackName = track ? track.name : '';
    const mode = entry.mode || 'practice';
    const promptSnippet = (entry.prompt || '').slice(0, 80) + ((entry.prompt && entry.prompt.length > 80) ? '…' : '');

    return `
      <button class="history-entry" onclick="openHistoryEntry(${realIdx})">
        <div class="history-score-pill history-score-${tierClass}">${score}</div>
        <div class="history-entry-body">
          <div class="history-entry-head">
            <span class="history-entry-title">${escapeHtmlSafe(entry.lessonTitle || 'Practice')}</span>
            ${mode === 'drill' ? '<span class="history-badge history-badge-drill">Drill</span>' : ''}
          </div>
          <div class="history-entry-meta">${escapeHtmlSafe(trackName)}${track ? ' · ' : ''}${dateStr} · ${timeStr}</div>
          ${promptSnippet ? `<div class="history-entry-prompt">"${escapeHtmlSafe(promptSnippet)}"</div>` : ''}
        </div>
        <i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-muted)"></i>
      </button>
    `;
  }).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Open a full-screen viewer for a specific log entry. Shows the prompt, response,
// score breakdown, signals, and lets the user reopen the lesson to re-attempt if wanted.
function openHistoryEntry(logIndex) {
  const entry = state.practiceLog[logIndex];
  if (!entry) return;
  playClick && playClick();

  const passMark = (state.settings && state.settings.passMark) || 70;
  const masteryMark = Math.min(95, passMark + 15);
  const score = entry.score || 0;
  const tier = score >= masteryMark ? { label: 'Mastery', color: 'var(--green)' }
    : score >= passMark ? { label: 'Passed', color: 'var(--teal)' }
    : { label: 'Below Pass', color: 'var(--orange)' };
  const d = new Date(entry.date);
  const dateStr = d.toLocaleString();
  const track = TRACKS.find(t => t.id === entry.trackId);

  const signalsHTML = (entry.signals || []).map(sig => {
    const t = sig.type || 'partial';
    const icon = t === 'hit' ? 'check' : t === 'partial' ? 'minus' : 'x';
    return `
      <div class="signal ${t}">
        <div class="signal-icon"><i data-lucide="${icon}" style="width:10px;height:10px"></i></div>
        <div class="signal-body">
          <div class="signal-text">${escapeHtmlSafe(sig.msg || '')}</div>

function renderXPChart() {

function renderScoreChart() {
  const canvas = document.getElementById('score-chart');
  if (!canvas || typeof Chart === 'undefined') return;
  if (scoreChartInstance) scoreChartInstance.destroy();

  const lessonIds = Object.keys(state.lessonScores);
  const labels = lessonIds.map(id => {
    const trackId = parseInt(id.split('-')[0]);
    const lessonIdx = parseInt(id.split('-')[1]) - 1;
    const track = TRACKS.find(t => t.id === trackId);
    const lesson = track?.lessons[lessonIdx];
    return lesson ? lesson.title : id;
  });
  const bests = lessonIds.map(id => state.lessonScores[id].best);
  const avgs = lessonIds.map(id => {
    const h = state.lessonScores[id].history || [];
    return h.length ? Math.round(h.reduce((a, b) => a + b, 0) / h.length) : 0;
  });

  const isDark = state.theme === 'dark';
  const textColor = isDark ? '#b0b0b0' : '#5a5a5a';
  const gridColor = isDark ? '#3a3a3a' : '#e2e1dd';

  scoreChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Personal Best',
          data: bests,
          backgroundColor: '#01696f',
          borderRadius: 4,
        },
        {
          label: 'Average',
          data: avgs,
          backgroundColor: '#e8762b',
          borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      },
      scales: {
        x: { ticks: { color: textColor, font: { size: 9 }, maxRotation: 45, minRotation: 45 }, grid: { display: false } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor }, beginAtZero: true, max: 100 }
      }
    }
  });
}

// ========== RENDER LESSON ==========
function openLesson(trackId, lessonIndex) {
  const lesson = getLessonData(trackId, lessonIndex);
  if (!lesson || !lesson.elements) {
    // Lesson content not yet populated — show placeholder
    document.getElementById('lesson-title').textContent = lesson ? lesson.title : 'Lesson';
    document.getElementById('lesson-subtitle').textContent = lesson ? lesson.subtitle : '';
    document.getElementById('lesson-steps').innerHTML = '';
    document.getElementById('lesson-content').innerHTML = `
      <div class="card" style="text-align:center;padding:2rem">
        <i data-lucide="construction" style="width:48px;height:48px;color:var(--text-muted);margin-bottom:1rem"></i>
        <h3 style="margin-bottom:0.5rem">Coming Soon</h3>
        <p style="color:var(--text-secondary)">This lesson's content is being prepared. Check back in a future update!</p>
        <button class="btn btn-secondary mt-2" onclick="navigate('tracks')">Back to Tracks</button>
      </div>
    `;
    return;
  }

  // Determine preview mode — locked lessons open as read-only previews
  const isPreview = !isLessonUnlocked(lesson.id);
  state.previewMode = isPreview;

  state.currentLesson = { trackId, lessonIndex, lesson };
  state.currentStep = 0;
  state.practiceText = '';
  clearInterval(state.timerInterval);

  // Show lesson title with preview badge when applicable
  const titleEl = document.getElementById('lesson-title');
  if (isPreview) {
    titleEl.innerHTML = `${lesson.title} <span class="preview-badge"><i data-lucide="lock" style="width:10px;height:10px"></i> Preview</span>`;
  } else {
    titleEl.textContent = lesson.title;
  }
  document.getElementById('lesson-subtitle').textContent = `Track ${trackId} · ${lesson.subtitle}`;

  renderLessonStep();
}

function renderLessonStep() {
  const { lesson } = state.currentLesson;
  const isPreview = state.previewMode;

  // In preview mode, only show Theory and Example steps — practice/scoring are locked
  const steps = isPreview
    ? ['Theory', 'Example']
    : ['Theory', 'Example', 'Practice', 'Evaluate', 'Score'];

  const stepsContainer = document.getElementById('lesson-steps');
  stepsContainer.innerHTML = steps.map((s, i) => `
    <div class="step-indicator ${i === state.currentStep ? 'active' : i < state.currentStep ? 'completed' : ''}">
      ${i < state.currentStep ? '<i data-lucide="check" style="width:12px;height:12px"></i>' : ''}
      ${s}
    </div>
  `).join('');

  const content = document.getElementById('lesson-content');

  // Preview banner shown above content
  const previewBanner = isPreview ? `
    <div class="preview-banner">
      <i data-lucide="lock" style="width:16px;height:16px"></i>
      <div class="preview-banner-body">
        <strong>Preview mode</strong>
        <p>You're previewing a locked lesson. Complete the previous lessons to unlock practice and scoring.</p>
      </div>
    </div>
  ` : '';

  switch (state.currentStep) {
    case 0:
      content.innerHTML = previewBanner;
      renderTheory(content, lesson, true);
      break;
    case 1:
      content.innerHTML = previewBanner;
      renderExample(content, lesson, true);
      break;
    case 2:
      if (isPreview) {
        // Shouldn't be reachable, but guard just in case
        content.innerHTML = previewBanner;
        break;
      }
      renderPractice(content, lesson);
      break;
    case 3: renderChecklist(content, lesson); break;
    case 4: renderScore(content, lesson); break;
  }

  lucide.createIcons();
}

// Normalize prompt (supports both legacy string format and new {text, modelResponse} format)
function normalizePrompt(p) {
  if (typeof p === 'string') return { text: p, modelResponse: null };
  return p;
}

// Get all prompts for a lesson: built-in + custom
function getLessonPrompts(lesson) {
  const custom = state.customPrompts[lesson.id] || [];
  return [...lesson.prompts, ...custom];
}

// Pick a random prompt object from a lesson (includes custom prompts).
// When a lessonId is given, avoid prompts already used in the user's recent
// attempts (the rolling window used for multi-attempt progression).
function pickRandomPrompt(lesson) {
  const all = getLessonPrompts(lesson);
  const usedTexts = getRecentlyUsedPromptTexts(lesson.id);
  // Exclude any prompts the user has already used in the current rolling window
  const available = all.filter(p => !usedTexts.includes(normalizePrompt(p).text));
  // If all prompts have been used (e.g. fewer prompts than attempts required),
  // fall back to the full pool so practice can continue
  const pool = available.length > 0 ? available : all;
  const raw = pool[Math.floor(Math.random() * pool.length)];
  return normalizePrompt(raw);
}

// ========== MULTI-ATTEMPT PROGRESSION HELPERS ==========
// How many attempts must average the pass mark before a lesson unlocks the next one.
function getRequiredAttempts() {
  const n = (state.settings && state.settings.practiceAttempts) || 3;
  return Math.max(1, Math.min(5, n));
}

// Returns the prompt texts used in the user's last `N-1` practice log entries
// for a specific lesson, so we can exclude them from the next prompt pick.
function getRecentlyUsedPromptTexts(lessonId) {
  const required = getRequiredAttempts();
  // We want the user to see a different prompt for each of their next `required` attempts.
  // So track the last `required - 1` prompts they've attempted on this lesson.
  const excludeCount = Math.max(0, required - 1);
  if (excludeCount === 0) return [];

  const texts = [];
  for (let i = state.practiceLog.length - 1; i >= 0 && texts.length < excludeCount; i--) {
    const entry = state.practiceLog[i];
    if (entry.lessonId !== lessonId) continue;
    if (!entry.prompt) continue;
    if (!texts.includes(entry.prompt)) texts.push(entry.prompt);
  }
  return texts;
}

// Compute the user's rolling-average score for a lesson using the last N attempts.
// Returns null if the user has no attempts at all.
function getRollingAverage(lessonId) {
  const scores = (state.lessonScores[lessonId] && state.lessonScores[lessonId].history) || [];
  if (scores.length === 0) return null;
  const required = getRequiredAttempts();
  const lastN = scores.slice(-required);
  const sum = lastN.reduce((a, b) => a + b, 0);
  return {
    avg: Math.round(sum / lastN.length),
    count: lastN.length,
    required,
    complete: lastN.length >= required
  };
}

// ========== CUSTOM PROMPTS ==========
function addCustomPrompt(lessonId, text) {
  const trimmed = (text || '').trim();
  if (trimmed.length < 5) {
    showToast('Prompt must be at least 5 characters long');
    return false;
  }
  if (!state.customPrompts[lessonId]) state.customPrompts[lessonId] = [];
  state.customPrompts[lessonId].push({
    text: trimmed,
    modelResponse: null,
    isCustom: true
  });
  saveState();
  checkAchievements();
  return true;
}

function deleteCustomPrompt(lessonId, index) {
  if (!state.customPrompts[lessonId]) return;
  state.customPrompts[lessonId].splice(index, 1);
  if (state.customPrompts[lessonId].length === 0) {
    delete state.customPrompts[lessonId];
  }
  saveState();
}

function renderPractice(container, lesson) {

    promptObj = pickRandomPrompt(lesson);

  state.currentPrompt = promptObj; // Store full object (text + modelResponse)
  state.timerSeconds = 0;
  state.practiceStartTime = Date.now();
  state.usedSpeech = false;
  state.inputMode = (state.settings && state.settings.defaultInputMode) || 'typing';
  clearAudioRecording();

  const effectiveLimit = getEffectiveTimeLimit(lesson);
  const showGhost = state.settings && state.settings.showFrameworkGhost;

  container.innerHTML = `
    <div class="practice-area">
      <div class="practice-area-header">
        <h3>Your Turn</h3>
        <button class="focus-mode-btn" onclick="toggleFocusMode()" title="Focus Mode — hide everything except the practice area">
          <i data-lucide="maximize-2" style="width:14px;height:14px"></i>

          <i data-lucide="clock" style="width:18px;height:18px"></i>

          <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted)">/ ${formatTime(effectiveLimit)}</span>
        </div>
        <div class="word-count" id="word-count">0 words · ~0s speaking</div>
      </div>
      <div class="practice-input-area">
        <textarea class="practice-textarea" id="practice-input"
          placeholder=""
          oninput="updateWordCount(); updateGhostVisibility()" autofocus></textarea>
        <button class="record-btn" id="record-btn" onclick="toggleAudioRecording()" title="Record audio (will save so you can listen back)">
          <i data-lucide="circle" style="width:20px;height:20px;fill:currentColor"></i>
        </button>
        <button class="mic-btn" id="mic-btn" onclick="toggleSpeechRecognition()" title="Transcribe speech (no audio saved)">
          <i data-lucide="mic" style="width:20px;height:20px"></i>
        </button>
        ${showGhost ? `
          <div id="framework-ghost" class="framework-ghost">
            ${lesson.elements.map(el => `<span style="color:var(${getElementColorVar(el.color)})">[${el.name}] ${el.desc}</span>`).join('')}
          </div>
        ` : ''}
      </div>
      <div class="mic-status" id="mic-status"></div>

      display.textContent = formatTime(state.timerSeconds);
      // Color coding based on effective time
      const ratio = state.timerSeconds / effectiveLimit;
      timerEl.className = 'timer' + (ratio > 1.3 ? ' danger' : ratio > 1 ? ' warning' : '');
    }
  }, 1000);
}

// ========== FOCUS MODE ==========
// Minimal distraction mode: hides nav, lesson header, step indicators, and non-essential UI.
// Keeps only the prompt, timer, text area, and submit button visible.
function toggleFocusMode() {
  const isEnabled = document.body.classList.toggle('focus-mode');
  playClick();
  if (isEnabled) {
    // Show an exit button as a floating element
    const exitBtn = document.createElement('button');
    exitBtn.className = 'focus-exit-btn';
    exitBtn.id = 'focus-exit-btn';
    exitBtn.innerHTML = '<i data-lucide="minimize-2" style="width:16px;height:16px"></i> Exit Focus';
    exitBtn.onclick = toggleFocusMode;
    document.body.appendChild(exitBtn);
    lucide.createIcons();
    // Auto-focus the textarea so the user can start typing immediately
    setTimeout(() => {
      const input = document.getElementById('practice-input');
      if (input) input.focus();
    }, 100);
  } else {
    const exitBtn = document.getElementById('focus-exit-btn');
    if (exitBtn) exitBtn.remove();
  }
}

function exitFocusModeIfActive() {
  if (document.body.classList.contains('focus-mode')) {
    toggleFocusMode();
  }
}

function updateWordCount() {
  const text = document.getElementById('practice-input').value;
  state.practiceText = text;
  const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
  const speakingSeconds = Math.round(words / 2.5); // ~150 words per minute = 2.5 per second
  document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''} · ~${speakingSeconds}s speaking`;
}

function submitPractice() {
  clearInterval(state.timerInterval);
  stopSpeechRecognition();
  stopAudioRecording();
  exitFocusModeIfActive();
  state.totalPracticeSeconds += state.timerSeconds;
  nextStep();
}

// ========== SPEECH-TO-TEXT ==========
let speechRecognition = null;
let isRecording = false;

function getSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  return recognition;
}

function toggleSpeechRecognition() {
  if (isRecording) {
    stopSpeechRecognition();
  } else {
    startSpeechRecognition();
  }
}

function startSpeechRecognition() {
  const recognition = getSpeechRecognition();
  if (!recognition) {
    const status = document.getElementById('mic-status');
    if (status) { status.textContent = 'Speech recognition not supported in this browser'; }
    return;
  }

  speechRecognition = recognition;
  isRecording = true;
  state.usedSpeech = true;
  state.inputMode = 'speaking';

  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  if (micBtn) micBtn.classList.add('recording');
  if (micStatus) { micStatus.textContent = 'Listening...'; micStatus.classList.add('active'); }

  let finalTranscript = document.getElementById('practice-input').value;

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += (finalTranscript.length > 0 ? ' ' : '') + transcript.trim();
      } else {
        interim = transcript;
      }
    }
    const input = document.getElementById('practice-input');
    if (input) {
      input.value = finalTranscript + (interim ? ' ' + interim : '');
      state.practiceText = input.value;
      updateWordCount();
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed') {
      if (micStatus) { micStatus.textContent = 'Microphone access denied. Check browser permissions.'; micStatus.classList.remove('active'); }
    } else if (event.error !== 'aborted') {
      if (micStatus) { micStatus.textContent = 'Error: ' + event.error; micStatus.classList.remove('active'); }
    }
    stopSpeechRecognition();
  };

  recognition.onend = () => {
    // Auto-restart if still in recording mode (handles browser auto-stop)
    if (isRecording) {
      try { recognition.start(); } catch(e) { stopSpeechRecognition(); }
    }
  };

  try { recognition.start(); } catch(e) { stopSpeechRecognition(); }
}

function stopSpeechRecognition() {
  isRecording = false;
  if (speechRecognition) {
    try { speechRecognition.stop(); } catch(e) {}
    speechRecognition = null;
  }
  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  if (micBtn) micBtn.classList.remove('recording');
  if (micStatus) { micStatus.textContent = ''; micStatus.classList.remove('active'); }
}

// ========== AUDIO RECORDING ==========
let mediaRecorder = null;
let audioChunks = [];
let audioStream = null;
let isAudioRecording = false;

function toggleAudioRecording() {
  if (isAudioRecording) {
    stopAudioRecording();
  } else {
    startAudioRecording();
  }
}

async function startAudioRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('Audio recording not supported in this browser');
    return;
  }
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    showToast('Microphone access denied');
    return;
  }

  audioChunks = [];
  try {
    mediaRecorder = new MediaRecorder(audioStream);
  } catch (e) {
    showToast('Audio recording failed to start');
    audioStream.getTracks().forEach(t => t.stop());
    audioStream = null;
    return;
  }

  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    state.lastAudioBlob = blob;
    state.lastAudioURL = URL.createObjectURL(blob);
    if (audioStream) {
      audioStream.getTracks().forEach(t => t.stop());
      audioStream = null;
    }
  };

  mediaRecorder.start();
  isAudioRecording = true;

  // Also start speech recognition in parallel so we get transcript for scoring
  startSpeechRecognition();

  const recordBtn = document.getElementById('record-btn');
  const micStatus = document.getElementById('mic-status');
  if (recordBtn) recordBtn.classList.add('recording');
  if (micStatus) { micStatus.textContent = 'Recording audio + transcribing...'; micStatus.classList.add('active'); }
}

function stopAudioRecording() {
  isAudioRecording = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch (e) {}
  }
  stopSpeechRecognition();
  const recordBtn = document.getElementById('record-btn');
  if (recordBtn) recordBtn.classList.remove('recording');
}

// Clear previous audio when starting a new practice session
function clearAudioRecording() {
  if (state.lastAudioURL) {
    try { URL.revokeObjectURL(state.lastAudioURL); } catch (e) {}
  }
  state.lastAudioBlob = null;
  state.lastAudioURL = null;
}

// Detect whether a framework element is present in the response.
// Returns { found, reason, evidence } — evidence is a short quote when possible.
function detectElement(element, lower, sentences, rawText) {
  const elLower = element.name.toLowerCase();
  const cleanName = elLower.replace(/\s*\(.*?\)/g, '').trim();

  // 1. Exact name match (rare but clear)
  if (cleanName.length > 4 && lower.includes(cleanName)) {
    return { found: true, reason: `Mentions "${cleanName}"`, evidence: cleanName };
  }

  // 2. Semantic patterns by element keyword
  const patterns = ELEMENT_PATTERNS[cleanName];
  if (patterns) {
    for (const p of patterns) {
      const match = rawText.match(p);
      if (match) {
        return { found: true, reason: `Pattern detected`, evidence: match[0].trim() };
      }
    }
  }

  // 3. Description keyword match (fallback)
  const STOPWORDS = new Set(['state','give','provide','explain','your','make','their','what','when','where','about','show','know','with','from','then','they','them','this','that','which','would','could','should','clearly','concrete','specific','clear']);
  const descWords = element.desc.toLowerCase()
    .replace(/[^\w\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 4 && !STOPWORDS.has(w));
  const hits = descWords.filter(w => lower.includes(w));
  if (hits.length >= 1) {
    return { found: true, reason: `Description concepts covered`, evidence: hits.slice(0, 3).join(', ') };
  }

  return { found: false };
}

// Return a short quoted snippet from text near a specific index or around a pattern match.
function quoteAround(text, pattern, maxLen) {
  maxLen = maxLen || 80;
  const match = text.match(pattern);
  if (!match) return '';
  const start = Math.max(0, match.index - 20);
  const end = Math.min(text.length, match.index + match[0].length + 40);
  let snippet = text.substring(start, end).trim();
  if (start > 0) snippet = '…' + snippet;
  if (end < text.length) snippet = snippet + '…';
  return snippet.length > maxLen ? snippet.substring(0, maxLen) + '…' : snippet;
}

function trimQuote(text, maxLen) {
  maxLen = maxLen || 100;
  const t = text.trim();
  return t.length > maxLen ? t.substring(0, maxLen) + '…' : t;
}

function autoScoreResponse(text, lesson, timeSpent, inputMode) {
  // inputMode: 'typing' (default) or 'speaking'. Pace targets differ by mode.
  inputMode = inputMode || 'typing';
  const result = {
    structure: 0,
    clarity: 0,
    depth: 0,
    completion: 10, // Always awarded for submitting
    signals: []     // Human-readable signals with evidence & suggestions
  };

  if (!text || text.trim().length < 10) {
    result.signals.push({
      type: 'miss',
      category: 'structure',
      msg: 'Response was too short to evaluate.',
      suggestion: 'Aim for at least 3–4 complete sentences that hit each framework element.'
    });
    return result;
  }

  const raw = text.trim();
  const lower = raw.toLowerCase();
  const words = raw.split(/\s+/).filter(w => w.length > 0);
  const wordCount = words.length;
  const sentences = raw.match(/[^.!?]+[.!?]+/g) || [raw];
  const sentenceCount = sentences.length;
  const firstSentence = (sentences[0] || '').trim();
  const lastSentence = (sentences[sentences.length - 1] || '').trim();

  // ===== STRUCTURE SCORE (0-40) — more generous, evidence-based =====
  const numElements = lesson.elements.length;
  const isSpeechMode = inputMode === 'speaking';

  // 1. Base content credit (up to 12 pts) — rewards genuine effort
  // Speech-transcribed text has no punctuation, so we can't rely on sentence count.
  // In speech mode, give full credit based on word count alone.
  if (wordCount >= 30 && (isSpeechMode || sentenceCount >= 2)) {
    result.structure += 12;
    result.signals.push({
      type: 'hit',
      category: 'structure',
      msg: isSpeechMode
        ? `Substantive spoken response (${wordCount} words).`
        : `Substantive response (${wordCount} words, ${sentenceCount} sentences).`,
      quote: trimQuote(firstSentence, 100)
    });
  } else if (wordCount >= 20) {
    result.structure += 8;
    result.signals.push({
      type: 'partial',
      category: 'structure',
      msg: `Decent effort (${wordCount} words) — but try to add a bit more detail.`,
      suggestion: 'Aim for 40+ words so you have room for all framework elements.'
    });
  } else if (wordCount >= 10) {
    result.structure += 4;
    result.signals.push({
      type: 'miss',
      category: 'structure',
      msg: `Response is short (${wordCount} words).`,
      suggestion: 'Strong responses to this lesson usually run 40–80 words.'
    });
  }

  // 2. Strong opening (up to 8 pts)
  const openingFillers = /^(so|um|uh|well|ok|okay|alright|like|actually|basically|kind\s+of|sort\s+of)\b/i;
  const firstWords = firstSentence.split(/\s+/).filter(w => w.length > 0).length;
  if (firstWords >= 6 && !openingFillers.test(firstSentence)) {
    result.structure += 8;
    result.signals.push({
      type: 'hit',
      category: 'structure',
      msg: 'Strong opening — you led with substance, not filler.',
      quote: trimQuote(firstSentence, 100)
    });
  } else if (firstWords >= 4 && !openingFillers.test(firstSentence)) {
    result.structure += 5;
    result.signals.push({
      type: 'partial',
      category: 'structure',
      msg: 'Your opening is OK but could be more assertive.',
      quote: trimQuote(firstSentence, 100),
      suggestion: 'Try starting with your main point: "The key issue is…", "I recommend…", "My position is…"'
    });
  } else {
    result.structure += 2;
    result.signals.push({
      type: 'miss',
      category: 'structure',
      msg: 'Weak opening — avoid filler words at the start.',
      quote: trimQuote(firstSentence, 100),
      suggestion: 'Replace fillers with a direct opener: "The biggest challenge is…" or "Yes, and here\'s why…"'
    });
  }

  // 3. Framework element coverage (up to 15 pts)
  const elementResults = lesson.elements.map(el => ({
    element: el,
    detection: detectElement(el, lower, sentences, raw)
  }));
  const elementsCovered = elementResults.filter(r => r.detection.found).length;
  const elementPts = Math.round((elementsCovered / numElements) * 15);
  result.structure += elementPts;

  if (elementsCovered === numElements) {
    result.signals.push({
      type: 'hit',
      category: 'structure',
      msg: `All ${numElements} framework elements detected.`,
      quote: elementResults.filter(r => r.detection.evidence).map(r => `"${r.element.name}" → ${r.detection.evidence}`).slice(0, 2).join('  ·  ')
    });
  } else if (elementsCovered > 0) {
    const missing = elementResults.filter(r => !r.detection.found).map(r => r.element.name);
    result.signals.push({
      type: 'partial',
      category: 'structure',
      msg: `Detected ${elementsCovered}/${numElements} framework elements. Missing: ${missing.join(', ')}.`,
      suggestion: elementResults.filter(r => !r.detection.found)[0]
        ? `For "${elementResults.filter(r => !r.detection.found)[0].element.name}": ${elementResults.filter(r => !r.detection.found)[0].element.desc}`
        : null
    });
  } else {
    result.signals.push({
      type: 'miss',
      category: 'structure',
      msg: `None of the ${numElements} framework elements were clearly present.`,
      suggestion: `Re-read the framework breakdown: ${lesson.elements.map(e => e.name).join(' → ')}`
    });
  }

  // 4. Closing / landing (up to 5 pts)
  const closingMarkers = /\b(so|therefore|that[' ]s\s+why|in\s+(?:summary|conclusion)|the\s+(?:bottom\s+line|point\s+is)|overall|to\s+(?:recap|summarize))\b/i;
  const lastWords = lastSentence.split(/\s+/).filter(w => w.length > 0).length;
  if (closingMarkers.test(lastSentence) && lastWords >= 5) {
    result.structure += 5;
    result.signals.push({
      type: 'hit',
      category: 'structure',
      msg: 'Clear landing — you ended with a deliberate conclusion.',
      quote: trimQuote(lastSentence, 100)
    });
  } else if (lastWords >= 8) {
    result.structure += 3;
    result.signals.push({
      type: 'partial',
      category: 'structure',
      msg: 'Ending has substance but no explicit conclusion marker.',
      quote: trimQuote(lastSentence, 100),
      suggestion: 'Land it with "So…", "Therefore…", or "The bottom line is…"'
    });
  } else {
    result.signals.push({
      type: 'miss',
      category: 'structure',
      msg: 'Your ending trails off instead of landing a clear conclusion.',
      quote: trimQuote(lastSentence, 100),
      suggestion: 'End on a strong closing line: "That\'s why this matters." or "So the answer is X."'
    });
  }

  result.structure = Math.min(40, result.structure);

  // ===== CLARITY SCORE (0-30) — evidence-based, more generous =====

  // 1. Time adherence to target (up to 10 pts) — respects timer multiplier setting
  const effectiveLimit = getEffectiveTimeLimit(lesson);
  const timeRatio = timeSpent > 0 ? timeSpent / effectiveLimit : 0;
  const timeFormatted = `${timeSpent}s of ${effectiveLimit}s target`;
  if (timeSpent === 0) {
    // No timing — skip
  } else if (timeRatio >= 0.80 && timeRatio <= 1.20) {
    result.clarity += 10;
    result.signals.push({
      type: 'hit',
      category: 'clarity',
      msg: `Excellent time management — ${timeFormatted}.`
    });
  } else if (timeRatio >= 0.60 && timeRatio <= 1.40) {
    result.clarity += 7;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: `Time is close to target — ${timeFormatted}.`,
      suggestion: 'Aim for within 20% of the target (so ±12s for a 60s lesson).'
    });
  } else if (timeRatio >= 0.40 && timeRatio <= 1.60) {
    result.clarity += 4;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: `Time is off target — ${timeFormatted}.`,
      suggestion: timeRatio < 1 ? 'Slow down and expand your points.' : 'Tighten by removing secondary details.'
    });
  } else {
    result.clarity += 1;
    result.signals.push({
      type: 'miss',
      category: 'clarity',
      msg: `Time way off target — ${timeFormatted}.`,
      suggestion: timeRatio < 0.4 ? 'Your response was rushed — try to fill closer to the target time.' : 'Your response ran long — practice editing down to essentials.'
    });
  }

  // 2. Pace — words per minute (up to 7 pts), mode-aware
  const wpm = timeSpent > 0 ? Math.round((wordCount / timeSpent) * 60) : 0;
  result.wpm = wpm;
  result.inputMode = inputMode;

  const paceTargets = inputMode === 'speaking'
    ? { idealLow: 130, idealHigh: 160, okLow: 110, okHigh: 180, rangeLow: 60, rangeHigh: 240, label: '130-160 wpm', noun: 'speaking pace' }
    : { idealLow: 25,  idealHigh: 50,  okLow: 15,  okHigh: 70,  rangeLow: 5,  rangeHigh: 90,  label: '25-50 wpm',  noun: 'typing pace'   };
  result.paceTargets = paceTargets;

  if (wpm === 0) {
    // No time spent — can't score pace
  } else if (wpm >= paceTargets.idealLow && wpm <= paceTargets.idealHigh) {
    result.clarity += 7;
    result.signals.push({
      type: 'hit',
      category: 'clarity',
      msg: `Ideal ${paceTargets.noun} (${wpm} wpm) — natural and considered.`
    });
  } else if (wpm >= paceTargets.okLow && wpm <= paceTargets.okHigh) {
    result.clarity += 5;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: `${paceTargets.noun.charAt(0).toUpperCase() + paceTargets.noun.slice(1)}: ${wpm} wpm — aim for ${paceTargets.label}.`
    });
  } else if (wpm < paceTargets.okLow) {
    result.clarity += 2;
    result.signals.push({
      type: 'miss',
      category: 'clarity',
      msg: `Pace is slow (${wpm} wpm).`,
      suggestion: inputMode === 'speaking'
        ? 'Speak with more urgency — 130-160 wpm feels natural to listeners.'
        : 'Type more freely — 25-50 wpm is a comfortable thinking pace.'
    });
  } else {
    result.clarity += 2;
    result.signals.push({
      type: 'miss',
      category: 'clarity',
      msg: `Pace is fast (${wpm} wpm).`,
      suggestion: inputMode === 'speaking'
        ? 'Slow down so listeners can follow — aim for 130-160 wpm.'
        : 'Slow down and think between points — aim for 25-50 wpm.'
    });
  }

  // 3. Filler word detection (up to 8 pts) — with evidence
  const fillerPatterns = [
    { pattern: /\bum\b/gi,        name: 'um' },
    { pattern: /\buh\b/gi,        name: 'uh' },
    { pattern: /\blike\b/gi,      name: 'like' },
    { pattern: /\byou know\b/gi,  name: 'you know' },
    { pattern: /\bsort of\b/gi,   name: 'sort of' },
    { pattern: /\bkind of\b/gi,   name: 'kind of' },
    { pattern: /\bbasically\b/gi, name: 'basically' },
    { pattern: /\bliterally\b/gi, name: 'literally' },
    { pattern: /\bactually\b/gi,  name: 'actually' },
    { pattern: /\bi mean\b/gi,    name: 'I mean' },
    { pattern: /\bjust\b/gi,      name: 'just' }
  ];
  const foundFillers = [];
  fillerPatterns.forEach(({ pattern, name }) => {
    const matches = raw.match(pattern);
    if (matches) foundFillers.push({ name, count: matches.length });
  });
  const fillerCount = foundFillers.reduce((s, f) => s + f.count, 0);
  const fillerPer20 = (fillerCount / Math.max(1, wordCount)) * 20;

  if (fillerCount === 0) {
    result.clarity += 8;
    result.signals.push({
      type: 'hit',
      category: 'clarity',
      msg: 'Minimal filler words — clean, direct delivery.'
    });
  } else if (fillerPer20 < 1) {
    result.clarity += 6;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: `Few filler words (${fillerCount} total).`,
      quote: foundFillers.slice(0, 3).map(f => `"${f.name}" ×${f.count}`).join(', ')
    });
  } else if (fillerPer20 < 2) {
    result.clarity += 3;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: `Some filler words detected (${fillerCount} in ${wordCount} words).`,
      quote: foundFillers.slice(0, 3).map(f => `"${f.name}" ×${f.count}`).join(', '),
      suggestion: 'Replace fillers with a short pause — they weaken perceived confidence.'
    });
  } else {
    result.clarity += 1;
    result.signals.push({
      type: 'miss',
      category: 'clarity',
      msg: `Too many filler words (${fillerCount}) — they dilute your message.`,
      quote: foundFillers.slice(0, 4).map(f => `"${f.name}" ×${f.count}`).join(', '),
      suggestion: 'Aim for zero fillers in structured responses. Pause instead of saying "um" or "like".'
    });
  }

  // 4. Sentence coherence (up to 5 pts) — more generous
  // For speech-mode responses, the transcript has no punctuation so sentence counting
  // is meaningless. Award full credit when we can't reliably judge.
  if (isSpeechMode && wordCount >= 15) {
    result.clarity += 5;
    result.signals.push({
      type: 'hit',
      category: 'clarity',
      msg: 'Spoken response — sentence structure not penalized (transcription has no punctuation).'
    });
  } else if (sentenceCount >= 2) {
    const lengths = sentences.map(s => s.trim().split(/\s+/).filter(w => w.length > 0).length);
    const avgLen = lengths.reduce((a, b) => a + b, 0) / lengths.length;
    if (avgLen >= 6 && avgLen <= 28) {
      result.clarity += 5;
      result.signals.push({
        type: 'hit',
        category: 'clarity',
        msg: `Good sentence structure (avg ${Math.round(avgLen)} words per sentence).`
      });
    } else if (avgLen >= 4) {
      result.clarity += 3;
      result.signals.push({
        type: 'partial',
        category: 'clarity',
        msg: `Sentences are ${avgLen < 6 ? 'very short' : 'very long'} (avg ${Math.round(avgLen)} words).`,
        suggestion: avgLen < 6 ? 'Combine short thoughts into fuller sentences.' : 'Break long sentences into shorter ones for clarity.'
      });
    }
  } else if (wordCount >= 15) {
    result.clarity += 2;
    result.signals.push({
      type: 'partial',
      category: 'clarity',
      msg: 'Response is one long sentence — break it into 2–3 sentences.',
      suggestion: 'Add periods to separate your thoughts — it makes structure visible.'
    });
  }

  result.clarity = Math.min(30, result.clarity);

  // ===== DEPTH SCORE (0-20) — evidence-based, more generous =====

  // 1. Quantitative evidence (up to 8 pts) — numbers, percentages, dollar amounts
  const numbers = raw.match(/\b\d+(?:\.\d+)?(?:%|k|K|m|M)?\b/g) || [];
  const dollars = raw.match(/\$[\d,]+(?:\.\d+)?[kKmM]?/g) || [];
  const percents = raw.match(/\b\d+(?:\.\d+)?%/g) || [];
  const allNums = [...new Set([...numbers, ...dollars, ...percents])];
  const totalNums = allNums.length;

  if (totalNums >= 3) {
    result.depth += 8;
    result.signals.push({
      type: 'hit',
      category: 'depth',
      msg: `Strong quantitative evidence (${totalNums} specific figures).`,
      quote: allNums.slice(0, 4).join(', ')
    });
  } else if (totalNums === 2) {
    result.depth += 6;
    result.signals.push({
      type: 'hit',
      category: 'depth',
      msg: `Specific numbers strengthen your point.`,
      quote: allNums.join(', ')
    });
  } else if (totalNums === 1) {
    result.depth += 4;
    result.signals.push({
      type: 'partial',
      category: 'depth',
      msg: `Includes one specific number (${allNums[0]}) — could use more.`,
      suggestion: 'Add one more data point to make your argument harder to dispute.'
    });
  } else {
    result.signals.push({
      type: 'miss',
      category: 'depth',
      msg: 'No numbers, percentages, or specific data.',
      suggestion: 'Add concrete figures: "grew by 23%", "$180K saved", "40 hours per week", "3 of 5 candidates".'
    });
  }

  // 2. Proper nouns — names, places, specific entities (up to 4 pts)
  const properNouns = raw.match(/\b[A-Z][a-z]{2,}\b/g) || [];
  const commonStarters = new Set([
    'The','This','That','These','Those','There','They','Their','Them','Then','Though',
    'When','Where','What','Why','How','Who','Which','While',
    'First','Second','Third','Next','Then','Finally','Lastly','Now',
    'But','And','For','So','Also','Because','Since','Still','Yes','No',
    'Our','Your','His','Her','Its','One','Two','Three','Four','Five'
  ]);
  const realProperNouns = [...new Set(properNouns.filter(n => !commonStarters.has(n)))];
  if (realProperNouns.length >= 2) {
    result.depth += 4;
    result.signals.push({
      type: 'hit',
      category: 'depth',
      msg: 'Names and specific entities add credibility.',
      quote: realProperNouns.slice(0, 4).join(', ')
    });
  } else if (realProperNouns.length === 1) {
    result.depth += 2;
  }

  // 3. Example markers / time references (up to 4 pts)
  const specificMarkersPatterns = [
    /\bfor\s+example\b/gi, /\bfor\s+instance\b/gi, /\bspecifically\b/gi,
    /\bsuch\s+as\b/gi, /\bin\s+particular\b/gi,
    /\blast\s+(?:year|quarter|month|week)\b/gi,
    /\brecent(?:ly)?\b/gi, /\bthis\s+(?:year|quarter|month|week)\b/gi
  ];
  const markerHits = [];
  specificMarkersPatterns.forEach(p => {
    const m = raw.match(p);
    if (m) markerHits.push(...m);
  });
  const uniqueMarkers = [...new Set(markerHits.map(m => m.toLowerCase()))];
  if (uniqueMarkers.length >= 2) {
    result.depth += 4;
    result.signals.push({
      type: 'hit',
      category: 'depth',
      msg: 'Concrete examples make your response memorable.',
      quote: uniqueMarkers.slice(0, 3).join(' · ')
    });
  } else if (uniqueMarkers.length === 1) {
    result.depth += 2;
    result.signals.push({
      type: 'partial',
      category: 'depth',
      msg: `Includes one example marker: "${uniqueMarkers[0]}".`,
      suggestion: 'Add more specific examples or time references ("for instance", "last quarter", "a recent case").'
    });
  } else {
    result.signals.push({
      type: 'miss',
      category: 'depth',
      msg: 'No example markers (e.g. "for example", "last quarter", "specifically").',
      suggestion: 'Anchor your argument with a recent real example: "For instance, last month we…"'
    });
  }

  // 4. Substantive length (up to 4 pts) — generous
  if (wordCount >= 50) {
    result.depth += 4;
  } else if (wordCount >= 30) {
    result.depth += 3;
  } else if (wordCount >= 20) {
    result.depth += 2;
  }

  result.depth = Math.min(20, result.depth);

  return result;
}

function calculateScore() {
  const { lesson } = state.currentLesson;

  // 1) APP AUTO-SCORE (primary) — pace is scored differently for typing vs. speaking
  const auto = autoScoreResponse(state.practiceText, lesson, state.timerSeconds, state.inputMode);

  // Apply difficulty multiplier to category sub-scores (easy = +10%, hard = -10%)
  const adjStructure = Math.min(40, applyDifficulty(auto.structure));
  const adjClarity = Math.min(30, applyDifficulty(auto.clarity));
  const adjDepth = Math.min(20, applyDifficulty(auto.depth));
  const appTotal = Math.min(100, adjStructure + adjClarity + adjDepth + auto.completion);

  // 2) SELF-ASSESSMENT SCORE (for reflection/comparison)
  let selfStructure = 0, selfClarity = 0, selfDepth = 0;
  lesson.checklist.forEach((item, i) => {
    const checkbox = document.getElementById(`check-${i}`);
    if (checkbox && checkbox.checked) {
      if (item.category === 'Structure') selfStructure += item.points;
      else if (item.category === 'Clarity') selfClarity += item.points;
      else if (item.category === 'Depth') selfDepth += item.points;
    }
  });
  const selfTotal = Math.min(100, selfStructure + selfClarity + selfDepth + 10);

  state.lastScore = {
    // App score (primary) — post-difficulty
    structure: adjStructure,
    clarity: adjClarity,
    depth: adjDepth,
    completion: auto.completion,
    total: appTotal,
    signals: auto.signals,
    wpm: auto.wpm || 0,
    inputMode: auto.inputMode || 'typing',
    paceTargets: auto.paceTargets,
    difficulty: (state.settings && state.settings.difficulty) || 'normal',
    // Self-assessment (for comparison)
    self: {
      structure: selfStructure,
      clarity: selfClarity,
      depth: selfDepth,
      total: selfTotal
    }
  };

  nextStep();
}

function renderScore(container, lesson) {
  const s = state.lastScore;
  const { trackId, lessonIndex } = state.currentLesson;
  const passMark = (state.settings && state.settings.passMark) || 70;
  // Mastery threshold scales with pass mark — 15 pts above the pass mark (capped at 95)
  const masteryMark = Math.min(95, passMark + 15);

  // Update state and check personal best
  const lessonId = lesson.id;
  const prevData = state.lessonScores[lessonId];
  const prevBest = prevData?.best || 0;
  const isNewBest = prevData && s.total > prevBest;
  const isFirstAttempt = !prevData;
  const attempts = (prevData?.attempts || 0) + 1;
  const history = prevData?.history ? [...prevData.history, s.total] : [s.total];
  const wasAlreadyCompleted = isLessonCompleted(lessonId);

  state.lessonScores[lessonId] = {
    best: Math.max(s.total, prevBest),
    attempts,
    history
  };

  // Log practice session — full record so History Feed can re-render the score screen
  state.practiceLog.push({
    lessonId,
    lessonTitle: lesson.title,
    lessonSubtitle: lesson.subtitle || '',
    trackId,
    lessonIndex,
    prompt: (state.currentPrompt && state.currentPrompt.text) || '',
    response: state.practiceText || '',
    score: s.total,
    structure: s.structure,
    clarity: s.clarity,
    depth: s.depth,
    completion: s.completion,
    signals: (s.signals || []).slice(0, 8), // cap per entry to avoid storage bloat
    wpm: s.wpm || 0,
    inputMode: s.inputMode || state.inputMode || 'typing',
    timeSpent: state.timerSeconds || 0,
    mode: 'practice', // practice | drill
    date: new Date().toISOString()
  });
  if (state.practiceLog.length > 200) state.practiceLog.shift(); // Larger cap now that we have history

  // Multi-attempt progression: the lesson unlocks the NEXT one once the rolling
  // average of the last N attempts meets the pass mark (N = practiceAttempts setting).
  // This means a single high score doesn't unlock — you must practice consistently.
  const rolling = getRollingAverage(lessonId);
  const passedThisAttempt = s.total >= passMark;
  const requiredAttempts = getRequiredAttempts();
  const sessionComplete = rolling && rolling.complete && rolling.avg >= passMark;

  // XP is awarded for every attempt scored at or above the pass mark (not just the unlocking attempt)
  // so users are rewarded for effort at each step.
  let trackJustCompleted = false;
  let dailyChallengeBonus = false;
  if (passedThisAttempt) {
    // Daily challenge awards 2x XP if this was the challenge
    const isDailyChallengeAttempt = state.dailyChallengeMode &&
      state.dailyChallenge && !state.dailyChallenge.completed &&
      state.dailyChallenge.trackId === trackId &&
      state.dailyChallenge.lessonIndex === lessonIndex;
    if (isDailyChallengeAttempt) {
      state.xp += s.total * 2;
      dailyChallengeBonus = true;
      completeDailyChallenge();
      state.dailyChallengeMode = false;
    } else {
      state.xp += s.total;
    }
    state.xpHistory.push({ date: new Date().toISOString().slice(0,10), xp: state.xp });
    if (state.xpHistory.length > 50) state.xpHistory.shift();
    updateLevel();
    updateStreak();
  }

  // Unlock next lesson only when the rolling-average session requirement is met
  if (sessionComplete && !wasAlreadyCompleted) {
    state.completedLessons[lessonId] = true;

    // Unlock next lesson in track
    const track = TRACKS.find(t => t.id === trackId);
    if (track && lessonIndex + 1 < track.lessons.length) {
      state.unlockedLessons[track.lessons[lessonIndex + 1].id] = true;
    }

    // Check if track is complete -> unlock next track + certificate
    if (track) {
      trackJustCompleted = checkTrackCompletion(trackId);
      const allComplete = track.lessons.every(l => isLessonCompleted(l.id));
      if (allComplete && trackId < TRACKS.length) {
        state.unlockedTracks[trackId + 1] = true;
        const nextTrack = TRACKS.find(t => t.id === trackId + 1);
        if (nextTrack && nextTrack.lessons.length > 0) {
          state.unlockedLessons[nextTrack.lessons[0].id] = true;
        }
      }
    }
  }

  // The "passed" state for UI purposes: either the session just completed OR the lesson was already completed
  const passed = sessionComplete || wasAlreadyCompleted;

  // Tier / message — takes the multi-attempt session into account
  let tier, tierClass, message;
  const justUnlocked = sessionComplete && !wasAlreadyCompleted;
  const needMoreAttempts = rolling && !rolling.complete;
  const attemptsDone = rolling ? rolling.count : 0;
  const rollingAvg = rolling ? rolling.avg : s.total;

  if (justUnlocked) {
    tier = "Session Complete!";
    tierClass = "green";
    message = `Your rolling average of the last ${requiredAttempts} attempts is ${rollingAvg}/100 — you passed! The next lesson is now unlocked.`;
  } else if (wasAlreadyCompleted && s.total >= masteryMark) {
    tier = "Mastery Achieved!";
    tierClass = "green";
    message = "Outstanding work! You've demonstrated strong command of this framework.";
  } else if (needMoreAttempts) {
    // User needs more attempts to complete the session
    tier = `Attempt ${attemptsDone} of ${requiredAttempts}`;
    tierClass = passedThisAttempt ? "teal" : "gold";
    const remaining = requiredAttempts - attemptsDone;
    message = `Rolling average so far: <strong>${rollingAvg}/100</strong>. Practice ${remaining} more time${remaining !== 1 ? 's' : ''} (with a different prompt) to complete this lesson.`;
  } else if (rolling && rolling.complete && rolling.avg < passMark) {
    // They've done enough attempts but average is below pass mark
    tier = "Keep Going";
    tierClass = "orange";
    const gap = passMark - rollingAvg;
    message = `Your rolling average of the last ${requiredAttempts} attempts is ${rollingAvg}. You need ${passMark}+ to unlock the next lesson. Keep practicing — each new attempt replaces your oldest in the rolling window.`;
  } else if (wasAlreadyCompleted) {
    // Lesson already completed, showing a score for a retry
    if (s.total >= passMark) {
      tier = "Strong Work";
      tierClass = "teal";
      message = `This lesson is already unlocked. Keep practicing to push your scores higher.`;
    } else {
      tier = "Below Pass Mark";
      tierClass = "gold";
      message = `You passed this lesson before but scored below your pass mark on this attempt. Try the feedback below to strengthen your response.`;
    }
  } else {
    // Shouldn't normally reach here, but defensive fallback
    tier = "Good Start";
    tierClass = "orange";
    message = "Every expert started here. Review the framework, then try again — you'll improve quickly.";
  }

  // Generate specific improvement tip based on weakest category
  let tip = '';
  if (!justUnlocked && (s.total < masteryMark)) {
    const weakest = [
      { cat: 'Structure', score: s.structure, max: 40, tip: 'Focus on hitting every element of the framework. Re-read the Theory card and check off each element as you write.' },
      { cat: 'Clarity', score: s.clarity, max: 30, tip: 'Work on pacing — aim to match the time target more closely. Practice reading your response aloud before submitting.' },
      { cat: 'Depth', score: s.depth, max: 20, tip: 'Add specifics: names, numbers, dates, or concrete examples. Replace vague phrases like "we improved things" with measurable details.' },
    ].sort((a, b) => (a.score / a.max) - (b.score / b.max));
    tip = `<strong>Tip to improve:</strong> ${weakest[0].tip}`;
  }

  // Personal best display
  let bestBadge = '';
  if (isNewBest) {
    bestBadge = `<div class="personal-best-badge new-best-anim"><i data-lucide="trophy" style="width:14px;height:14px"></i> New Personal Best! (was ${prevBest})</div>`;
  } else if (!isFirstAttempt) {
    bestBadge = `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.35rem">Personal best: ${state.lessonScores[lessonId].best} pts · Attempt #${attempts}</div>`;
  }

  // Build detailed feedback — grouped by category, with quotes and suggestions
  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderSignal(sig) {
    const icon = sig.type === 'hit' ? 'check' : sig.type === 'partial' ? 'minus' : 'x';
    return `
      <div class="signal ${sig.type}">
        <div class="signal-icon">
          <i data-lucide="${icon}" style="width:10px;height:10px"></i>
        </div>
        <div class="signal-body">
          <div class="signal-text">${escapeHtml(sig.msg)}</div>
          ${sig.quote ? `<div class="signal-quote">"${escapeHtml(sig.quote)}"</div>` : ''}
          ${sig.suggestion ? `<div class="signal-suggestion"><strong>Try:</strong> ${escapeHtml(sig.suggestion)}</div>` : ''}
        </div>
      </div>
    `;
  }

  let signalsHTML = '';
  if (s.signals && s.signals.length > 0) {
    const byCategory = {
      structure: s.signals.filter(sig => sig.category === 'structure'),
      clarity:   s.signals.filter(sig => sig.category === 'clarity'),
      depth:     s.signals.filter(sig => sig.category === 'depth'),
      other:     s.signals.filter(sig => !sig.category)
    };

    const categoryBlocks = [
      { key: 'structure', label: 'Structure',  score: s.structure, max: 40, icon: 'layout-grid' },
      { key: 'clarity',   label: 'Clarity',    score: s.clarity,   max: 30, icon: 'zap' },
      { key: 'depth',     label: 'Depth',      score: s.depth,     max: 20, icon: 'search' }
    ];

    signalsHTML = `
      <div class="score-signals">
        <div class="score-signals-title">Detailed Feedback</div>
        ${categoryBlocks.map(cat => {
          const sigs = byCategory[cat.key] || [];
          if (sigs.length === 0) return '';
          const pct = Math.round((cat.score / cat.max) * 100);
          return `
            <div class="signal-category">
              <div class="signal-category-header">
                <i data-lucide="${cat.icon}" style="width:13px;height:13px"></i>
                <span class="signal-category-label">${cat.label}</span>
                <span class="signal-category-score">${cat.score}/${cat.max}</span>
                <div class="signal-category-bar">
                  <div class="signal-category-fill" style="width:${pct}%;background:${pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--gold)' : 'var(--orange)'}"></div>
                </div>
              </div>
              ${sigs.map(renderSignal).join('')}
            </div>
          `;
        }).join('')}
        ${byCategory.other.length > 0 ? byCategory.other.map(renderSignal).join('') : ''}
      </div>
    `;
  }

  // Build self-assessment comparison (only if user filled in any checkboxes)
  let comparisonHTML = '';
  const self = s.self;
  const hasSelfAssessment = self && (self.structure > 0 || self.clarity > 0 || self.depth > 0);
  if (hasSelfAssessment) {
    const gap = self.total - s.total;
    let gapClass, gapLabel, insight;
    if (Math.abs(gap) <= 8) {
      gapClass = 'match';
      gapLabel = 'Aligned';
      insight = 'Your self-perception matches the app\'s evaluation — great self-awareness.';
    } else if (gap > 0) {
      gapClass = 'overestimate';
      gapLabel = `+${gap}`;
      insight = 'You rated yourself higher than the app did. Look at the signals above — there\'s room to tighten up your actual delivery.';
    } else {
      gapClass = 'underestimate';
      gapLabel = `${gap}`;
      insight = 'You rated yourself lower than the app did. You\'re being harder on yourself than the evidence suggests — trust your skills.';
    }
    comparisonHTML = `
      <div class="self-comparison">
        <div class="self-comparison-title">
          <i data-lucide="scale" style="width:12px;height:12px"></i>

  // Attempted prompt text (display at top of score screen)

  // Session progress tracker — only shown when multi-attempt mode is active (N > 1)
  let sessionProgressHTML = '';
  if (requiredAttempts > 1 && rolling) {
    const dotsHTML = Array.from({ length: requiredAttempts }, (_, i) => {
      const idx = (state.lessonScores[lessonId].history.length - requiredAttempts) + i;
      const score = (state.lessonScores[lessonId].history || [])[idx];

      const label = score === undefined ? '—' : score;
      return `<div class="session-dot ${scoreClass}" title="Attempt ${i + 1}">${label}</div>`;

    const avgColor = rolling.avg >= passMark ? 'var(--green)' : 'var(--orange)';
    sessionProgressHTML = `

      })() : ''}
      ${state.lastAudioURL ? `

      </div>
      <div class="score-actions">
        ${passed ? `
          <button class="btn btn-primary btn-lg" onclick="goToNextLesson()">
            Next Lesson <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
          </button>
          <button class="btn btn-secondary" onclick="showModelAnswer()" title="See what a strong answer looks like">
            <i data-lucide="sparkles" style="width:14px;height:14px"></i> See Model Answer
          </button>
          ${(state.settings && state.settings.aiReviewEnabled && location.protocol.startsWith('http')) ? `
            <button class="btn btn-secondary ai-review-btn" onclick="requestDeepAIReview(this)" title="Get AI-powered feedback on your response">
              <i data-lucide="brain-circuit" style="width:14px;height:14px"></i> Deep AI Review

          <button class="btn btn-ghost" onclick="exportSessionAsPDF()" title="Print-friendly session export">
            <i data-lucide="file-text" style="width:14px;height:14px"></i> Export PDF
          </button>
          <button class="btn btn-ghost" onclick="retryLesson()">
            Try Again
          </button>
        ` : `
          <button class="btn btn-primary btn-lg" onclick="retryLesson()">
            ${needMoreAttempts ? 'Next Attempt' : 'Try Again'} <i data-lucide="${needMoreAttempts ? 'arrow-right' : 'refresh-cw'}" style="width:16px;height:16px"></i>
          </button>
          <button class="btn btn-secondary" onclick="showModelAnswer()" title="See what a strong answer looks like">
            <i data-lucide="sparkles" style="width:14px;height:14px"></i> See Model Answer
          </button>
          ${(state.settings && state.settings.aiReviewEnabled && location.protocol.startsWith('http')) ? `

              <i data-lucide="brain-circuit" style="width:14px;height:14px"></i> Deep AI Review
            </button>
          ` : ''}
          <button class="btn btn-ghost" onclick="exportSessionAsPDF()" title="Print-friendly session export">

            <button class="ai-mode-launch-btn" onclick="startDevilsAdvocateMode()">

  // Animate score counter
  animateCounter('score-counter', 0, s.total, 800);

  // Persist all the state changes made during scoring

  // Check for newly-earned achievements

  // Sound effects — celebrate session completion specifically, otherwise base on this attempt
  if (justUnlocked) {
    playMastery();
  } else if (s.total >= masteryMark) {
    playMastery();
  } else if (passedThisAttempt) {
    playPass();
  } else {
    playFail();
  }

  // Confetti on mastery or session completion (settings-gated)
  const shouldFireConfetti = (s.total >= masteryMark || justUnlocked) && state.settings.confettiEnabled && typeof confetti === 'function';
  if (shouldFireConfetti) {
    setTimeout(() => {
      confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#01696f', '#e8762b', '#c4981a', '#2b6cb0'] });
    }, 850);
  }

  // Certificate on track completion
  if (trackJustCompleted) {
    const track = TRACKS.find(t => t.id === trackId);
    setTimeout(() => showCertificate(track), s.total >= masteryMark ? 2500 : 1200);
  }
}

function animateCounter(elementId, start, end, duration) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const startTime = performance.now();
  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (end - start) * eased);
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function nextStep() {
  state.currentStep++;
  renderLessonStep();
}

function prevStep() {
  if (state.currentStep > 0) {
    state.currentStep--;
    renderLessonStep();
  }
}

function retryLesson() {
  const { trackId, lessonIndex } = state.currentLesson;
  openLesson(trackId, lessonIndex);
  renderLessonStep();
}

function goToNextLesson() {
  const { trackId, lessonIndex } = state.currentLesson;
  const track = TRACKS.find(t => t.id === trackId);
  if (track && lessonIndex + 1 < track.lessons.length) {
    navigate('lesson', { trackId, lessonIndex: lessonIndex + 1 });
  } else {
    navigate('tracks');
  }
}

// ========== DRILL MODE ==========
function startDrillFromTrack(trackId, lessonIndex) {
  const lesson = getLessonData(trackId, lessonIndex);
  if (!lesson || !lesson.elements) return;
  state.currentLesson = { trackId, lessonIndex, lesson };
  state.currentStep = 0;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-lesson').classList.add('active');
  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('lesson-subtitle').textContent = `Track ${trackId} · ${lesson.subtitle}`;
  state.currentView = 'lesson';
  startDrill();
  window.scrollTo(0, 0);
}

function startDrill() {
  const { trackId, lessonIndex, lesson } = state.currentLesson;
  state.drillMode = {
    active: true,
    round: 0,
    totalRounds: 3,
    scores: [],
    prompts: getRandomDrillPrompts(lesson, 3),
  };
  state.currentStep = 0;
  renderDrillRound();
}

function getRandomDrillPrompts(lesson, count) {
  const all = getLessonPrompts(lesson).map(normalizePrompt);
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function renderDrillRound() {
  const drill = state.drillMode;
  const { lesson } = state.currentLesson;
  const content = document.getElementById('lesson-content');

  // Update steps to show drill progress
  const stepsContainer = document.getElementById('lesson-steps');
  stepsContainer.innerHTML = `
    <div class="step-indicator active">
      <i data-lucide="zap" style="width:12px;height:12px"></i> Drill Mode
    </div>
  `;

  if (drill.round >= drill.totalRounds) {
    renderDrillSummary(content, lesson);
    lucide.createIcons();
    return;
  }

  const prompt = drill.prompts[drill.round];
  state.currentPrompt = prompt;
  state.timerSeconds = 0;
  state.practiceText = '';
  state.practiceStartTime = Date.now();
  state.usedSpeech = false;
  state.inputMode = (state.settings && state.settings.defaultInputMode) || 'typing';
  clearAudioRecording();

  const drillEffectiveLimit = getEffectiveTimeLimit(lesson);
  const drillShowGhost = state.settings && state.settings.showFrameworkGhost;

  content.innerHTML = `
    <div class="drill-banner">
      <div>
        <h3><i data-lucide="zap" style="width:16px;height:16px;display:inline;vertical-align:middle"></i> Speed Drill — Round ${drill.round + 1}/${drill.totalRounds}</h3>

      </div>
      <div class="drill-progress-dots">
        ${Array.from({length: drill.totalRounds}, (_, i) => `

        `).join('')}
      </div>
    </div>
    <div class="practice-area">
      <div class="practice-prompt">"${prompt.text}"</div>
      <div class="practice-meta">
        <div class="timer" id="practice-timer">
          <i data-lucide="clock" style="width:18px;height:18px"></i>
          <span id="timer-display">0:00</span>
          <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted)">/ ${formatTime(drillEffectiveLimit)}</span>
        </div>
        <div class="word-count" id="word-count">0 words · ~0s speaking</div>
      </div>
      <div class="practice-input-area">
        <textarea class="practice-textarea" id="practice-input"
          placeholder="Quick — use ${lesson.elements.map(e => e.name).join(' → ')}..."
          oninput="updateWordCount(); updateGhostVisibility()" autofocus></textarea>
        <button class="record-btn" id="record-btn" onclick="toggleAudioRecording()" title="Record audio">
          <i data-lucide="circle" style="width:20px;height:20px;fill:currentColor"></i>
        </button>
        <button class="mic-btn" id="mic-btn" onclick="toggleSpeechRecognition()" title="Transcribe speech">
          <i data-lucide="mic" style="width:20px;height:20px"></i>
        </button>
        ${drillShowGhost ? `
          <div id="framework-ghost" class="framework-ghost">
            ${lesson.elements.map(el => `<span style="color:var(${getElementColorVar(el.color)})">[${el.name}] ${el.desc}</span>`).join('')}
          </div>
        ` : ''}
      </div>
      <div class="mic-status" id="mic-status"></div>
      <div class="practice-footer">
        <div class="speaking-time">Target: ${drillEffectiveLimit}s</div>
        <button class="btn btn-primary" onclick="submitDrillRound()">
          Submit <i data-lucide="send" style="width:14px;height:14px"></i>
        </button>
      </div>

  `;

  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timerSeconds++;
    const display = document.getElementById('timer-display');
    const timerEl = document.getElementById('practice-timer');
    if (display) {
      display.textContent = formatTime(state.timerSeconds);
      const ratio = state.timerSeconds / drillEffectiveLimit;
      timerEl.className = 'timer' + (ratio > 1.3 ? ' danger' : ratio > 1 ? ' warning' : '');
    }
  }, 1000);

  lucide.createIcons();
}

function submitDrillRound() {
  clearInterval(state.timerInterval);
  stopSpeechRecognition();
  stopAudioRecording();
  state.totalPracticeSeconds += state.timerSeconds;
  // Drill mode is rapid-fire — skip checklist and auto-score directly.
  scoreDrillRound();
}

function scoreDrillRound() {
  const { lesson } = state.currentLesson;
  const drill = state.drillMode;

  // Auto-score the actual response (primary) — mode-aware pace, difficulty-adjusted
  const auto = autoScoreResponse(state.practiceText, lesson, state.timerSeconds, state.inputMode);
  const adjStructure = Math.min(40, applyDifficulty(auto.structure));
  const adjClarity = Math.min(30, applyDifficulty(auto.clarity));
  const adjDepth = Math.min(20, applyDifficulty(auto.depth));
  const total = Math.min(100, adjStructure + adjClarity + adjDepth + auto.completion);

  drill.scores.push(total);
  drill.round++;

  // Update personal best + history
  const lessonId = lesson.id;
  const prev = state.lessonScores[lessonId];
  state.lessonScores[lessonId] = {
    best: Math.max(total, prev?.best || 0),
    attempts: (prev?.attempts || 0) + 1,
    history: prev?.history ? [...prev.history, total] : [total]
  };

  // Log drill practice — same schema as practice for the History Feed
  state.practiceLog.push({
    lessonId,
    lessonTitle: lesson.title,
    lessonSubtitle: lesson.subtitle || '',
    trackId: state.currentLesson.trackId,
    lessonIndex: state.currentLesson.lessonIndex,
    prompt: (state.currentPrompt && state.currentPrompt.text) || '',
    response: state.practiceText || '',
    score: total,
    structure: auto.structure || 0,
    clarity: auto.clarity || 0,
    depth: auto.depth || 0,
    completion: auto.completion || 10,
    signals: (auto.signals || []).slice(0, 8),
    wpm: auto.wpm || 0,
    inputMode: auto.inputMode || state.inputMode || 'typing',
    timeSpent: state.timerSeconds || 0,
    mode: 'drill',
    date: new Date().toISOString()
  });
  if (state.practiceLog.length > 200) state.practiceLog.shift();

  state.xp += Math.round(total * 0.5);
  state.xpHistory.push({ date: new Date().toISOString().slice(0,10), xp: state.xp });
  if (state.xpHistory.length > 50) state.xpHistory.shift();
  updateLevel();
  updateStreak();
  saveState();
  checkAchievements();

  renderDrillRound();
}

function renderDrillSummary(content, lesson) {
  const drill = state.drillMode;
  const avg = Math.round(drill.scores.reduce((a, b) => a + b, 0) / drill.scores.length);

  content.innerHTML = `
    <div class="drill-banner" style="justify-content:center;text-align:center">
      <div>
