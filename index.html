// ========== AI DEEP REVIEW (OpenRouter via Netlify Function) ==========
// Calls a server-side function that proxies OpenRouter so the API key stays
// on the server. The function returns a structured JSON with AI-graded scores,
// evidence-based signals, and a rewrite suggestion.

let _aiReviewInFlight = false;
let _lastAIReview = null;

async function requestDeepAIReview(btn) {
  if (_aiReviewInFlight) return;
  const lesson = state.currentLesson && state.currentLesson.lesson;
  const score = state.lastScore;
  const promptObj = state.currentPrompt;
  if (!lesson || !score || !promptObj) {
    showToast('No practice session to review');
    return;
  }
  if (!state.practiceText || state.practiceText.trim().length < 10) {
    showToast('Response is too short to review');
    return;
  }

  const endpoint = (state.settings && state.settings.aiReviewEndpoint) || '/.netlify/functions/score-response';

  // Only makes sense when the app is served over http(s) — local file:// can't reach the function.
  if (!location.protocol.startsWith('http')) {
    showToast('AI review requires the app to be deployed (visit the Netlify URL).');
    return;
  }

  _aiReviewInFlight = true;
  const originalHTML = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" style="width:14px;height:14px"></i> Analyzing…';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  // Render a "thinking" placeholder immediately so the user sees progress
  renderAIReviewPanel({ loading: true });

  const payload = {
    prompt: promptObj.text || '',
    response: state.practiceText,
    lessonTitle: lesson.title,
    framework: lesson.elements.map(e => e.name),
    elementDescriptions: lesson.elements.map(e => ({ name: e.name, description: e.desc || '' })),
    expertTip: lesson.expertTip || '',
    passMark: (state.settings && state.settings.passMark) || 70,
    timeLimit: getEffectiveTimeLimit ? getEffectiveTimeLimit(lesson) : lesson.timeLimit,
    timeSpent: state.timerSeconds || 0,
    inputMode: state.inputMode || 'typing',
    wordCount: (state.practiceText || '').trim().split(/\s+/).filter(Boolean).length,
    wpm: score.wpm || 0,
    // Feed the heuristic score to the AI so it acts as a complementary reviewer
    // instead of contradicting what the app already confirmed was done well.
    heuristicScore: {
      structure: score.structure,
      clarity: score.clarity,
      depth: score.depth,
      completion: score.completion,
      total: score.total,
      signals: (score.signals || []).map(s => ({
        category: s.category || 'general',
        type: s.type || 'partial',
        msg: s.msg || '',
        quote: s.quote || ''
      }))
    }
  };

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 45000); // 45s ceiling

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    clearTimeout(timeoutId);

    if (!res.ok) {
      let errMsg = `AI review failed (${res.status})`;
      try {
        const errBody = await res.json();
        if (errBody && errBody.error) errMsg = errBody.error + (errBody.detail ? ' — ' + errBody.detail : '');
      } catch (e) {}
      renderAIReviewPanel({ error: errMsg });
      showToast(errMsg);
      return;
    }

    const data = await res.json();
    _lastAIReview = data;
    renderAIReviewPanel({ review: data });
    playPass && playPass();
    showToast('AI review complete');
  } catch (e) {
    const msg = e && e.name === 'AbortError' ? 'AI review timed out (45s).' : 'AI review failed: ' + (e && e.message ? e.message : 'unknown');
    renderAIReviewPanel({ error: msg });
    showToast(msg);
  } finally {
    _aiReviewInFlight = false;
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
}

// Render the AI review output into a container on the score screen.
function renderAIReviewPanel(options) {
  const container = document.getElementById('ai-review-panel');
  if (!container) return;

  if (options.loading) {
    container.innerHTML = `
      <div class="ai-review ai-review-loading">
        <div class="ai-review-header">
          <i data-lucide="sparkles" style="width:16px;height:16px"></i>
          <span class="ai-review-title">AI Coach is thinking…</span>
        </div>
        <div class="ai-review-shimmer"></div>
        <div class="ai-review-shimmer"></div>
        <div class="ai-review-shimmer short"></div>
      </div>
    `;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  if (options.error) {
    container.innerHTML = `
      <div class="ai-review ai-review-error">
        <div class="ai-review-header">
          <i data-lucide="alert-triangle" style="width:16px;height:16px;color:var(--red)"></i>
          <span class="ai-review-title">AI Review Failed</span>
        </div>
        <div class="ai-review-error-msg">${escapeHtmlSafe(options.error)}</div>
        <div style="margin-top:0.5rem;font-size:0.78rem;color:var(--text-muted)">
          Check that your Netlify Function is deployed and that OPENROUTER_API_KEY is set as an environment variable.
        </div>
      </div>
    `;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  const r = options.review;
  if (!r) { container.innerHTML = ''; return; }

  const passMark = (state.settings && state.settings.passMark) || 70;
  const tierColor = r.total >= Math.min(95, passMark + 15) ? 'var(--green)'
    : r.total >= passMark ? 'var(--teal)'
    : r.total >= Math.max(40, passMark - 20) ? 'var(--gold)'
    : 'var(--orange)';

  const signalsHTML = (r.signals || []).map(sig => {
    const type = sig.type || 'partial';
    const cat = sig.category || 'structure';
    const icon = type === 'hit' ? 'check' : type === 'partial' ? 'minus' : 'x';
    return `
      <div class="ai-signal ai-signal-${type}">
        <div class="ai-signal-icon"><i data-lucide="${icon}" style="width:10px;height:10px"></i></div>
        <div class="ai-signal-body">
          <div class="ai-signal-meta">${escapeHtmlSafe(cat)}</div>
          <div class="ai-signal-msg">${escapeHtmlSafe(sig.msg || '')}</div>
          ${sig.quote ? `<div class="ai-signal-quote">"${escapeHtmlSafe(sig.quote)}"</div>` : ''}
          ${sig.suggestion ? `<div class="ai-signal-suggestion"><strong>Try:</strong> ${escapeHtmlSafe(sig.suggestion)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const coverageHTML = (r.frameworkCoverage || []).map(c => `
    <div class="ai-coverage-item ${c.covered ? 'covered' : 'missing'}">
      <i data-lucide="${c.covered ? 'check-circle' : 'circle'}" style="width:14px;height:14px"></i>
      <div>
        <strong>${escapeHtmlSafe(c.element || '')}</strong>
        ${c.evidence ? `<div class="ai-coverage-evidence">${escapeHtmlSafe(c.evidence)}</div>` : ''}
      </div>
    </div>
  `).join('');

  // Agreement relationship: the AI now sees the heuristic's scores and frames its review
  // as either confirming, enriching, or adjusting — not contradicting.
  const heuristicTotal = (typeof r.heuristicTotal === 'number') ? r.heuristicTotal : null;
  const scoreDelta = (heuristicTotal !== null) ? (r.total - heuristicTotal) : null;

  let agreementBadge = '';
  if (r.agreement) {
    const agreementConfig = {
      confirm: { icon: 'check-circle', label: 'Confirms app review', color: 'var(--green)', bg: 'var(--green-light)' },
      enrich:  { icon: 'plus-circle',  label: 'Adds depth to app review', color: 'var(--teal)', bg: 'var(--teal-light)' },
      adjust:  { icon: 'edit',          label: 'Adjusts app review', color: 'var(--gold)', bg: 'var(--gold-light)' }
    };
    const cfg = agreementConfig[r.agreement] || agreementConfig.enrich;
    agreementBadge = `
      <div class="ai-agreement-badge" style="background:${cfg.bg};color:${cfg.color}">
        <i data-lucide="${cfg.icon}" style="width:12px;height:12px"></i>
        <span><strong>${escapeHtmlSafe(cfg.label)}</strong>${r.agreementNote ? ` — ${escapeHtmlSafe(r.agreementNote)}` : ''}</span>
      </div>
    `;
  }

  // If we have a heuristic baseline, show the comparison alongside the AI score
  const scoreComparison = (heuristicTotal !== null) ? `
    <div class="ai-review-score-comparison">
      <span class="ai-score-label">App:</span> <span class="ai-score-heuristic">${heuristicTotal}</span>
      <i data-lucide="arrow-right" style="width:12px;height:12px;opacity:0.5"></i>
      <span class="ai-score-label">AI:</span> <span class="ai-score-ai" style="color:${tierColor}">${r.total}</span>
      ${scoreDelta !== 0 ? `<span class="ai-score-delta" style="color:${scoreDelta > 0 ? 'var(--green)' : 'var(--orange)'}">${scoreDelta > 0 ? '+' : ''}${scoreDelta}</span>` : `<span class="ai-score-delta" style="color:var(--text-muted)">aligned</span>`}
    </div>
  ` : '';

  container.innerHTML = `
    <div class="ai-review">
      <div class="ai-review-header">
        <i data-lucide="sparkles" style="width:16px;height:16px;color:${tierColor}"></i>
        <span class="ai-review-title">AI Coach — Second Opinion</span>
        <span class="ai-review-score" style="color:${tierColor}">${r.total}/100</span>
      </div>
      ${scoreComparison}
      ${agreementBadge}
      ${r.verdict ? `<div class="ai-review-verdict">${escapeHtmlSafe(r.verdict)}</div>` : ''}

      <div class="ai-review-breakdown">
        <div class="ai-review-chip"><span class="ai-chip-label">Structure</span><span class="ai-chip-val">${r.structure}/40</span></div>
        <div class="ai-review-chip"><span class="ai-chip-label">Clarity</span><span class="ai-chip-val">${r.clarity}/30</span></div>
        <div class="ai-review-chip"><span class="ai-chip-label">Depth</span><span class="ai-chip-val">${r.depth}/20</span></div>
        <div class="ai-review-chip"><span class="ai-chip-label">Completion</span><span class="ai-chip-val">${r.completion}/10</span></div>
      </div>

      ${(r.frameworkCoverage && r.frameworkCoverage.length) ? `
        <div class="ai-review-section">
          <div class="ai-review-section-title">Framework Coverage</div>
          <div class="ai-coverage-grid">${coverageHTML}</div>
        </div>
      ` : ''}

      ${signalsHTML ? `
        <div class="ai-review-section">
          <div class="ai-review-section-title">Detailed Feedback</div>
          ${signalsHTML}
        </div>
      ` : ''}

      ${r.rewrite ? `
        <div class="ai-review-section">
          <div class="ai-review-section-title">Suggested Rewrite</div>
          <div class="ai-rewrite">${escapeHtmlSafe(r.rewrite)}</div>
        </div>
      ` : ''}

      ${r.model ? `<div class="ai-review-footer">Reviewed by ${escapeHtmlSafe(r.model)}${r.usage && r.usage.total_tokens ? ` · ${r.usage.total_tokens} tokens` : ''}</div>` : ''}
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
  // Scroll the review into view so the user sees it
  setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// ========== SERVICE WORKER (offline caching + update detection) ==========
// App version shown in Settings → About. Bump this when you ship a new version.
const APP_VERSION = '2.0.0-stage1';

// Reference to a waiting service worker — user taps "Update" to activate it.
let _waitingWorker = null;

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  // Only register when served over http(s). file:// doesn't support SWs.
  if (location.protocol !== 'http:' && location.protocol !== 'https:') return;

  navigator.serviceWorker.register('./sw.js').then((reg) => {
    // Listen for new versions becoming available in the background.
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        // 'installed' + an existing controller = update waiting (not first install)
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          _waitingWorker = newWorker;
          showUpdateAvailableToast();
        }
      });
    });

    // Check for updates periodically (every 5 minutes while the app is open)
    setInterval(() => {
      reg.update().catch(() => {});
    }, 5 * 60 * 1000);
  }).catch((err) => {
    console.warn('[SW] Registration failed:', err);
  });

  // When the new SW takes control, reload to pick up the fresh assets.
  let _reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_reloading) return;
    _reloading = true;
    window.location.reload();
  });
}

function showUpdateAvailableToast() {
  // Dismiss any existing update toast
  const existing = document.querySelector('.update-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast update-toast show';
  toast.innerHTML = `
    <i data-lucide="download-cloud" style="width:16px;height:16px"></i>
    <span>New version available</span>
    <button class="update-toast-btn" onclick="applyPendingUpdate()">Update</button>
    <button class="update-toast-dismiss" onclick="this.closest('.toast').remove()" aria-label="Dismiss">
      <i data-lucide="x" style="width:12px;height:12px"></i>
    </button>
  `;
  document.body.appendChild(toast);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function applyPendingUpdate() {
  if (_waitingWorker) {
    _waitingWorker.postMessage({ type: 'SKIP_WAITING' });
    // The page will reload automatically once the new worker takes control.
    const toast = document.querySelector('.update-toast');
    if (toast) toast.remove();
    showToast('Updating…');
  }
}

// Manual "Check for Updates" — triggered from Settings → About.
// ========== PRACTICE REMINDER NOTIFICATIONS ==========
// Best-effort daily local reminder. Works reliably while the app is open in a
// browser tab. On installed PWAs with notification permission granted, fires
// even when the app is backgrounded. iOS requires iOS 16.4+ and PWA install.

let _reminderTimer = null;

function isNotificationSupported() {
  return typeof Notification !== 'undefined';
}

function getNotificationPermission() {
  if (!isNotificationSupported()) return 'unsupported';
  return Notification.permission; // 'granted' | 'denied' | 'default'
}

async function requestReminderPermission() {
  if (!isNotificationSupported()) {
    showToast('Notifications are not supported on this browser.');
    return false;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      showToast('Notifications enabled — reminders will fire while the app is open.');
      return true;
    } else if (perm === 'denied') {
      showToast('You blocked notifications. Enable them in your browser settings to receive reminders.');
      return false;
    }
    return false;
  } catch (e) {
    showToast('Could not request permission: ' + (e.message || e));
    return false;
  }
}

// Schedules the next reminder based on the configured time.
// Called after saveState, on app load, and on settings changes.
function scheduleNextReminder() {
  // Clear any existing timer
  if (_reminderTimer) {
    clearTimeout(_reminderTimer);
    _reminderTimer = null;
  }

  const s = state.settings;
  if (!s || !s.reminderEnabled) return;
  if (!isNotificationSupported() || getNotificationPermission() !== 'granted') return;

  // Parse the target time (HH:MM)
  const timeStr = s.reminderTime || '08:30';
  const [hours, minutes] = timeStr.split(':').map(n => parseInt(n, 10));
  if (isNaN(hours) || isNaN(minutes)) return;

  // Compute the next fire time (today if still in future, otherwise tomorrow)
  const now = new Date();
  const fire = new Date();
  fire.setHours(hours, minutes, 0, 0);
  if (fire.getTime() <= now.getTime()) {
    fire.setDate(fire.getDate() + 1);
  }

  const delay = fire.getTime() - now.getTime();
  // setTimeout max is ~24.8 days (2^31-1 ms), we're always under 24h so we're safe
  _reminderTimer = setTimeout(() => {
    fireReminderNotification();
    // Re-schedule for tomorrow
    scheduleNextReminder();
  }, delay);
}

function fireReminderNotification() {
  // Skip if the user has already practiced today
  const today = new Date().toISOString().slice(0, 10);
  if (state.activityDays && state.activityDays.includes(today)) {
    // Already practiced — no need to nag
    return;
  }
  try {
    const title = 'Time to practice speaking';
    const body = state.streak > 0
      ? `You're on a ${state.streak}-day streak — don't break it! A 5-minute lesson is enough.`
      : 'Start your day sharper: one quick framework drill is waiting.';
    const notification = new Notification(title, {
      body,
      icon: '/icons/icon-192.png', // graceful if missing
      badge: '/icons/icon-192.png',
      tag: 'speakmaster-reminder', // replaces any previous one
      requireInteraction: false
    });
    notification.onclick = () => {
      window.focus();
      try { window.location.hash = 'dashboard'; } catch (e) {}
      notification.close();
    };
  } catch (e) {
    console.warn('Failed to fire reminder:', e);
  }
}

// Helper for Settings UI — toggles the reminder on/off, handling permission flow.
async function toggleReminder() {
  const wasEnabled = state.settings.reminderEnabled;
  if (!wasEnabled) {
    // Enabling: request permission first
    if (getNotificationPermission() !== 'granted') {
      const ok = await requestReminderPermission();
      if (!ok) return; // Abort enabling if permission not granted
    }
    state.settings.reminderEnabled = true;
    saveState();
    scheduleNextReminder();
    renderSettings(); // refresh UI to show new state
  } else {
    // Disabling
    state.settings.reminderEnabled = false;
    saveState();
    if (_reminderTimer) { clearTimeout(_reminderTimer); _reminderTimer = null; }
    renderSettings();
  }
}

// Updates the reminder time from a time input control.
function updateReminderTime(newTime) {
  if (!newTime || !/^\d{2}:\d{2}$/.test(newTime)) return;
  state.settings.reminderTime = newTime;
  saveState();
  scheduleNextReminder();
}

async function checkForUpdatesManually(btn) {
  if (!('serviceWorker' in navigator)) {
    showToast('Service worker not supported on this browser');
    return;
  }
  const originalText = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" style="width:14px;height:14px"></i> Checking…';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg) {
      showToast('Service worker not registered yet — reload the page once, then try again.');
      return;
    }
    await reg.update();
    // Give the update event a moment to fire if a new version is found
    await new Promise((r) => setTimeout(r, 1200));
    if (_waitingWorker) {
      showToast('Update found! Tap the notification to apply.');
    } else {
      showToast(`You're on the latest version (${APP_VERSION}).`);
    }
  } catch (e) {
    showToast('Update check failed: ' + (e && e.message ? e.message : 'unknown'));
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = originalText;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
}
</script>
