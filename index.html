}
.ai-review-header {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.ai-review-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--text-primary);
  flex: 1;
}
.ai-review-score {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.15rem;
}
.ai-review-verdict {
  font-size: 0.9rem;
  color: var(--text-primary);
  font-style: italic;
  margin-bottom: 0.75rem;
  padding: 0.5rem 0.75rem;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--teal);
}
.ai-review-breakdown {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.ai-review-chip {
  flex: 1;
  min-width: 90px;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  padding: 0.5rem 0.6rem;
  text-align: center;
}
.ai-chip-label {
  display: block;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 0.15rem;
}
.ai-chip-val {
  display: block;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--text-primary);
}
.ai-review-section {
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
}
.ai-review-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}
.ai-coverage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.4rem;
}
.ai-coverage-item {
  display: flex; align-items: flex-start; gap: 0.4rem;
  padding: 0.45rem 0.55rem;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
}
.ai-coverage-item.covered {
  background: var(--green-light);
  color: var(--green);
}
.ai-coverage-item.missing {
  background: var(--red-light);
  color: var(--red);
}
.ai-coverage-item strong {
  display: block;
  font-size: 0.8rem;
  font-weight: 700;
}
.ai-coverage-evidence {
  font-weight: 400;
  font-size: 0.72rem;
  opacity: 0.85;
  margin-top: 0.15rem;
}
.ai-signal {
  display: flex; align-items: flex-start; gap: 0.5rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.84rem;
}
.ai-signal:last-child { border-bottom: none; }
.ai-signal-icon {
  flex-shrink: 0;
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-top: 0.1rem;
}
.ai-signal-hit .ai-signal-icon { background: var(--green-light); color: var(--green); }
.ai-signal-partial .ai-signal-icon { background: var(--gold-light); color: var(--gold); }
.ai-signal-miss .ai-signal-icon { background: var(--red-light); color: var(--red); }
.ai-signal-body { flex: 1; min-width: 0; }
.ai-signal-meta {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  font-weight: 700;
  margin-bottom: 0.15rem;
}
.ai-signal-msg { color: var(--text-primary); line-height: 1.4; }
.ai-signal-quote {
  margin-top: 0.3rem;
  padding: 0.3rem 0.55rem;
  background: var(--bg-primary);
  border-left: 3px solid var(--border);
  border-radius: 0 4px 4px 0;
  font-style: italic;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.ai-signal-hit .ai-signal-quote { border-left-color: var(--green); }
.ai-signal-partial .ai-signal-quote { border-left-color: var(--gold); }
.ai-signal-miss .ai-signal-quote { border-left-color: var(--red); }
.ai-signal-suggestion {
  margin-top: 0.3rem;
  padding: 0.3rem 0.55rem;
  background: var(--teal-light);
  color: var(--teal);
  border-radius: 4px;
  font-size: 0.78rem;
  line-height: 1.4;
}
.ai-signal-suggestion strong {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 0.68rem;
}
.ai-rewrite {
  background: var(--gold-light);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 0.75rem 1rem;
  font-size: 0.88rem;
  line-height: 1.55;
  color: var(--text-primary);
  white-space: pre-wrap;
}
.ai-review-footer {
  margin-top: 0.75rem;
  font-size: 0.68rem;
  color: var(--text-muted);
  text-align: right;
  font-family: monospace;
}
.ai-review-error-msg {
  padding: 0.5rem 0.75rem;
  background: var(--red-light);
  color: var(--red);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
}
.ai-review-shimmer {
  height: 14px;
  background: linear-gradient(90deg, var(--bg-secondary) 0%, var(--border) 50%, var(--bg-secondary) 100%);
  background-size: 200% 100%;
  border-radius: 4px;
  margin-bottom: 0.5rem;
  animation: aiShimmer 1.5s ease-in-out infinite;
}
.ai-review-shimmer.short { width: 60%; }
@keyframes aiShimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ========== AI PRACTICE MODES (Stage 3) ========== */

/* Launcher block on the score screen */
.ai-modes-launcher {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem;
  margin-top: 1rem;
  text-align: left;
}
.ai-modes-header {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}
.ai-modes-subtitle {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
}
.ai-modes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 0.5rem;
}
.ai-mode-launch-btn {
  display: flex; align-items: flex-start; gap: 0.5rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.8rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}
.ai-mode-launch-btn:hover {
  background: var(--bg-primary);
  border-color: var(--teal);
  transform: translateY(-1px);
}
.ai-mode-launch-icon {
  flex-shrink: 0;
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.ai-mode-launch-icon.conv { background: var(--teal-light); color: var(--teal); }
.ai-mode-launch-icon.devil { background: var(--red-light); color: var(--red); }
.ai-mode-launch-icon.aud { background: var(--gold-light); color: var(--gold); }
.ai-mode-launch-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.ai-mode-launch-body strong {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
}
.ai-mode-launch-body span {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.15rem;
  line-height: 1.3;
}

/* AI mode overlay (shared) */
.ai-mode-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.55); display: flex;
  align-items: center; justify-content: center;
  padding: 1rem; backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease-out;
}
.ai-mode-card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 1.5rem;
  max-width: 560px; width: 100%;
  max-height: 92vh;
  display: flex; flex-direction: column;
  position: relative;
  box-shadow: var(--shadow-lg);
}
.ai-mode-header {
  display: flex; align-items: flex-start; gap: 0.75rem;
  margin-bottom: 1rem;
  padding-right: 2rem;
}
.ai-mode-header h2 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.25rem;
  margin-bottom: 0.1rem;
}
.ai-mode-subtitle {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin: 0;
  line-height: 1.4;
}
.ai-mode-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-mode-icon.conversation { background: var(--teal-light); color: var(--teal); }
.ai-mode-icon.devils { background: var(--red-light); color: var(--red); }
.ai-mode-icon.audience { background: var(--gold-light); color: var(--gold); }

/* Conversation log */
.ai-conversation-log {
  flex: 1;
  min-height: 180px;
  max-height: 400px;
  overflow-y: auto;
  padding: 0.75rem;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  margin-bottom: 0.85rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.ai-turn {
  padding: 0.6rem 0.8rem;
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  line-height: 1.5;
}
.ai-turn-prompt {
  background: var(--bg-card);
  border: 1px dashed var(--border);
  align-self: stretch;
  font-style: italic;
}
.ai-turn-user {
  background: var(--teal);
  color: #fff;
  align-self: flex-end;
  max-width: 85%;
  border-bottom-right-radius: 2px;
}
.ai-turn-ai {
  background: var(--bg-card);
  border: 1px solid var(--border);
  align-self: flex-start;
  max-width: 90%;
  border-bottom-left-radius: 2px;
}
.ai-turn-devils {
  background: var(--red-light);
  border: 1px solid var(--red);
  color: var(--text-primary);
  align-self: flex-start;
  max-width: 90%;
  border-bottom-left-radius: 2px;
}
[data-theme="dark"] .ai-turn-devils { color: var(--text-primary); }
.ai-turn-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.7;
  margin-bottom: 0.25rem;
}
.ai-turn-body {
  white-space: pre-wrap;
  word-wrap: break-word;
}
.ai-turn-ack {
  opacity: 0.75;
  font-size: 0.82rem;
}

/* Typing indicator dots */
.ai-typing .ai-turn-body { padding: 0.4rem 0.25rem; }
.ai-dots {
  display: inline-flex; gap: 4px; align-items: center;
}
.ai-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-muted);
  animation: aiDot 1.2s ease-in-out infinite;
}
.ai-dots span:nth-child(2) { animation-delay: 0.15s; }
.ai-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes aiDot {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}

/* Input row + submit */
.ai-mode-input-row {
  display: flex; gap: 0.5rem;
  margin-bottom: 0.5rem;
}
/* Wraps the textarea + mic button so the mic overlays the bottom-right corner */
.ai-mode-input-wrap {
  position: relative;
  flex: 1;
  display: flex;
  min-width: 0;
}
.ai-mode-input-wrap .ai-mode-textarea { width: 100%; }
.ai-mode-textarea {
  flex: 1;
  padding: 0.65rem 2.6rem 0.65rem 0.75rem;  /* right padding for mic button */
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  line-height: 1.5;
  resize: vertical;
  min-height: 70px;
  transition: border-color 0.15s;
}

/* Inline mic button inside AI mode textareas */
.ai-mic-btn {
  position: absolute;
  right: 6px;
  bottom: 8px;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  z-index: 2;
  padding: 0;
}
.ai-mic-btn:hover {
  background: var(--teal-light);
  color: var(--teal);
  border-color: var(--teal);
}
.ai-mic-btn.recording {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
  animation: aiMicPulse 1.5s ease-in-out infinite;
}
@keyframes aiMicPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(197, 48, 48, 0.5); }
  50% { box-shadow: 0 0 0 8px rgba(197, 48, 48, 0); }
}
.ai-mode-textarea:focus {
  outline: none;
  border-color: var(--teal);
}

.ai-mode-footer {
  display: flex; justify-content: space-between; align-items: center;
  gap: 0.5rem; flex-wrap: wrap;
  padding-top: 0.5rem;
}
.ai-mode-turn-count {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Persistent inline error banner inside AI mode overlays */
.ai-mode-error {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  background: var(--red-light);
  color: var(--red);
  padding: 0.65rem 0.85rem;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--red);
  margin: 0.5rem 0;
  align-self: stretch;
  font-size: 0.82rem;
  line-height: 1.4;
}
.ai-mode-error i { flex-shrink: 0; margin-top: 0.15rem; }
.ai-mode-error strong {
  display: block;
  font-weight: 700;
  margin-bottom: 0.15rem;
}
.ai-mode-error-msg {
  color: var(--text-primary);
  word-break: break-word;
}

/* Intensity slider (Devil's Advocate) */
.intensity-slider-row {
  background: var(--bg-secondary);
  padding: 0.75rem 0.85rem;
  border-radius: var(--radius-sm);
  margin-bottom: 0.75rem;
}
.intensity-label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
}
.intensity-label strong {
  color: var(--red);
  font-weight: 800;
}
.intensity-slider {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 50%, var(--red) 100%);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}
.intensity-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 3px solid var(--red);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.intensity-slider::-moz-range-thumb {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 3px solid var(--red);
  cursor: pointer;
}
.intensity-ticks {
  display: flex; justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Audience Simulator */
.audience-card { max-width: 600px; }
.audience-progress {
  display: flex; justify-content: center; gap: 0.75rem;
  margin-bottom: 1rem;
}
.audience-dot {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 800; font-size: 0.85rem;
  background: var(--bg-secondary);
  color: var(--text-muted);
  border: 2px solid var(--border);
}
.audience-dot.active {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
  transform: scale(1.1);
}
.audience-dot.done {
  background: var(--green-light);
  color: var(--green);
  border-color: var(--green);
}

.audience-persona-card {
  background: var(--gold-light);
  border-left: 4px solid var(--gold);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 0.85rem 1rem;
  margin-bottom: 0.85rem;
}
.audience-persona-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--gold);
  margin-bottom: 0.2rem;
}
.audience-persona-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}
.audience-persona-desc {
  font-size: 0.85rem;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}
.audience-persona-details {
  font-size: 0.78rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.audience-persona-details div { margin-bottom: 0.15rem; }

.audience-prompt-box {
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.85rem;
  margin-bottom: 0.75rem;
}
.audience-prompt-label {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
}
.audience-prompt-text {
  font-size: 0.88rem;
  font-style: italic;
  color: var(--text-primary);
}

.audience-response-label {
  display: block;
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
}

.audience-summary-header {
  text-align: center;
  padding: 1rem 0 1.25rem;
}
.audience-summary-score {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 3rem;
  color: var(--gold);
  line-height: 1;
}
.audience-summary-score span {
  font-size: 1rem;
  color: var(--text-muted);
}
.audience-summary-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  margin-top: 0.3rem;
}

.audience-result-card {
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  padding: 0.85rem 1rem;
  margin-bottom: 0.75rem;
}
.audience-result-header {
  display: flex; justify-content: space-between; align-items: center;
  gap: 0.5rem;
  padding-bottom: 0.5rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.audience-fit-score {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1rem;
  color: var(--gold);
}
.audience-result-verdict {
  font-size: 0.85rem;
  color: var(--text-primary);
  font-style: italic;
  margin-bottom: 0.6rem;
  line-height: 1.4;
}
.audience-result-item {
  padding: 0.5rem 0.65rem;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  margin-bottom: 0.45rem;
  line-height: 1.5;
}
.audience-result-item strong {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;

// ========== LEVEL SYSTEM ==========
const LEVELS = [
  { title: 'Hesitant Talker', minXP: 0 },
  { title: 'Emerging Speaker', minXP: 200 },
  { title: 'Confident Communicator', minXP: 500 },
  { title: 'Polished Presenter', minXP: 1000 },
  { title: 'Eloquent Professional', minXP: 1800 },
  { title: 'Master Orator', minXP: 3000 },
];

function getCurrentLevel() {
  let current = LEVELS[0];
  for (const level of LEVELS) {
    if (state.xp >= level.minXP) current = level;
  }
  return current;
}

function getNextLevel() {
  for (let i = 0; i < LEVELS.length; i++) {
    if (state.xp < LEVELS[i].minXP) return LEVELS[i];
  }
  return null; // max level
}

function getXPProgress() {
  const current = getCurrentLevel();
  const next = getNextLevel();
  if (!next) return { percent: 100, currentXP: state.xp, needed: 0 };
  const range = next.minXP - current.minXP;
  const progress = state.xp - current.minXP;
  return { percent: Math.round((progress / range) * 100), currentXP: state.xp, needed: next.minXP - state.xp };
}

function updateLevel() {
  const level = getCurrentLevel();
  state.level = level.title;
}

// ========== STREAK SYSTEM ==========
function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  if (state.lastPracticeDate === today) return; // already tracked today

  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (state.lastPracticeDate === yesterday) {
    state.streak++;
  } else if (state.lastPracticeDate !== today) {
    state.streak = 1;
  }
  state.lastPracticeDate = today;

  // Update activity calendar
  if (!state.activityDays.includes(today)) {
    state.activityDays.push(today);
    if (state.activityDays.length > 7) state.activityDays.shift();
  }
}

// ========== TRACK COMPLETION ==========
function checkTrackCompletion(trackId) {
  const track = TRACKS.find(t => t.id === trackId);
  if (!track) return false;
  const allComplete = track.lessons.every(l => isLessonCompleted(l.id));
  if (allComplete && !state.completedTracks[trackId]) {
    state.completedTracks[trackId] = true;
    state.certificateDates[trackId] = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    return true; // newly completed
  }
  return false;
}

// ========== DAILY CHALLENGE ==========
function getDailyChallenge() {
  const today = new Date().toISOString().slice(0, 10);

  // Reuse today's challenge if already generated
  if (state.dailyChallenge && state.dailyChallenge.date === today) {
    return state.dailyChallenge;
  }

  // Otherwise generate a new one from any unlocked lesson the user can access
  const pool = [];
  for (const track of TRACKS) {
    if (!isTrackUnlocked(track.id)) continue;
    track.lessons.forEach((lesson, idx) => {
      if (!isLessonUnlocked(lesson.id)) return;
      if (!lesson.prompts || lesson.prompts.length === 0) return;
      lesson.prompts.forEach((_, promptIdx) => {
        pool.push({ trackId: track.id, lessonIndex: idx, promptIndex: promptIdx });
      });
    });
  }

  if (pool.length === 0) return null;

  // Deterministic pseudo-random seed based on the date (so it stays the same all day)
  const seed = today.split('-').reduce((a, b) => a * 31 + parseInt(b), 7);
  const pick = pool[seed % pool.length];

  state.dailyChallenge = {
    date: today,
    trackId: pick.trackId,
    lessonIndex: pick.lessonIndex,
    promptIndex: pick.promptIndex,
    completed: false
  };
  saveState();
  return state.dailyChallenge;
}

function startDailyChallenge() {
  const dc = getDailyChallenge();
  if (!dc || dc.completed) return;
  state.dailyChallengeMode = true;
  navigate('lesson', { trackId: dc.trackId, lessonIndex: dc.lessonIndex });
}

function completeDailyChallenge() {
  if (!state.dailyChallenge) return;
  state.dailyChallenge.completed = true;
  saveState();
  checkAchievements();
}

function renderWarmupStep() {
  const session = state.warmupSession;
  if (!session) return;
  const ex = session.exercises[session.currentIndex];
  if (!ex) {
    finishWarmup();
    return;
  }

  // Remove any existing overlay
  const existing = document.querySelector('.warmup-overlay');
  if (existing) existing.remove();

      </div>

        <i data-lucide="${ex.icon}" style="width:32px;height:32px"></i>
      </div>
      <h2 class="warmup-title">${ex.title}</h2>
      <p class="warmup-instruction">${ex.instruction}</p>
      ${ex.phrase ? `<div class="warmup-phrase">"${ex.phrase}"</div>` : ''}
      <p class="warmup-sub">${ex.subInstruction}</p>
      <div class="warmup-timer-display">
        <div class="warmup-timer-ring">
          <svg width="120" height="120">
            <circle cx="60" cy="60" r="52" class="warmup-ring-bg"></circle>
            <circle cx="60" cy="60" r="52" class="warmup-ring-fill" id="warmup-ring-fill"
              style="stroke-dasharray:${2 * Math.PI * 52};stroke-dashoffset:0"></circle>
          </svg>
          <div class="warmup-timer-text" id="warmup-timer-text">${ex.duration}s</div>
        </div>
      </div>
      <div class="warmup-actions">
        <button class="btn btn-ghost" onclick="cancelWarmup()">Skip Warmup</button>
        <button class="btn btn-primary" id="warmup-next-btn" onclick="nextWarmupStep()">
          <i data-lucide="skip-forward" style="width:14px;height:14px"></i>
          Next
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  lucide.createIcons();

  // Start the countdown
  session.remaining = ex.duration;
  clearInterval(session.timer);
  const totalDuration = ex.duration;
  session.timer = setInterval(() => {
    session.remaining--;
    const timerText = document.getElementById('warmup-timer-text');
    const ringFill = document.getElementById('warmup-ring-fill');
    if (timerText) timerText.textContent = session.remaining + 's';
    if (ringFill) {
      const circumference = 2 * Math.PI * 52;
      const offset = circumference * (1 - (totalDuration - session.remaining) / totalDuration);
      ringFill.style.strokeDashoffset = offset;
    }
    if (session.remaining <= 0) {
      clearInterval(session.timer);
      setTimeout(() => nextWarmupStep(), 400);
    }
  }, 1000);
}

function nextWarmupStep() {
  const session = state.warmupSession;
  if (!session) return;
  clearInterval(session.timer);
  session.currentIndex++;
  playClick();
  if (session.currentIndex >= session.exercises.length) {
    finishWarmup();
  } else {
    renderWarmupStep();
  }
}

function finishWarmup() {
  if (state.warmupSession && state.warmupSession.timer) clearInterval(state.warmupSession.timer);
  state.warmupSession = null;

  const existing = document.querySelector('.warmup-overlay');
  if (existing) existing.remove();

  // Show completion toast and play mastery sound
  playMastery();
  showToast('Warmup complete — your voice is ready!');

  // Record that a warmup was done today
  state.lastWarmupDate = new Date().toISOString().slice(0, 10);
  saveState();
  checkAchievements();
}

function cancelWarmup() {
  if (state.warmupSession && state.warmupSession.timer) clearInterval(state.warmupSession.timer);
  state.warmupSession = null;
  const existing = document.querySelector('.warmup-overlay');
  if (existing) existing.remove();
  playClick();
}

// Scans all achievements and unlocks any that now qualify.
// Returns an array of newly-unlocked achievement objects.
function checkAchievements() {
  if (!state.achievements) state.achievements = [];
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(a => {
    if (isAchievementUnlocked(a.id)) return;
    try {
      if (a.check()) {
        state.achievements.push({ id: a.id, unlockedAt: new Date().toISOString() });
        newlyUnlocked.push(a);
      }
    } catch (e) {
      // Silently skip any broken check
    }
  });
  if (newlyUnlocked.length > 0) {
    saveState();
    // Show toasts for each, spaced 600ms apart so they don't stack on top of each other
    newlyUnlocked.forEach((a, i) => {
      setTimeout(() => {
        showAchievementToast(a);
      }, i * 800 + 400);
    });
  }
  return newlyUnlocked;
}

// ========== SPACED REPETITION REVIEW ==========
// Returns up to `limit` lessons that are "due for review" — completed lessons
// where the personal best is below mastery (85) AND the user hasn't attempted them
// in at least `cooldownDays` days. Sorted weakest-first.
function getReviewCandidates(limit) {
  // Returns lessons the user has PASSED but not yet MASTERED, sorted weakest-first.
  // Thresholds respect the user's custom pass mark setting.
  limit = (limit === undefined) ? 3 : limit;

  const passMark = (state.settings && state.settings.passMark) || 70;
  const masteryMark = Math.min(95, passMark + 15);

  const candidates = [];
  for (const [lessonId, scoreData] of Object.entries(state.lessonScores)) {
    if (!scoreData || typeof scoreData.best !== 'number') continue;
    // Mastered lessons don't need review
    if (scoreData.best >= masteryMark) continue;
    // Only show lessons the user has completed (passed at the current pass mark)
    if (!isLessonCompleted(lessonId)) continue;

    // Find the lesson metadata
    const [trackIdStr, lessonIdxStr] = lessonId.split('-');
    const trackId = parseInt(trackIdStr);
    const lessonIndex = parseInt(lessonIdxStr) - 1;
    const track = TRACKS.find(t => t.id === trackId);
    const lesson = track?.lessons[lessonIndex];
    if (!lesson || !lesson.elements) continue; // Only lessons with full content

    candidates.push({
      lessonId,
      trackId,
      lessonIndex,
      lesson,
      track,
      best: scoreData.best,
      attempts: scoreData.attempts || 1,
      masteryMark
    });
  }

  // Sort weakest-first (lower score = higher priority to review)
  candidates.sort((a, b) => a.best - b.best);
  return candidates.slice(0, limit);
}

// ========== WEEKLY GOAL ==========
function getWeekStart() {
  // Returns the Monday (as an ISO date string) of the current week
  const d = new Date();
  const day = d.getDay(); // 0 = Sun, 1 = Mon, ..., 6 = Sat
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Adjust so Monday = start
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}

function getGoalTypes() {
  return [
    { type: 'lessons', label: 'Complete X lessons', suggestedTargets: [3, 5, 7, 10] },
    { type: 'minutes', label: 'Practice X minutes', suggestedTargets: [15, 30, 60, 120] },
    { type: 'xp',      label: 'Earn X XP',           suggestedTargets: [200, 500, 1000, 1500] },
    { type: 'mastery', label: 'Master X frameworks', suggestedTargets: [1, 2, 3, 5] }
  ];
}

function ensureWeeklyGoalFresh() {
  // If the week has rolled over, archive the old goal (keep reference to previous progress) and clear it
  if (!state.weeklyGoal) return;
  const currentWeek = getWeekStart();
  if (state.weeklyGoal.weekStart !== currentWeek) {
    // Goal has expired — archive baseline for tracking fresh progress if user wants the same goal
    state.weeklyGoal = null;
    saveState();
  }
}

function getGoalProgress() {
  if (!state.weeklyGoal) return null;
  ensureWeeklyGoalFresh();
  if (!state.weeklyGoal) return null;

  const goal = state.weeklyGoal;
  let current = 0;

  // Baselines captured when goal was set
  const baseline = goal.baseline || {};

  if (goal.type === 'lessons') {
    current = (getCompletedLessonCount() - (baseline.lessonsDone || 0));
  } else if (goal.type === 'minutes') {
    const totalMin = Math.floor(state.totalPracticeSeconds / 60);
    current = Math.max(0, totalMin - (baseline.minutes || 0));
  } else if (goal.type === 'xp') {
    current = Math.max(0, state.xp - (baseline.xp || 0));
  } else if (goal.type === 'mastery') {
    current = Math.max(0, getMasteredFrameworkCount() - (baseline.masteryCount || 0));
  }

  return {
    current: Math.min(current, goal.target),
    target: goal.target,
    percent: Math.min(100, Math.round((current / goal.target) * 100)),
    complete: current >= goal.target
  };
}

function setWeeklyGoal(type, target) {
  // Set a new weekly goal, capturing today's numbers as baselines
  const baseline = {
    lessonsDone: getCompletedLessonCount(),
    minutes: Math.floor(state.totalPracticeSeconds / 60),
    xp: state.xp,
    masteryCount: getMasteredFrameworkCount()
  };
  state.weeklyGoal = {
    type,
    target,
    weekStart: getWeekStart(),
    baseline,
    createdAt: new Date().toISOString()
  };
  saveState();
  showToast(`Weekly goal set: ${target} ${type === 'lessons' ? 'lessons' : type === 'minutes' ? 'minutes' : type === 'xp' ? 'XP' : 'frameworks'} by Sunday`);
}

function clearWeeklyGoal() {
  state.weeklyGoal = null;
  saveState();
}

function saveReflection(lessonId, lessonTitle, score, note) {
  if (!note || !note.trim()) return;
  state.reflections.push({
    date: new Date().toISOString(),
    lessonId,
    lessonTitle,
    score,
    note: note.trim()
  });

  if (state.reflections.length > 200) state.reflections.shift();
  saveState();
  checkAchievements();
}

            { text: "Today I'm going to propose a new team structure built around three principles: clearer growth paths, better knowledge sharing, and faster decision-making.", element: "Agenda", color: "orange" },
            { text: "First, growth paths. Right now, our only career ladder goes from IC to manager. I'm proposing a dual track — a technical leadership path alongside management — with defined levels, skills, and comp bands. Companies like Spotify and Stripe have seen 25% better retention after implementing this.", element: "Point 1", color: "gold" },

        example: {

            { text: "Technology cycles are compressing. The skills that matter today might be automated in 3 years. What won't be automated is the ability to learn a new tool in two weeks, pivot when conditions change, and synthesize information across domains. The people I see thriving aren't the deepest experts — they're the fastest learners.", element: "Concise Answer", color: "orange" },

              { text: "[Q2] Companies should treat AI displacement the same way they treated automation 50 years ago: proactively retrain the workforce. The companies that laid off and hoped for the best created decades of labor unrest. The ones that reskilled their people kept institutional knowledge and community trust. My advice is simple — start the retraining program before you need it, not after.", element: "Concise Answer", color: "orange" },
              { text: "[Q3] Yes — but not the version of remote we have today. Pure remote kills the accidental connections that create mentorship and culture. The companies getting this right are the ones designing deliberate in-person moments three or four times a year, not forcing daily commutes. That hybrid model is sustainable for decades. The 'all-or-nothing' version isn't.", element: "Strong Close", color: "gold" },

            text: "Panel: Innovation. Q1: Where does real innovation come from? Q2: How do you balance innovation with execution? Q3: What kills creativity in organizations?",

              { text: "[Q2] The trick isn't balance — it's separation. Innovation and execution run on different clocks, with different success metrics, and they kill each other when mixed. Create a small innovation team protected from quarterly pressures, and let the rest of the company focus on operational excellence. That's what Amazon, Google, and 3M have all figured out.", element: "Concise Answer", color: "orange" },
              { text: "[Q3] Three things: hierarchy, fear of failure, and meetings that require consensus before action. When an idea has to survive ten approval layers, only the safest ones make it through — which are usually the least interesting ones. Kill the approval layers, make failure cheap, and watch what happens.", element: "Strong Close", color: "gold" },

              { text: "[Q2] You build trust by doing what you said you'd do — especially on small things, especially in the first 90 days. Big promises don't build trust; kept promises do. Start small: if you say you'll follow up by Friday, do it by Thursday. If you say you'll push back on an unfair deadline, do it in the first meeting where it comes up.", element: "Concise Answer", color: "orange" },
              { text: "[Q3] Own it fully, quickly, and publicly — and then immediately turn to what comes next. The biggest leadership failure isn't the original mistake; it's the cover-up. The leaders I've watched recover fastest from public failures all did the same thing: they named the failure on day one, took responsibility without excuses, and shared a concrete plan within a week. That pattern works.", element: "Strong Close", color: "gold" },

              { text: "[Q2] You should chase profitability the moment your growth rate drops below about 40% annually, or the moment VC funding becomes expensive — whichever comes first. Profitability is insurance against market conditions you can't control. Companies that learn to operate profitably can always choose to spend for growth later; companies dependent on fundraising can't make that choice.", element: "Concise Answer", color: "orange" },
              { text: "[Q3] Talk to 50 customers before you write a single line of code. That's it. Most first-time founders want to skip this — it feels slow and uncomfortable — but it's the single highest-ROI activity in the first six months. The founders who do it build things people actually buy. The ones who skip it build elegant solutions to imaginary problems.", element: "Strong Close", color: "gold" },

              { text: "[Q2] You can't fix toxic culture without removing the toxic people, and that includes leadership. I've watched ten attempts at 'culture workshops' — they all failed until the organization was willing to remove its highest-performing jerks. Culture is 90% who you tolerate, not what you write on walls.", element: "Concise Answer", color: "orange" },

      {
        id: "6-3", title: "Speech Critique", timeLimit: 120,
        subtitle: "Identify → Diagnose → Recommend",
        description: "Great communicators can analyze speech as well as deliver it. This exercise gives you a transcript of a flawed speech and asks you to identify structural problems, diagnose why they weaken the message, and recommend specific fixes. This builds your analytical eye.",
        elements: [
          { name: "Identify", color: "teal", desc: "Name the specific structural flaws you notice" },
          { name: "Diagnose", color: "orange", desc: "Explain WHY each flaw weakens the speech" },
          { name: "Recommend", color: "gold", desc: "Suggest specific, actionable improvements" },
        ],
        expertTip: "When critiquing, always start with what works before addressing flaws. Then be specific: 'The opening lacks a hook' is better than 'The opening is weak.' Best of all: 'Replace the opening fact-dump with a story or surprising statistic to create a knowledge gap.' Give the fix, not just the diagnosis.",
        example: {
          prompt: "Critique this speech opening: 'Hi everyone, thanks for being here. So, I wanted to talk about our Q3 results. So basically, we did pretty good overall. There were some challenges but we managed. Let me start by saying...'",
          response: [
            { text: "Three structural issues stand out. First, the opening has no hook — it starts with filler ('Hi everyone, thanks for being here') instead of grabbing attention. Second, 'pretty good overall' is vague — there are no specifics. Third, 'Let me start by saying' at the end means the speaker hasn't actually started yet after 30 seconds.", element: "Identify", color: "teal" },
            { text: "These flaws matter because the audience decides in the first 10 seconds whether to pay attention. Vague language ('pretty good,' 'some challenges') signals the speaker isn't prepared. And the delayed start ('let me start by saying') erodes confidence — if you have to announce you're starting, you haven't started.", element: "Diagnose", color: "orange" },
            { text: "My recommended rewrite: 'Revenue grew 18% this quarter — our strongest Q3 in five years. I'll cover three things: what drove this growth, the one risk that nearly derailed it, and what we're doing differently in Q4.' This uses the Pyramid Principle — headline first, then a roadmap. It's direct, specific, and creates curiosity.", element: "Recommend", color: "gold" },
          ]
        },
        prompts: [
          {
            text: "Critique this opening: 'Hi everyone, thanks for being here. So, I wanted to talk about our Q3 results. We did pretty good overall. There were some challenges but we managed.'",
            modelResponse: [
              { text: "Three structural issues stand out. First, the opening has no hook — it starts with filler ('Hi everyone, thanks for being here') instead of grabbing attention. Second, 'pretty good overall' is vague — there are no specifics. Third, 'Let me start by saying' implies the speaker hasn't actually started yet after 30 seconds.", element: "Identify", color: "teal" },
              { text: "These flaws matter because the audience decides in the first 10 seconds whether to pay attention. Vague language ('pretty good,' 'some challenges') signals the speaker isn't prepared. And the delayed start erodes confidence — if you have to announce you're starting, you haven't started.", element: "Diagnose", color: "orange" },
              { text: "My recommended rewrite: 'Revenue grew 18% this quarter — our strongest Q3 in five years. I'll cover three things: what drove this growth, the one risk that nearly derailed it, and what we're doing differently in Q4.' This uses the Pyramid Principle — headline first, then a roadmap. It's direct, specific, and creates curiosity.", element: "Recommend", color: "gold" },
            ]
          },
          {
            text: "Critique this self-introduction: 'I'm John. I work in marketing. I've been here a while. I do various things related to campaigns and stuff.'",
            modelResponse: [
              { text: "Three structural issues. First, there's no value — 'I do various things' tells the listener nothing about John's actual contribution. Second, 'a while' and 'stuff' are classic hedging words that suggest the speaker doesn't know his own impact. Third, there's no hook at all — nothing memorable, nothing to remember John by ten minutes later.", element: "Identify", color: "teal" },
              { text: "These flaws matter because self-introductions are first-impression moments — the audience is actively deciding how much credibility to grant the speaker. Vague language like 'stuff' triggers immediate dismissal. And without a hook, John becomes forgettable within minutes, which means no relationships get built.", element: "Diagnose", color: "orange" },
              { text: "Apply the Name-Role-Value-Hook framework: 'Hi, I'm John Martinez. I run the email marketing program — I've been here three years. My team has driven customer re-engagement from 12% to 31% since I took over, mostly through behavioral triggers we built from scratch. Outside of work, I'm training for my first Ironman in November, which is probably why I drink three coffees a meeting.' Same person, but now memorable and credible.", element: "Recommend", color: "gold" },
            ]
          },
          {
            text: "Critique this Q&A answer: 'That's a really great question. Hmm, let me think. So, I guess the answer is kind of complicated. There are lots of factors. Does that make sense?'",
            modelResponse: [
              { text: "Three flaws. First, the opening 'That's a really great question' is a stall — it signals the speaker doesn't actually have an answer. Second, the middle is pure hedging: 'I guess,' 'kind of,' 'lots of factors' — no commitment to anything. Third, ending with 'Does that make sense?' hands authority back to the questioner and implies the speaker isn't confident in what they just said.", element: "Identify", color: "teal" },
              { text: "These matter because Q&A is where credibility is tested most directly. Hedging answers make the speaker look unprepared, and the 'does that make sense' tag signals insecurity even if the answer was actually good. In high-stakes moments, this pattern costs people jobs and funding rounds.", element: "Diagnose", color: "orange" },
              { text: "Use the Validate-Answer-Bridge-Close framework. Rewrite: 'I appreciate the challenge — it's a fair question. The short answer is yes, there are three main factors: customer demand, regulatory timing, and team capacity. The most important is team capacity, which is why I'm recommending we delay the launch by two weeks. I'm happy to walk through the details with anyone after this.' Direct, specific, and confident.", element: "Recommend", color: "gold" },
            ]
          },
          {
            text: "Critique this proposal: 'We should probably maybe consider looking into possibly implementing a new system at some point in the near future, if everyone is OK with that.'",
            modelResponse: [
              { text: "The biggest flaw is that every word in this sentence hedges. 'Should probably,' 'maybe,' 'consider,' 'looking into,' 'possibly,' 'at some point,' 'in the near future,' and 'if everyone is OK with that' — that's eight separate hedges in a single sentence. There's also no specific proposal — we have no idea what system, what timeline, or what problem it solves.", element: "Identify", color: "teal" },
              { text: "These flaws matter because hedging language destroys persuasive power. Every hedge signals 'I'm not confident in what I'm saying, so don't hold me to it.' When leaders hear that much uncertainty, they dismiss the proposal regardless of whether the idea is good. And without a specific proposal, there's nothing for anyone to actually approve or reject.", element: "Diagnose", color: "orange" },
              { text: "Use executive-presence language and state the proposal directly: 'I'm proposing we migrate to Salesforce by the end of Q3. Our current CRM is losing us an estimated $800K annually in missed follow-ups, and Salesforce would recover that within six months. I'd like your approval to kick off the migration in two weeks.' Same idea, but now it's actually a proposal someone can decide on.", element: "Recommend", color: "gold" },
            ]
          },
          {
            text: "Critique this opening hook: 'According to Google, communication is defined as the act of transferring information from one place to another. Today I want to talk about communication.'",
            modelResponse: [
              { text: "Two big flaws. First, starting with a dictionary definition is one of the most common and deadly speech openings — it instantly signals that the speaker has nothing original to say. Second, 'Today I want to talk about communication' is a meta-commentary about the topic instead of actual content — it wastes the precious first 15 seconds.", element: "Identify", color: "teal" },
              { text: "These matter because the first 10 seconds determine whether the audience mentally commits to listening or starts checking their phones. Dictionary openings trigger an immediate 'this is going to be boring' reflex. And announcing that you're going to talk about a topic is a waste — just talk about it.", element: "Diagnose", color: "orange" },
              { text: "Replace the opener with a hook that creates a knowledge gap. For example: 'Last year, a Harvard study found that the average manager spends 70% of their day communicating — and rates their own communication skills as a 9 out of 10. Their teams rate those same managers at 4. That gap, between how we think we communicate and how we actually do, is what I'm going to unpack in the next 15 minutes.' Now the audience is curious and ready to listen.", element: "Recommend", color: "gold" },
            ]
          },
        ],
        checklist: [
          { label: "I identified specific structural flaws (not just 'it's weak')", category: "Structure", points: 15 },
          { label: "I diagnosed WHY each flaw weakens the speech", category: "Structure", points: 15 },

        ],

// ========== SETTINGS HELPERS ==========
// Returns the effective time limit for a lesson, scaled by the timer multiplier setting.
function getEffectiveTimeLimit(lesson) {
  if (!lesson) return 60;
  const multiplier = (state.settings && state.settings.timerMultiplier) || 1;
  return Math.max(15, Math.round(lesson.timeLimit * multiplier));
}

// Applies the difficulty multiplier to a score category's points.
// easy: +10%, normal: 1x, hard: -10%
function applyDifficulty(points) {
  const diff = (state.settings && state.settings.difficulty) || 'normal';
  if (diff === 'easy')  return Math.round(points * 1.10);
  if (diff === 'hard')  return Math.round(points * 0.90);
  return points;
}

// ========== SOUND EFFECTS (Web Audio API) ==========
// Simple programmatic tones — no external sound files. Controlled by state.settings.soundEffects.
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      return null;
    }
  }
  // Resume if suspended (browsers suspend audio contexts until user gesture)
  if (_audioCtx.state === 'suspended') {
    _audioCtx.resume().catch(() => {});
  }
  return _audioCtx;
}

function playTone(freq, duration, type, volume) {
  if (!state.settings || !state.settings.soundEffects) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    const vol = (volume !== undefined) ? volume : 0.08;
    // Short attack + exponential decay — feels natural
    gain.gain.linearRampToValueAtTime(vol, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  } catch (e) {
    // Fail silently
  }
}

function playClick() { playTone(880, 0.06, 'sine', 0.04); haptic('tick'); }
function playPass()  { playTone(660, 0.09, 'sine', 0.1); setTimeout(() => playTone(990, 0.15, 'sine', 0.1), 90); haptic('pass'); }
function playMastery() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.18, 'sine', 0.08), i * 120));
  haptic('mastery');
}
function playFail() { playTone(220, 0.22, 'sine', 0.06); haptic('fail'); }

// ========== HAPTIC FEEDBACK ==========
// Uses navigator.vibrate where supported (Android, some Chromium browsers).
// iOS Safari doesn't expose Vibration API reliably, but AudioContext click sounds
// serve as the iOS equivalent. Controlled by state.settings.hapticsEnabled.
function haptic(kind) {
  if (!state.settings || !state.settings.hapticsEnabled) return;
  if (typeof navigator === 'undefined' || typeof navigator.vibrate !== 'function') return;
  try {
    // Pattern units are milliseconds. Alternating on/off for multi-pulse patterns.
    const patterns = {
      tick:     [8],              // faintest — for button taps / submissions
      pass:     [30],             // single firm tap — lesson passed
      mastery:  [25, 40, 25, 40, 60], // celebratory triple pulse
      fail:     [60],             // soft buzz — below pass mark
      attack:   [12, 20, 12],     // staccato — devil's advocate
      unlock:   [40, 60, 40]      // double pulse — something just unlocked
    };
    navigator.vibrate(patterns[kind] || patterns.tick);
  } catch (e) {
    // Non-fatal — some browsers block without user gesture
  }
}

// ========== FRAMEWORK FLASHCARD REVIEW ==========
// Study mode: quick quizzes to reinforce framework element memory.
// Stores a simple flashcard score per lesson: { correct: n, incorrect: n }
// For frontend logic, we generate questions from lesson data.

function buildFlashcardDeck() {
  // Build questions from all UNLOCKED lessons that have framework elements.
  const deck = [];
  for (const track of TRACKS) {
    if (!isTrackUnlocked(track.id)) continue;
    for (let i = 0; i < track.lessons.length; i++) {
      const lesson = track.lessons[i];
      if (!isLessonUnlocked(lesson.id)) continue;
      if (!lesson.elements || lesson.elements.length === 0) continue;

      // Create 2 questions per lesson:
      // Q1: "What are the elements of <framework>?" (name the elements in order)
      // Q2: "What does <element> mean in <framework>?" (pick one random element)
      deck.push({
        type: 'list',
        lessonId: lesson.id,
        lessonTitle: lesson.title,
        trackName: track.name,
        subtitle: lesson.subtitle,
        question: `Name the ${lesson.elements.length} elements of the ${lesson.title} framework.`,
        answer: lesson.elements,
        elementNames: lesson.elements.map(e => e.name).join(' → ')
      });

      // Q2 — pick one element
      const pickedElement = lesson.elements[Math.floor(Math.random() * lesson.elements.length)];
      deck.push({
        type: 'definition',
        lessonId: lesson.id,
        lessonTitle: lesson.title,
        trackName: track.name,
        question: `In the ${lesson.title} framework, what does "${pickedElement.name}" mean?`,
        answer: pickedElement,
        elementName: pickedElement.name,
        elementDesc: pickedElement.desc,
        elementColor: pickedElement.color
      });
    }
  }
  // Shuffle
  return deck.sort(() => Math.random() - 0.5);
}

let _flashcardSession = { deck: [], index: 0, correct: 0, incorrect: 0, revealed: false, active: false };

function startFlashcardReview() {
  playClick();
  const deck = buildFlashcardDeck();
  if (deck.length === 0) {
    showToast('Unlock some lessons first to build your flashcard deck.');
    return;
  }
  _flashcardSession = {
    deck,
    index: 0,
    correct: 0,
    incorrect: 0,
    revealed: false,
    active: true
  };
  renderFlashcardStep();
}

function renderFlashcardStep() {
  const s = _flashcardSession;
  if (!s.active) return;
  const card = s.deck[s.index];

  // Remove existing overlay
  const existing = document.querySelector('.flashcard-overlay');
  if (existing) existing.remove();

  if (!card) {
    renderFlashcardSummary();
    return;
  }

  const total = s.deck.length;
  const progress = ((s.index + 1) / total) * 100;

  let questionHTML, answerHTML;
  if (card.type === 'list') {
    questionHTML = `
      <div class="flashcard-context">${card.trackName} · ${card.subtitle}</div>
      <div class="flashcard-question">${card.question}</div>
    `;
    answerHTML = `
      <div class="flashcard-answer-label">Answer</div>
      <div class="flashcard-answer-chips">
        ${card.answer.map(el => `
          <div class="model-chip" style="background:var(${getElementBgVar(el.color)});border-color:var(${getElementColorVar(el.color)});color:var(${getElementColorVar(el.color)})">
            ${el.name}
          </div>
        `).join('')}
      </div>
      <div class="flashcard-answer-sequence">${card.elementNames}</div>
    `;
  } else {
    // definition type
    questionHTML = `
      <div class="flashcard-context">${card.trackName} · ${card.lessonTitle}</div>
      <div class="flashcard-question">${card.question}</div>
    `;
    answerHTML = `
      <div class="flashcard-answer-label">Answer</div>
      <div class="flashcard-answer-definition" style="border-left-color:var(${getElementColorVar(card.elementColor)});background:var(${getElementBgVar(card.elementColor)})">
        <strong style="color:var(${getElementColorVar(card.elementColor)})">${card.elementName}</strong>
        <br>
        ${card.elementDesc}
      </div>
    `;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay flashcard-overlay';
  overlay.innerHTML = `
    <div class="modal-card flashcard-card">
      <button class="modal-close" onclick="cancelFlashcardReview()">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
      <div class="flashcard-header">
        <span class="flashcard-step-label">Card ${s.index + 1} of ${total}</span>
        <div class="flashcard-score-pill">
          <i data-lucide="check" style="width:10px;height:10px;color:var(--green)"></i> ${s.correct}
          <span style="margin:0 0.25rem;color:var(--text-muted)">·</span>
          <i data-lucide="x" style="width:10px;height:10px;color:var(--red)"></i> ${s.incorrect}
        </div>
      </div>
      <div class="flashcard-progress-bar">
        <div class="flashcard-progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="flashcard-body">
        ${questionHTML}
        ${s.revealed ? `
          <div class="flashcard-answer">
            ${answerHTML}
          </div>
        ` : `
          <div class="flashcard-hint">Think about the answer, then click below to reveal.</div>
        `}
      </div>
      <div class="flashcard-actions">
        ${!s.revealed ? `
          <button class="btn btn-primary btn-lg" onclick="revealFlashcard()">
            <i data-lucide="eye" style="width:14px;height:14px"></i>
            Show Answer
          </button>
        ` : `
          <button class="btn btn-secondary" onclick="rateFlashcard(false)">
            <i data-lucide="x" style="width:14px;height:14px;color:var(--red)"></i>
            Not Yet
          </button>
          <button class="btn btn-primary" onclick="rateFlashcard(true)">
            <i data-lucide="check" style="width:14px;height:14px"></i>
            Got It
          </button>
        `}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  lucide.createIcons();
}

function revealFlashcard() {
  playClick();
  _flashcardSession.revealed = true;
  renderFlashcardStep();
}

function rateFlashcard(correct) {
  playClick();
  const s = _flashcardSession;
  if (correct) {
    s.correct++;
    playTone(660, 0.08, 'sine', 0.06);
  } else {
    s.incorrect++;
  }
  s.index++;
  s.revealed = false;
  if (s.index >= s.deck.length) {
    renderFlashcardSummary();
  } else {
    renderFlashcardStep();
  }
}

function renderFlashcardSummary() {
  const s = _flashcardSession;
  const existing = document.querySelector('.flashcard-overlay');
  if (existing) existing.remove();

  const total = s.correct + s.incorrect;
  const accuracy = total > 0 ? Math.round((s.correct / total) * 100) : 0;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay flashcard-overlay';
  overlay.innerHTML = `
    <div class="modal-card flashcard-card flashcard-summary-card">
      <button class="modal-close" onclick="cancelFlashcardReview()">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
      <div class="flashcard-summary-icon">
        <i data-lucide="${accuracy >= 80 ? 'trophy' : accuracy >= 60 ? 'thumbs-up' : 'book-open'}" style="width:36px;height:36px"></i>
      </div>
      <h2 class="flashcard-summary-title">${accuracy >= 80 ? 'Excellent!' : accuracy >= 60 ? 'Good work!' : 'Keep studying!'}</h2>
      <div class="flashcard-summary-stats">
        <div class="flashcard-summary-stat">
          <div class="flashcard-summary-stat-value" style="color:var(--green)">${s.correct}</div>
          <div class="flashcard-summary-stat-label">Got it</div>
        </div>
        <div class="flashcard-summary-stat">
          <div class="flashcard-summary-stat-value" style="color:var(--red)">${s.incorrect}</div>
          <div class="flashcard-summary-stat-label">Not yet</div>
        </div>
        <div class="flashcard-summary-stat">
          <div class="flashcard-summary-stat-value" style="color:var(--teal)">${accuracy}%</div>
          <div class="flashcard-summary-stat-label">Accuracy</div>
        </div>
      </div>
      <p class="flashcard-summary-note">
        ${accuracy >= 80
          ? 'You know these frameworks cold. Put them to use in real practice.'
          : accuracy >= 60
          ? 'Solid recall. A few more study sessions and you\'ll have them all memorized.'
          : 'Frameworks take repetition to stick. Review the Theory cards and try again in a day or two.'}
      </p>
      <div class="flashcard-actions">
        <button class="btn btn-secondary" onclick="cancelFlashcardReview()">Close</button>
        <button class="btn btn-primary" onclick="startFlashcardReview()">
          <i data-lucide="refresh-cw" style="width:14px;height:14px"></i>
          Study Again
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  lucide.createIcons();
  if (accuracy >= 80) playMastery();
}

function cancelFlashcardReview() {
  _flashcardSession.active = false;
  const existing = document.querySelector('.flashcard-overlay');
  if (existing) existing.remove();
  playClick();
}

let _onboardingState = { step: 0, active: false };

function startOnboarding() {
  _onboardingState = { step: 0, active: true };
  renderOnboardingStep();
}

function renderOnboardingStep() {
  const s = _onboardingState;
  if (!s.active) return;
  const step = ONBOARDING_STEPS[s.step];
  if (!step) { finishOnboarding(); return; }

  // Navigate to the right view first (if different)
  if (step.view && state.currentView !== step.view && !state.currentLesson) {
    window.location.hash = step.view;
    // Wait a tick for the view to render before showing the overlay
    setTimeout(() => renderOnboardingOverlay(step), 250);
    return;
  }
  renderOnboardingOverlay(step);
}

function renderOnboardingOverlay(step) {
  // Remove any existing overlay
  const existing = document.querySelector('.onboarding-overlay');
  if (existing) existing.remove();

  const s = _onboardingState;
  const totalSteps = ONBOARDING_STEPS.length;
  const stepNum = s.step + 1;

  // Compute spotlight position (if a target is given)
  let spotlight = null;
  if (step.target) {
    const el = document.querySelector(step.target);
    if (el) {
      const rect = el.getBoundingClientRect();
      // Skip spotlight if the element is off-screen or invisible
      if (rect.width > 0 && rect.height > 0) {
        spotlight = {
          top: rect.top + window.scrollY,
          left: rect.left + window.scrollX,
          width: rect.width,
          height: rect.height
        };
        // Scroll the element into view
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }

  const overlay = document.createElement('div');
  overlay.className = 'onboarding-overlay';
  overlay.innerHTML = `
    ${spotlight ? `
      <div class="onboarding-spotlight" style="
        top:${spotlight.top - 8}px;
        left:${spotlight.left - 8}px;
        width:${spotlight.width + 16}px;
        height:${spotlight.height + 16}px;
      "></div>
    ` : ''}
    <div class="onboarding-tooltip ${spotlight ? 'with-target' : 'centered'}">
      <div class="onboarding-header">
        <div class="onboarding-step-indicator">Step ${stepNum} of ${totalSteps}</div>
        <button class="onboarding-skip" onclick="skipOnboarding()">Skip tour</button>
      </div>
      <div class="onboarding-icon">
        <i data-lucide="${step.icon}" style="width:24px;height:24px"></i>
      </div>
      <h3 class="onboarding-title">${step.title}</h3>
      <p class="onboarding-body">${step.body}</p>
      <div class="onboarding-progress-bar">
        <div class="onboarding-progress-fill" style="width:${(stepNum / totalSteps) * 100}%"></div>
      </div>
      <div class="onboarding-actions">
        ${s.step > 0 ? `
          <button class="btn btn-ghost" onclick="prevOnboardingStep()">
            <i data-lucide="arrow-left" style="width:14px;height:14px"></i> Back
          </button>
        ` : '<div></div>'}
        <button class="btn btn-primary" onclick="nextOnboardingStep()">
          ${stepNum === totalSteps ? 'Finish' : 'Next'}
          <i data-lucide="${stepNum === totalSteps ? 'check' : 'arrow-right'}" style="width:14px;height:14px"></i>
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  lucide.createIcons();
}

function nextOnboardingStep() {
  playClick();
  _onboardingState.step++;
  if (_onboardingState.step >= ONBOARDING_STEPS.length) {
    finishOnboarding();
  } else {
    renderOnboardingStep();
  }
}

function prevOnboardingStep() {
  playClick();
  if (_onboardingState.step > 0) {
    _onboardingState.step--;
    renderOnboardingStep();
  }
}

function skipOnboarding() {
  if (!confirm('Skip the tour? You can restart it anytime from Settings.')) return;
  finishOnboarding();
}

function finishOnboarding() {
  _onboardingState.active = false;
  const existing = document.querySelector('.onboarding-overlay');
  if (existing) existing.remove();
  state.onboardingComplete = true;
  saveState();
  playMastery();
  showToast("You're all set — happy practicing!");
  // Navigate back to dashboard
  if (state.currentView !== 'dashboard') {
    window.location.hash = 'dashboard';
  }
}

// ========== THEME MANAGEMENT ==========
function toggleTheme() {
  // Toggle between light and dark. Keeps state.settings.theme in sync.
  const newTheme = state.theme === 'light' ? 'dark' : 'light';
  state.theme = newTheme;
  if (state.settings) state.settings.theme = newTheme;
  document.documentElement.setAttribute('data-theme', newTheme);
  const lightIcon = document.querySelector('.theme-icon-light');
  const darkIcon = document.querySelector('.theme-icon-dark');
  if (lightIcon) lightIcon.classList.toggle('hidden', newTheme === 'dark');
  if (darkIcon) darkIcon.classList.toggle('hidden', newTheme === 'light');
  if (typeof saveState === 'function') saveState();
  playClick();
}

// (System preference detection is handled in init() after STORAGE_KEY is defined and state is loaded.)

// ========== ROUTING ==========
function navigate(view, params) {
  playClick();
  exitFocusModeIfActive();
  if (view === 'lesson' && params) {
    window.location.hash = `lesson/${params.trackId}/${params.lessonIndex}`;
  } else {
    window.location.hash = view;
  }
}

function handleRoute() {
  const hash = window.location.hash.slice(1) || 'dashboard';
  const parts = hash.split('/');
  const viewName = parts[0];

  // Hide all views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  // Update nav active states
  document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(l => {
    l.classList.toggle('active', l.dataset.view === viewName);
  });

  if (viewName === 'lesson' && parts.length === 3) {
    const trackId = parseInt(parts[1]);
    const lessonIndex = parseInt(parts[2]);
    openLesson(trackId, lessonIndex);
    document.getElementById('view-lesson').classList.add('active');
    state.currentView = 'lesson';
  } else {
    const viewEl = document.getElementById(`view-${viewName}`);
    if (viewEl) {
      viewEl.classList.add('active');
      state.currentView = viewName;
      if (viewName === 'dashboard') renderDashboard();
      if (viewName === 'tracks') renderTracks();
      if (viewName === 'progress') renderProgress();
      if (viewName === 'settings') renderSettings();
      if (viewName === 'focus') renderFocusEntry();
      if (viewName === 'speed-tier') renderSpeedTierEntry();
    } else {
      document.getElementById('view-dashboard').classList.add('active');
      state.currentView = 'dashboard';
      renderDashboard();
    }
  }

  lucide.createIcons();
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', handleRoute);

// ========== HELPER FUNCTIONS ==========
function getLessonData(trackId, lessonIndex) {
  const track = TRACKS.find(t => t.id === trackId);
  if (!track) return null;
  return track.lessons[lessonIndex] || null;
}

function isLessonUnlocked(lessonId) {
  return !!state.unlockedLessons[lessonId];
}

function isLessonCompleted(lessonId) {
  return !!state.completedLessons[lessonId];
}

function isTrackUnlocked(trackId) {
  return !!state.unlockedTracks[trackId];
}

function getTrackCompletion(trackId) {
  const track = TRACKS.find(t => t.id === trackId);
  if (!track) return 0;
  const completed = track.lessons.filter(l => isLessonCompleted(l.id)).length;
  return Math.round((completed / track.lessons.length) * 100);
}

function getCompletedLessonCount() {
  return Object.keys(state.completedLessons).length;
}

function getMasteredFrameworkCount() {
  let count = 0;
  for (const [id, data] of Object.entries(state.lessonScores)) {
    if (data.best >= 85) count++;
  }
  return count;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : `0:${s.toString().padStart(2, '0')}`;
}

function getNextLesson() {
  for (const track of TRACKS) {
    if (!isTrackUnlocked(track.id)) continue;
    for (let i = 0; i < track.lessons.length; i++) {
      const lesson = track.lessons[i];
      if (isLessonUnlocked(lesson.id) && !isLessonCompleted(lesson.id)) {
        return { track, lesson, index: i };
      }
    }
  }
  return null;
}

// ---------- FAVORITES / PIN ----------
function isFavorite(lessonId) {
  return Array.isArray(state.favorites) && state.favorites.includes(lessonId);
}

function toggleFavorite(lessonId, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  if (!Array.isArray(state.favorites)) state.favorites = [];
  const idx = state.favorites.indexOf(lessonId);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
    showToast('Unstarred');
  } else {
    state.favorites.push(lessonId);
    haptic('tick');
    showToast('Starred — find it on the dashboard');
  }
  saveState();
  // Re-render whichever view is showing so the icon toggles
  if (state.currentView === 'tracks') renderTracks();
  else if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'lesson') {
    // Lesson header has a star button — re-render just the header
    const starBtn = document.querySelector('.lesson-star-btn');
    if (starBtn) {
      starBtn.classList.toggle('active');
      starBtn.querySelector('i')?.setAttribute('data-lucide', isFavorite(lessonId) ? 'star' : 'star');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
}

// Returns up to `limit` favorite lessons (with track metadata) in the user's pin order.
function getFavoriteLessons(limit) {
  if (!Array.isArray(state.favorites)) return [];
  const out = [];
  for (const lessonId of state.favorites) {
    const [tStr, iStr] = lessonId.split('-');
    const trackId = parseInt(tStr);
    const lessonIndex = parseInt(iStr) - 1;
    const track = TRACKS.find(t => t.id === trackId);
    const lesson = track?.lessons[lessonIndex];
    if (track && lesson) out.push({ track, lesson, lessonIndex });
    if (limit && out.length >= limit) break;
  }
  return out;
}

// Smart recommendation engine — returns the best action for the user right now.
// Priority order:
//   1. Daily challenge if not yet done today
//   2. Overdue review (Review & Improve candidate, weakest first)
//   3. Next sequential lesson (the classic "Continue" behavior)
//   4. Retry a lesson below mastery if the sequential is exhausted
function getSmartContinueTarget() {
  // 1. Daily challenge
  const dc = (typeof getDailyChallenge === 'function') ? getDailyChallenge() : null;
  if (dc && !dc.completed) {
    const track = TRACKS.find(t => t.id === dc.trackId);
    const lesson = track?.lessons[dc.lessonIndex];
    if (track && lesson) {
      return {
        reason: '⚡ Daily Challenge · 2× XP',
        title: lesson.title,
        subtitle: `${track.name} · available today only`,
        icon: 'zap',
        iconBg: 'var(--gold-light)',
        iconColor: 'var(--gold)',
        onclick: "startDailyChallenge()"
      };
    }
  }

  // 2. Review & Improve — weakest passed-but-not-mastered lesson
  if (typeof getReviewCandidates === 'function') {
    const candidates = getReviewCandidates(1);
    if (candidates.length > 0) {
      const c = candidates[0];
      return {
        reason: '🔄 Review & Improve',
        title: c.lesson.title,
        subtitle: `${c.track.name} · best so far: ${c.best} pts`,
        icon: 'refresh-cw',
        iconBg: 'var(--orange-light)',
        iconColor: 'var(--orange)',
        onclick: `navigate('lesson', { trackId: ${c.trackId}, lessonIndex: ${c.lessonIndex} })`
      };
    }
  }

  // 3. Next sequential lesson
  const next = getNextLesson();
  if (next) {
    return {
      reason: '▶ Continue your curriculum',
      title: next.lesson.title,
      subtitle: `${next.track.name} · ${next.lesson.subtitle}`,
      icon: 'play',
      iconBg: 'var(--teal-light)',
      iconColor: 'var(--teal)',
      onclick: `navigate('lesson', { trackId: ${next.track.id}, lessonIndex: ${next.index} })`
    };
  }

  // 4. Fallback: retry a lesson below mastery (all lessons passed already)
  const passMark = (state.settings && state.settings.passMark) || 70;
  const masteryMark = Math.min(95, passMark + 15);
  let weakest = null;
  for (const [lessonId, data] of Object.entries(state.lessonScores)) {
    if (!data || typeof data.best !== 'number') continue;
    if (data.best >= masteryMark) continue;
    if (!weakest || data.best < weakest.best) {
      const [tStr, iStr] = lessonId.split('-');
      const track = TRACKS.find(t => t.id === parseInt(tStr));
      const lesson = track?.lessons[parseInt(iStr) - 1];
      if (lesson) weakest = { track, lesson, lessonIndex: parseInt(iStr) - 1, best: data.best };
    }
  }
  if (weakest) {
    return {
      reason: '⬆️ Push toward mastery',
      title: weakest.lesson.title,
      subtitle: `${weakest.track.name} · ${weakest.best} pts → aim for ${masteryMark}+`,
      icon: 'trending-up',
      iconBg: 'var(--teal-light)',
      iconColor: 'var(--teal)',
      onclick: `navigate('lesson', { trackId: ${weakest.track.id}, lessonIndex: ${weakest.lessonIndex} })`
    };
  }

  return null;
}

function getElementColorVar(colorName) {
  const map = { teal: '--teal', orange: '--orange', gold: '--gold', blue: '--blue', red: '--red', green: '--green' };
  return map[colorName] || '--teal';
}

function getElementBgVar(colorName) {
  const map = { teal: '--teal-light', orange: '--orange-light', gold: '--gold-light', blue: '--blue-light', red: '--red-light', green: '--green-light' };
  return map[colorName] || '--teal-light';
}

// ========== RENDER DASHBOARD ==========
function renderDashboard() {
  // Update level
  updateLevel();

  // Stats
  document.getElementById('stat-lessons').textContent = getCompletedLessonCount();
  document.getElementById('stat-frameworks').textContent = getMasteredFrameworkCount();
  const mins = Math.floor(state.totalPracticeSeconds / 60);
  document.getElementById('stat-time').textContent = mins > 0 ? `${mins}m` : '0m';
  document.getElementById('xp-display').textContent = `· ${state.xp} XP`;
  document.getElementById('current-level').textContent = state.level;

  // XP bar
  const xpProgress = getXPProgress();
  const nextLevel = getNextLevel();
  document.getElementById('xp-bar-fill').style.width = xpProgress.percent + '%';
  document.getElementById('xp-level-current').textContent = state.level;
  document.getElementById('xp-level-next').textContent = nextLevel
    ? `${xpProgress.needed} XP to ${nextLevel.title}`
    : 'Max Level Reached!';

  // Streak & activity calendar
  const streakSection = document.getElementById('streak-section');
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const iso = d.toISOString().slice(0, 10);
    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 2);
    const dayNum = d.getDate();
    days.push({ iso, dayName, dayNum, active: state.activityDays.includes(iso) });
  }
  streakSection.innerHTML = `
    <div class="streak-badge">
      <i data-lucide="flame" style="width:18px;height:18px"></i>
      ${state.streak} day${state.streak !== 1 ? 's' : ''}
    </div>
    <div class="activity-calendar">
      ${days.map(d => `
        <div class="cal-day ${d.active ? 'active' : ''}">
          <span class="cal-day-label">${d.dayName}</span>
          <span class="cal-day-num">${d.dayNum}</span>
        </div>
      `).join('')}
    </div>
  `;

  // Voice warmup entry button
  renderWarmupEntry();

  // Weekly goal card
  renderGoalCard();

  // Daily challenge card
  const dailySection = document.getElementById('daily-challenge-section');
  const dc = getDailyChallenge();
  if (dc) {
    const lesson = getLessonData(dc.trackId, dc.lessonIndex);
    const promptObj = lesson?.prompts[dc.promptIndex];
    const promptText = promptObj ? (typeof promptObj === 'string' ? promptObj : promptObj.text) : '';
    const track = TRACKS.find(t => t.id === dc.trackId);
    dailySection.innerHTML = `
      <div class="daily-challenge-card ${dc.completed ? 'completed' : ''}"
           ${dc.completed ? '' : `onclick="startDailyChallenge()"`}>
        <div class="daily-challenge-header">
          <i data-lucide="zap" style="width:14px;height:14px;color:var(--gold)"></i>
          <span class="daily-challenge-title">Today's Challenge</span>
          ${dc.completed
            ? `<span class="daily-challenge-completed-badge"><i data-lucide="check" style="width:10px;height:10px"></i> Done</span>`
            : `<span class="daily-challenge-bonus">2x XP</span>`}
        </div>
        <div class="daily-challenge-prompt">"${promptText}"</div>
        <div class="daily-challenge-meta">
          <i data-lucide="book-open" style="width:12px;height:12px"></i>
          ${lesson?.title || ''} · ${track?.name || ''}
        </div>
      </div>
    `;
  } else {
    dailySection.innerHTML = '';
  }

  // Progress ring
  const totalLessons = TRACKS.reduce((sum, t) => sum + t.lessons.length, 0);
  const completedCount = getCompletedLessonCount();
  const overallPercent = Math.round((completedCount / totalLessons) * 100);
  const circumference = 2 * Math.PI * 36;
  const dashOffset = circumference * (1 - overallPercent / 100);
  const progressRing = document.getElementById('progress-ring-container');
  progressRing.innerHTML = `
    <div class="progress-ring">
      <svg width="90" height="90">
        <circle class="progress-ring-bg" cx="45" cy="45" r="36"></circle>
        <circle class="progress-ring-fill" cx="45" cy="45" r="36"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${dashOffset}"></circle>
      </svg>
      <div class="progress-ring-label">${overallPercent}%</div>
    </div>
    <div class="progress-ring-info">
      <h3>Overall Progress</h3>
      <p>${completedCount} of ${totalLessons} lessons complete</p>
    </div>
  `;

  // Review & Improve section (spaced repetition)
  renderReviewSection();

  // Starred lessons section (favorites)
  renderStarredSection();

  // Smart "Continue where you left off" — picks the best next action for this moment
  const continueSection = document.getElementById('continue-section');
  const smart = getSmartContinueTarget();
  if (smart) {
    continueSection.innerHTML = `
      <div class="continue-card continue-card-smart" onclick="${smart.onclick}">
        <div class="continue-icon" style="background:${smart.iconBg};color:${smart.iconColor}">
          <i data-lucide="${smart.icon}" style="width:20px;height:20px"></i>
        </div>
        <div class="continue-info">
          <div class="continue-reason">${smart.reason}</div>
          <h3>${smart.title}</h3>
          <p>${smart.subtitle}</p>
        </div>
        <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--teal)"></i>
      </div>
    `;
  } else {
    continueSection.innerHTML = `
      <div class="card mb-2" style="text-align:center;padding:1.5rem">
        <p style="color:var(--text-secondary)">All available lessons completed! More tracks coming soon.</p>
      </div>
    `;
  }

  // (Recommended Next box was removed — the Smart Continue card above now handles recommendations)

  // Stage 4A: Focus Challenge + Speed Tier entry cards
  if (typeof renderPracticeModesSection === 'function') renderPracticeModesSection();
}

              ${t.suggestedTargets.map(target => `
                <button class="goal-target-btn${current && current.type === t.type && current.target === target ? ' active' : ''}"
                  onclick="setWeeklyGoalAndClose('${t.type}', ${target})">${target}</button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      ${current ? `
        <div style="margin-top:1rem;text-align:center">
          <button class="btn btn-ghost" onclick="clearGoalAndClose()">
            <i data-lucide="trash-2" style="width:14px;height:14px"></i>
            Remove Goal
          </button>
        </div>
      ` : ''}
    </div>
  `;
  document.body.appendChild(overlay);
  lucide.createIcons();

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
}

function setWeeklyGoalAndClose(type, target) {
  setWeeklyGoal(type, target);
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
  renderGoalCard();
  playClick();
}

function clearGoalAndClose() {
  if (!confirm('Remove your current weekly goal?')) return;
  clearWeeklyGoal();
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
  renderGoalCard();
}

    const completion = getTrackCompletion(track.id);
    return `

                <button class="btn btn-ghost" style="padding:0.2rem 0.5rem;font-size:0.7rem" onclick="event.stopPropagation();viewCertificate(${track.id})">

            `}
          </div>
        </div>

          ${track.lessons.map((lesson, li) => {
            const lessonUnlocked = isLessonUnlocked(lesson.id);
            const lessonCompleted = isLessonCompleted(lesson.id);
            const score = state.lessonScores[lesson.id];
            // Locked lessons still open in preview mode
            const clickHandler = lessonUnlocked
              ? `navigate('lesson', { trackId: ${track.id}, lessonIndex: ${li} })`
              : `openLessonPreview(${track.id}, ${li})`;

            return `
              <div class="lesson-item ${lessonUnlocked ? '' : 'lesson-preview'}"
                   onclick="${clickHandler}">

                     style="width:16px;height:16px"></i>
