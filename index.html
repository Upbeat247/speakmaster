// ========== EXPORT PRACTICE LOG ==========
// ========== EXPORT / IMPORT FULL PROGRESS ==========
// Exports the full user state as a JSON string. Used for cross-device sync.
function exportProgressJSON(btn) {
  try {
    // Build an export payload — same set of keys we persist to localStorage
    const payload = {
      _app: 'SpeakMaster',
      _version: 1,
      _exportedAt: new Date().toISOString()
    };
    PERSISTED_KEYS.forEach(k => {
      if (state[k] !== undefined) payload[k] = state[k];
    });

    const json = JSON.stringify(payload);

    // Try the clipboard API first, fall back to a textarea selection on older browsers
    const copyToClipboard = (text) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise((resolve, reject) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          document.execCommand('copy');
          resolve();
        } catch (e) { reject(e); }
        document.body.removeChild(ta);
      });
    };

    copyToClipboard(json).then(() => {
      playClick();
      // Visual confirmation
      if (btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="check" style="width:14px;height:14px"></i> Copied!';
        btn.classList.add('success');
        lucide.createIcons();
        setTimeout(() => {
          btn.innerHTML = original;
          btn.classList.remove('success');
          lucide.createIcons();
        }, 2500);
      }
      showToast(`Progress exported (${(json.length / 1024).toFixed(1)} KB) — now paste it into the other device's Import dialog.`);

      // Also offer a download as a backup — some phones can't easily paste long clipboard text
      // We create a data-URL anchor the user can tap to download
      try {
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const fileName = `speakmaster-progress-${new Date().toISOString().slice(0,10)}.json`;
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.textContent = 'Download backup file';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(url);
          document.body.removeChild(a);
        }, 1000);
      } catch (e) {
        // Non-fatal — the clipboard copy still worked
      }
    }).catch(() => {
      showToast('Could not access clipboard. Try again or use the download file.');
    });
  } catch (e) {
    showToast('Export failed: ' + e.message);
  }
}

function validateAndImportProgress() {
  const ta = document.getElementById('import-textarea');
  const validation = document.getElementById('import-validation');
  if (!ta || !ta.value.trim()) {
    validation.innerHTML = '<span style="color:var(--red)">Paste your exported JSON first.</span>';
    return;
  }

  let payload;
  try {
    payload = JSON.parse(ta.value.trim());
  } catch (e) {
    validation.innerHTML = '<span style="color:var(--red)">Invalid JSON. Make sure you copied the entire export.</span>';
    return;
  }

  if (!payload || typeof payload !== 'object') {
    validation.innerHTML = '<span style="color:var(--red)">This doesn\'t look like a SpeakMaster export.</span>';
    return;
  }

  if (payload._app !== 'SpeakMaster') {
    validation.innerHTML = '<span style="color:var(--red)">This JSON isn\'t from SpeakMaster.</span>';
    return;
  }

  // Show preview of what will be imported and confirm
  const xp = payload.xp || 0;
  const completed = payload.completedLessons ? Object.keys(payload.completedLessons).length : 0;
  const reflections = Array.isArray(payload.reflections) ? payload.reflections.length : 0;
  const achievements = Array.isArray(payload.achievements) ? payload.achievements.length : 0;
  const exportDate = payload._exportedAt ? new Date(payload._exportedAt).toLocaleDateString() : 'unknown';

  const confirmMsg =
    `This will replace your current progress with:\n\n` +
    `• ${xp} XP\n` +
    `• ${completed} lessons completed\n` +
    `• ${reflections} reflections\n` +
    `• ${achievements} achievements\n` +
    `• Exported: ${exportDate}\n\n` +
    `Are you sure? Your current progress on this device will be lost.`;

  if (!confirm(confirmMsg)) return;

  // Perform the import
  try {
    PERSISTED_KEYS.forEach(k => {
      if (payload[k] !== undefined) {
        // Merge settings object to preserve any newly added defaults
        if (k === 'settings' && typeof payload[k] === 'object') {
          state.settings = Object.assign({}, state.settings, payload[k]);
        } else {
          state[k] = payload[k];
        }
      }
    });
    saveState();
    playMastery();
    showToast('Progress imported successfully!');
    // Close the modal
    const overlay = document.querySelector('.import-overlay');
    if (overlay) overlay.remove();
    // Reload the current view to reflect the new state
    setTimeout(() => {
      applyTheme();
      handleRoute();
    }, 500);
  } catch (e) {
    validation.innerHTML = `<span style="color:var(--red)">Import failed: ${e.message}</span>`;
  }
}

function exportPracticeLog(btn) {
  if (state.practiceLog.length === 0) {
    showToast('No practice log yet — complete some lessons first');
    return;
  }

  let text = '# SpeakMaster Practice Log\n';
  text += `Exported: ${new Date().toLocaleString()}\n`;
  text += `Total entries: ${state.practiceLog.length}\n\n`;
  text += '='.repeat(60) + '\n\n';

  // Group by date (newest first)
  const sorted = [...state.practiceLog].sort((a, b) => new Date(b.date) - new Date(a.date));
  sorted.forEach((entry, i) => {
    const date = new Date(entry.date).toLocaleString();
    text += `## Entry ${i + 1} — ${entry.lessonTitle}\n`;
    text += `Date: ${date}\n`;
    text += `Score: ${entry.score}/100\n\n`;
    text += `Prompt: ${entry.prompt}\n\n`;
    text += `Response:\n${entry.response || '(empty)'}\n\n`;
    text += '-'.repeat(60) + '\n\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    if (btn) {
      btn.classList.add('success');
      const original = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="check" style="width:14px;height:14px"></i> Copied!';
      lucide.createIcons();
      setTimeout(() => {
        btn.classList.remove('success');
        btn.innerHTML = original;
        lucide.createIcons();
      }, 2000);
    }
    showToast(`Copied ${state.practiceLog.length} practice entries to clipboard`);
  }).catch(() => {
    showToast('Could not access clipboard — try again');
  });
}

// ========== CLOUD SYNC (Supabase) ==========
// Optional cloud sync using Supabase for cross-device progress sync.
// Credentials are stored per-device in localStorage — users paste them once.
// When signed in, state is pushed on every save and pulled on app load.

const SUPABASE_URL_KEY = 'speakmaster-supabase-url';
const SUPABASE_ANON_KEY_KEY = 'speakmaster-supabase-anon-key';
let supabaseClient = null;
let currentUser = null; // { id, email } when signed in
let isPullingFromCloud = false; // Prevents feedback loop between pull and push
let syncPushTimer = null;

function loadSupabaseConfig() {
  try {
    return {
      url: localStorage.getItem(SUPABASE_URL_KEY) || '',
      anonKey: localStorage.getItem(SUPABASE_ANON_KEY_KEY) || ''
    };
  } catch (e) {
    return { url: '', anonKey: '' };
  }
}

function saveSupabaseConfig(url, anonKey) {
  try {
    if (url) localStorage.setItem(SUPABASE_URL_KEY, url.trim());
    if (anonKey) localStorage.setItem(SUPABASE_ANON_KEY_KEY, anonKey.trim());
  } catch (e) {
    console.warn('Failed to save Supabase config:', e);
  }
}

function clearSupabaseConfig() {
  try {
    localStorage.removeItem(SUPABASE_URL_KEY);
    localStorage.removeItem(SUPABASE_ANON_KEY_KEY);
  } catch (e) {}
  supabaseClient = null;
  currentUser = null;
}

function isCloudConfigured() {
  const cfg = loadSupabaseConfig();
  return !!(cfg.url && cfg.anonKey);
}

// Initialize the Supabase client if credentials exist. Called on app startup.
async function initSupabase() {
  const cfg = loadSupabaseConfig();
  if (!cfg.url || !cfg.anonKey) return false;
  if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
    console.warn('Supabase SDK not loaded');
    return false;
  }
  try {
    supabaseClient = window.supabase.createClient(cfg.url, cfg.anonKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true
      }
    });

    // Check if the user is already signed in (from a previous session)
    const { data: sessionData } = await supabaseClient.auth.getSession();
    if (sessionData && sessionData.session && sessionData.session.user) {
      currentUser = {
        id: sessionData.session.user.id,
        email: sessionData.session.user.email
      };
      // Pull the latest state from cloud on startup
      await syncPullFromCloud();
    }

    // Listen for auth state changes (sign in, sign out, token refresh)
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session && session.user) {
        currentUser = { id: session.user.id, email: session.user.email };
      } else {
        currentUser = null;
      }
      updateAuthIndicator();
    });

    return true;
  } catch (e) {
    console.warn('Supabase init failed:', e);
    return false;
  }
}

// ---------- AUTH ----------
async function cloudSignUp(email, password) {
  if (!supabaseClient) throw new Error('Cloud sync not configured');
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) throw error;
  return data;
}

async function cloudSignIn(email, password) {
  if (!supabaseClient) throw new Error('Cloud sync not configured');
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) throw error;
  currentUser = { id: data.user.id, email: data.user.email };
  // Pull cloud state immediately after login
  await syncPullFromCloud();
  return data;
}

async function cloudSignOut() {
  if (!supabaseClient) return;
  await supabaseClient.auth.signOut();
  currentUser = null;
  updateAuthIndicator();
  showToast('Signed out of cloud sync');
}

// ---------- SYNC ----------
// Pull the latest state from cloud and merge if cloud is newer.
// Check if a state object has any real progress (vs being a fresh/empty device).
// Used to decide whether to prefer cloud or local during initial sync.
function hasRealProgress(s) {
  if (!s) return false;
  const xp = s.xp || 0;
  const completed = s.completedLessons ? Object.keys(s.completedLessons).length : 0;
  const attempts = s.lessonScores
    ? Object.values(s.lessonScores).reduce((sum, l) => sum + (l && l.attempts ? l.attempts : 0), 0)
    : 0;
  const logs = Array.isArray(s.practiceLog) ? s.practiceLog.length : 0;
  return xp > 0 || completed > 0 || attempts > 0 || logs > 0;
}

function isLocalStateEmpty() {
  return !hasRealProgress(state);
}

// Merge a cloud state blob into the current local state, then persist to
// localStorage without triggering another cloud push.
function mergeCloudIntoLocal(cloudState) {
  PERSISTED_KEYS.forEach(k => {
    if (cloudState[k] !== undefined) {
      if (k === 'settings' && typeof cloudState[k] === 'object') {
        state.settings = Object.assign({}, state.settings, cloudState[k]);
      } else {
        state[k] = cloudState[k];
      }
    }
  });
  // Persist without triggering another push
  try {
    const toSave = {};
    PERSISTED_KEYS.forEach(k => {
      if (state[k] !== undefined) toSave[k] = state[k];
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    console.warn('Failed to persist merged state:', e);
  }
}

async function syncPullFromCloud() {
  if (!supabaseClient || !currentUser) return;
  try {
    isPullingFromCloud = true;
    const { data, error } = await supabaseClient
      .from('user_states')
      .select('state, updated_at')
      .eq('user_id', currentUser.id)
      .maybeSingle();

    if (error) {
      console.warn('Sync pull error:', error);
      showToast('Sync failed: ' + (error.message || 'unknown error'));
      return;
    }

    const cloudHasData = data && data.state && hasRealProgress(data.state);
    const localHasData = !isLocalStateEmpty();

    // Case 1: Cloud is empty AND local is empty — fresh user on fresh device
    if (!cloudHasData && !localHasData) {
      showToast('Connected — start practicing and your progress will sync');
      return;
    }

    // Case 2: Cloud is empty but local has data — push local up for the first time
    if (!cloudHasData && localHasData) {
      await syncPushToCloud(true);
      showToast('Cloud sync initialized — your progress is now backed up');
      return;
    }

    // Case 3: Cloud has data but local is empty — ALWAYS pull from cloud (no timestamp check)
    // This is the critical fix: a fresh device should never overwrite the cloud with its empty state.
    if (cloudHasData && !localHasData) {
      mergeCloudIntoLocal(data.state);
      showToast('Progress loaded from cloud');
      setTimeout(() => { applyTheme(); handleRoute(); }, 300);
      return;
    }

    // Case 4: Both sides have data — use timestamps to pick the newer one
    const cloudMod = data.state.lastModified ? new Date(data.state.lastModified).getTime() : 0;
    const localMod = state.lastModified ? new Date(state.lastModified).getTime() : 0;
    if (cloudMod > localMod) {
      mergeCloudIntoLocal(data.state);
      showToast('Progress synced from cloud');
      setTimeout(() => { applyTheme(); handleRoute(); }, 300);
    }
    // If local is newer or equal, do nothing — next push will sync it up
  } catch (e) {
    console.warn('Sync pull exception:', e);
  } finally {
    isPullingFromCloud = false;
  }
}

// Push the current local state to cloud (debounced to avoid hammering).
// Will NOT push empty local state if the cloud already has real progress —
// this prevents a fresh device from wiping out the cloud accidentally.
async function syncPushToCloud(immediate) {
  if (!supabaseClient || !currentUser) return;
  if (isPullingFromCloud) return; // Avoid feedback loop

  // Debounce — wait 500ms after the last change before pushing
  clearTimeout(syncPushTimer);
  const push = async () => {
    try {
      // Safety: if local is empty, don't blindly overwrite cloud — peek first
      if (isLocalStateEmpty()) {
        try {
          const { data } = await supabaseClient
            .from('user_states')
            .select('state')
            .eq('user_id', currentUser.id)
            .maybeSingle();
          if (data && data.state && hasRealProgress(data.state)) {
            // Cloud has data, local is empty — DO NOT push. Pull instead.
            console.warn('Refused to push empty local state over real cloud data.');
            return;
          }
        } catch (e) { /* fall through and push anyway */ }
      }

      const payload = {};
      PERSISTED_KEYS.forEach(k => {
        if (state[k] !== undefined) payload[k] = state[k];
      });
      if (!payload.lastModified) payload.lastModified = new Date().toISOString();

      const { error } = await supabaseClient
        .from('user_states')
        .upsert({
          user_id: currentUser.id,
          state: payload,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });

      if (error) {
        console.warn('Sync push error:', error);
      }
    } catch (e) {
      console.warn('Sync push exception:', e);
    }
  };

  if (immediate) {
    await push();
  } else {
    syncPushTimer = setTimeout(push, 500);
  }
}

// ---------- MANUAL SYNC (Force Push / Force Pull) ----------
// Force Push: overwrite cloud with local, bypassing all safety checks.
// Use this on the device that has the "source of truth" data.
async function forceCloudPush() {
  if (!supabaseClient || !currentUser) {
    showToast('Sign in first');
    return;
  }
  const xp = state.xp || 0;
  const completed = Object.keys(state.completedLessons || {}).length;
  if (!confirm(`FORCE PUSH will OVERWRITE the cloud copy with this device's progress:\n\n• ${xp} XP\n• ${completed} lessons completed\n\nAny data on other devices will be REPLACED with this device's state.\n\nContinue?`)) return;

  try {
    const payload = {};
    PERSISTED_KEYS.forEach(k => {
      if (state[k] !== undefined) payload[k] = state[k];
    });
    payload.lastModified = new Date().toISOString();

    const { error } = await supabaseClient
      .from('user_states')
      .upsert({
        user_id: currentUser.id,
        state: payload,
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });

    if (error) {
      showToast('Force push failed: ' + error.message);
      return;
    }
    playMastery();
    showToast(`Pushed ${xp} XP and ${completed} lessons to cloud`);
  } catch (e) {
    showToast('Force push failed: ' + e.message);
  }
}

// Force Pull: replace local with cloud, bypassing all safety checks.
// Use this on a device where you want to load whatever is in the cloud.
async function forceCloudPull() {
  if (!supabaseClient || !currentUser) {
    showToast('Sign in first');
    return;
  }
  if (!confirm(`FORCE PULL will REPLACE this device's progress with whatever is in the cloud.\n\nAny progress on this device that hasn't synced yet will be LOST.\n\nContinue?`)) return;

  try {
    const { data, error } = await supabaseClient
      .from('user_states')
      .select('state, updated_at')
      .eq('user_id', currentUser.id)
      .maybeSingle();

    if (error) {
      showToast('Force pull failed: ' + error.message);
      return;
    }
    if (!data || !data.state) {
      showToast('Cloud has no data yet. Practice on another device first, or click Force Push here.');
      return;
    }

    mergeCloudIntoLocal(data.state);
    const xp = state.xp || 0;
    const completed = Object.keys(state.completedLessons || {}).length;
    playMastery();
    showToast(`Pulled ${xp} XP and ${completed} lessons from cloud`);
    setTimeout(() => { applyTheme(); handleRoute(); }, 300);
  } catch (e) {
    showToast('Force pull failed: ' + e.message);
  }
}

// Simple HTML escape helper (safe for attributes and text nodes)
function escapeHtmlSafe(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function saveCloudConfig() {
  const url = (document.getElementById('cfg-url').value || '').trim();
  const key = (document.getElementById('cfg-key').value || '').trim();
  const errorEl = document.getElementById('cfg-error');

  if (!url || !key) {
    errorEl.textContent = 'Both URL and anon key are required.';
    return;
  }
  if (!url.startsWith('https://') || !url.includes('.supabase.co')) {
    errorEl.textContent = 'URL should look like https://xxxxxxxx.supabase.co';
    return;
  }
  if (key.length < 30 || !key.startsWith('eyJ')) {
    errorEl.textContent = 'Anon key looks incorrect. It should be a long string starting with "eyJ".';
    return;
  }

  saveSupabaseConfig(url, key);
  const ok = await initSupabase();
  if (ok) {
    playClick();
    showToast('Cloud sync configured! Now sign in.');
    const overlay = document.querySelector('.cloud-config-overlay');
    if (overlay) overlay.remove();
    renderSettings();
    updateAuthIndicator();
    // Automatically open the login dialog so the user can sign in right away
    setTimeout(() => openLoginDialog(), 400);
  } else {
    errorEl.textContent = 'Failed to initialize Supabase — check your URL and key, then try again.';
  }
}

// ========== INIT ==========
// ========== PERSISTENCE (localStorage) ==========
const STORAGE_KEY = 'speakmaster-v1';
const PERSISTED_KEYS = [
  'theme', 'xp', 'level', 'streak', 'lastPracticeDate', 'activityDays',
  'totalPracticeSeconds', 'lessonScores', 'completedLessons',
  'unlockedTracks', 'unlockedLessons', 'completedTracks', 'certificateDates',
  'xpHistory', 'practiceLog', 'customPrompts', 'dailyChallenge', 'settings',
  'weeklyGoal', 'reflections', 'lastWarmupDate', 'onboardingComplete', 'favorites',
  'achievements', 'lastModified'
];

let saveTimer = null;
function saveState() {
  // Update modification timestamp on every save — used for cloud sync conflict resolution
  state.lastModified = new Date().toISOString();

  // Debounce saves to avoid hammering localStorage
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const toSave = {};
      PERSISTED_KEYS.forEach(k => {
        if (state[k] !== undefined) toSave[k] = state[k];
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch (e) {
      console.warn('Failed to save state:', e);
    }
    // Also push to cloud if signed in (fire and forget)
    if (typeof syncPushToCloud === 'function') {
      syncPushToCloud();
    }
  }, 250);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    PERSISTED_KEYS.forEach(k => {
      if (data[k] !== undefined) {
        // Merge settings object with defaults so newly added settings don't break
        if (k === 'settings' && typeof data[k] === 'object') {
          state.settings = Object.assign({}, state.settings, data[k]);
        } else {
          state[k] = data[k];
        }
      }
    });
    return true;
  } catch (e) {
    console.warn('Failed to load state:', e);
    return false;
  }
}

function resetProgress() {
  if (!confirm('This will permanently delete ALL your progress — XP, streaks, lesson scores, custom prompts, and practice history. Are you sure?')) {
    return;
  }
  localStorage.removeItem(STORAGE_KEY);
  // Reset in-memory state to defaults
  state.xp = 0;
  state.level = 'Hesitant Talker';
  state.streak = 0;
  state.lastPracticeDate = null;
  state.activityDays = [];
  state.totalPracticeSeconds = 0;
  state.lessonScores = {};
  state.completedLessons = {};
  state.unlockedTracks = { 1: true };
  state.unlockedLessons = { "1-1": true };
  state.completedTracks = {};
  state.certificateDates = {};
  state.xpHistory = [];
  state.practiceLog = [];
  state.customPrompts = {};
  state.dailyChallenge = null;
  showToast('Progress reset successfully');
  navigate('dashboard');
}

// Auto-save wrapper: call this after any state mutation that should persist
function persistAfter(fn) {
  return function(...args) {
    const result = fn.apply(this, args);
    saveState();
    return result;
  };
}

function init() {
  // Load saved progress from localStorage (if any)
  const hadSavedState = loadState();

  // Ensure the starting unlocks are always in place even on a fresh load
  if (!state.unlockedLessons["1-1"]) state.unlockedLessons["1-1"] = true;
  if (!state.unlockedTracks[1]) state.unlockedTracks[1] = true;

  // First-run only: respect system dark-mode preference, store in settings
  if (!hadSavedState) {
    if (state.settings) state.settings.theme = 'auto';
  }

  // Apply the active theme (honors settings.theme: 'light'|'dark'|'auto')
  applyTheme();

  // Handle initial route
  handleRoute();

  // Auto-start the onboarding tour on first run (no saved state AND no onboarding flag)
  if (!state.onboardingComplete) {
    // Delay slightly so the dashboard has time to render
    setTimeout(() => startOnboarding(), 400);
  }

  // Initialize cloud sync if configured (async, doesn't block init)
  if (isCloudConfigured()) {
    initSupabase().then(() => {
      updateAuthIndicator();
    });
  } else {
    updateAuthIndicator();
  }

  // Schedule the next practice reminder if enabled
  scheduleNextReminder();
}

// ========== TOUCH GESTURES (Stage 3.5) ==========
// Two gestures:
//   1. Swipe down on a modal overlay to dismiss it
//   2. Pull down at the top of the dashboard to sync (or reload) progress
// Only engages on touch devices — mouse users get no change.

function initTouchGestures() {
  let touchStartY = 0;
  let touchStartX = 0;
  let touchTargetOverlay = null;
  let pullToRefreshActive = false;
  let pullDistance = 0;
  const SWIPE_THRESHOLD = 80; // Pixels of vertical swipe before we dismiss

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;

    // Is the touch inside a modal overlay? If so, remember which one.
    touchTargetOverlay = null;
    const overlayClasses = ['.model-overlay', '.ai-mode-overlay', '.history-overlay', '.cloud-config-overlay', '.login-overlay', '.import-overlay'];
    for (const cls of overlayClasses) {
      const el = e.target.closest(cls);
      if (el) { touchTargetOverlay = el; break; }
    }

    // Only activate pull-to-refresh at the very top of the dashboard
    pullToRefreshActive = false;
    pullDistance = 0;
    if (state.currentView === 'dashboard' && window.scrollY === 0 && !touchTargetOverlay) {
      pullToRefreshActive = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1 || !pullToRefreshActive) return;
    const currentY = e.touches[0].clientY;
    const deltaY = currentY - touchStartY;
    if (deltaY > 0) {
      pullDistance = deltaY;
      showPullIndicator(Math.min(1, deltaY / 100));
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    // Use changedTouches for touchend (touches is empty at that point)
    const touch = e.changedTouches && e.changedTouches[0];
    if (!touch) return;
    const endY = touch.clientY;
    const endX = touch.clientX;
    const deltaY = endY - touchStartY;
    const deltaX = endX - touchStartX;

    // Swipe down on overlay → dismiss (only if vertical movement dominates)
    if (touchTargetOverlay && deltaY > SWIPE_THRESHOLD && Math.abs(deltaY) > Math.abs(deltaX) * 2) {
      // Don't dismiss if the user is scrolling inside a scrollable child
      const scrollableChild = touchTargetOverlay.querySelector('.modal-card, .model-card, .ai-mode-card');
      const scrollTop = scrollableChild ? scrollableChild.scrollTop : 0;
      if (scrollTop === 0) {
        touchTargetOverlay.remove();
        haptic('tick');
      }
    }

    // Pull-to-refresh completion check
    if (pullToRefreshActive && pullDistance > 80) {
      triggerPullRefresh();
    }
    hidePullIndicator();
    pullToRefreshActive = false;
    pullDistance = 0;
    touchTargetOverlay = null;
  }, { passive: true });
}

function showPullIndicator(progress) {
  let indicator = document.getElementById('pull-refresh-indicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.id = 'pull-refresh-indicator';
    indicator.className = 'pull-refresh-indicator';
    indicator.innerHTML = '<i data-lucide="refresh-cw" style="width:16px;height:16px"></i><span>Pull to refresh</span>';
    document.body.appendChild(indicator);
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
  const translated = Math.min(60, progress * 60);
  indicator.style.transform = `translateX(-50%) translateY(${translated}px)`;
  indicator.style.opacity = String(progress);
  if (progress >= 1 && !indicator.classList.contains('ready')) {
    indicator.classList.add('ready');
    indicator.querySelector('span').textContent = 'Release to sync';
    haptic('tick');
  } else if (progress < 1 && indicator.classList.contains('ready')) {
    indicator.classList.remove('ready');
    indicator.querySelector('span').textContent = 'Pull to refresh';
  }
}

function hidePullIndicator() {
  const indicator = document.getElementById('pull-refresh-indicator');
  if (indicator) indicator.remove();
}

async function triggerPullRefresh() {
  haptic('pass');
  showToast('Syncing…');
  // If cloud sync is configured and logged in, pull latest state
  if (typeof syncPullFromCloud === 'function' && currentUser) {
    try {
      await syncPullFromCloud();
    } catch (e) {}
  }
  // Re-render the dashboard
  if (typeof renderDashboard === 'function') renderDashboard();
}

// Wait for Lucide to load, then init
document.addEventListener('DOMContentLoaded', () => {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
  init();
  // Service worker registration happens after init so it doesn't block first paint
  registerServiceWorker();
  // Touch gestures for swipe-to-dismiss and pull-to-refresh
  initTouchGestures();
});

function pickFocusSkill(skillKey) {
  playClick();
  // Pick a random unlocked lesson
  const allLessons = [];
  for (const track of TRACKS) {
    if (!isTrackUnlocked(track.id)) continue;
    for (let i = 0; i < track.lessons.length; i++) {
      const l = track.lessons[i];
      if (isLessonUnlocked(l.id)) allLessons.push({ track, lesson: l, index: i });
    }
  }
  if (allLessons.length === 0) {
    showToast('No lessons available — start the curriculum first.');
    return;
  }
  const pick = allLessons[Math.floor(Math.random() * allLessons.length)];
  const prompt = pickRandomPrompt(pick.lesson);

  _focusSession = {
    skill: skillKey,
    lesson: pick.lesson,
    trackId: pick.track.id,
    lessonIndex: pick.index,
    prompt,
    startTime: Date.now()
  };
  state.currentPrompt = prompt;
  renderFocusPractice();
}

    const timerEl = document.getElementById('practice-timer');
    if (display) {
      display.textContent = formatTime(state.timerSeconds);
      const ratio = state.timerSeconds / effectiveLimit;
      timerEl.className = 'timer' + (ratio > 1.3 ? ' danger' : ratio > 1 ? ' warning' : '');
    }
  }, 1000);
}

function submitFocusPractice() {
  clearInterval(state.timerInterval);
  stopSpeechRecognition();
  stopAudioRecording();
  state.totalPracticeSeconds += state.timerSeconds;

  const input = document.getElementById('practice-input');
  state.practiceText = input ? input.value : '';

  const sess = _focusSession;
  if (!sess) return;
  const score = autoScoreResponse(state.practiceText, sess.lesson, state.timerSeconds, state.inputMode);
  sess.score = score;
  state.lastScore = score;

  // Log to practice history
  state.practiceLog.push({
    lessonId: sess.lesson.id,
    lessonTitle: sess.lesson.title,
    lessonSubtitle: sess.lesson.subtitle || '',
    trackId: sess.trackId,
    lessonIndex: sess.lessonIndex,
    prompt: sess.prompt.text,
    response: state.practiceText || '',
    score: score.total,
    structure: score.structure,
    clarity: score.clarity,
    depth: score.depth,
    completion: score.completion,
    signals: (score.signals || []).slice(0, 8),
    wpm: score.wpm || 0,
    inputMode: score.inputMode || state.inputMode || 'typing',
    timeSpent: state.timerSeconds || 0,
    mode: 'focus',
    focusSkill: sess.skill,
    date: new Date().toISOString()
  });
  if (state.practiceLog.length > 200) state.practiceLog.shift();
  saveState();

  renderFocusScore();
}

function renderFocusScore() {
  const container = document.getElementById('focus-content');
  const sess = _focusSession;
  if (!container || !sess || !sess.score) return;
  const skill = FOCUS_SKILLS[sess.skill];
  const s = sess.score;
  const focusScore = s[sess.skill]; // structure | clarity | depth
  const focusPct = Math.round((focusScore / skill.maxCat) * 100);
  const passMark = (state.settings && state.settings.passMark) || 70;
  const passed = focusPct >= passMark;

  // Sound + haptic
  if (passed) {
    if (state.settings && state.settings.soundEffects) playPass();
    haptic('pass');
    if (state.settings && state.settings.confettiEnabled && typeof confetti === 'function') {
      confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
    }
  } else {
    if (state.settings && state.settings.soundEffects) playFail();
    haptic('fail');
  }

  // Signals scoped to the focused skill only
  const skillSignals = (s.signals || []).filter(sig => sig.category === sess.skill);

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function renderSignal(sig) {
    const icon = sig.type === 'hit' ? 'check' : sig.type === 'partial' ? 'minus' : 'x';
    return `
      <div class="signal ${sig.type}">
        <div class="signal-icon"><i data-lucide="${icon}" style="width:10px;height:10px"></i></div>
        <div class="signal-body">
          <div class="signal-text">${escapeHtml(sig.msg)}</div>
          ${sig.quote ? `<div class="signal-quote">"${escapeHtml(sig.quote)}"</div>` : ''}
          ${sig.suggestion ? `<div class="signal-suggestion"><strong>Try:</strong> ${escapeHtml(sig.suggestion)}</div>` : ''}
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="mode-header">
      <button class="lesson-back" onclick="endFocusChallenge()" aria-label="Back">
        <i data-lucide="arrow-left" style="width:18px;height:18px"></i>
      </button>
      <div>
        <h2>Focus Result</h2>
        <p class="ai-mode-subtitle">${skill.label} · ${sess.lesson.title}</p>
      </div>
    </div>

    <div class="focus-score-hero" style="border-color:var(--${skill.color})">
      <div class="focus-score-label">${skill.label} score</div>
      <div class="focus-score-value" style="color:var(--${skill.color})">
        ${focusScore}<span style="font-size:0.4em;color:var(--text-muted)">/${skill.maxCat}</span>
      </div>
      <div class="focus-score-pct">${focusPct}%</div>
      <div class="focus-score-tier ${passed ? 'pass' : 'fail'}">
        ${passed ? '✓ Strong ' + skill.label : 'Keep working on ' + skill.label}
      </div>
    </div>

    <div class="focus-secondary-grid">
      ${Object.entries(FOCUS_SKILLS).filter(([k]) => k !== sess.skill).map(([k, sk]) => {
        const val = s[k];
        const pct = Math.round((val / sk.maxCat) * 100);
        return `
          <div class="focus-secondary-card">
            <div class="focus-secondary-label">${sk.label} (context)</div>
            <div class="focus-secondary-value">${val}/${sk.maxCat} · ${pct}%</div>
          </div>
        `;
      }).join('')}
    </div>

    ${skillSignals.length > 0 ? `
      <div class="score-signals">
        <div class="score-signals-title">${skill.label} feedback</div>
        <div class="signal-category">
          <div class="signal-list">
            ${skillSignals.map(renderSignal).join('')}
          </div>
        </div>
      </div>
    ` : '<p style="color:var(--text-muted);text-align:center;margin:1rem 0;font-size:0.9rem">No specific ' + skill.label.toLowerCase() + ' signals on this attempt.</p>'}

    <div style="display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="endFocusChallenge()">
        <i data-lucide="home" style="width:14px;height:14px"></i> Home
      </button>
      <button class="btn btn-secondary" onclick="pickFocusSkill('${sess.skill}')">
        <i data-lucide="refresh-cw" style="width:14px;height:14px"></i> Another ${skill.label}
      </button>
      <button class="btn btn-primary" onclick="renderFocusEntry()">
        Switch skill <i data-lucide="arrow-right" style="width:14px;height:14px"></i>
      </button>
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function endFocusChallenge() {
  clearInterval(state.timerInterval);
  stopSpeechRecognition();
  stopAudioRecording();
  _focusSession = null;
  navigate('dashboard');
}

// ========== STAGE 4A: SPEED TIER MODE ==========
// Same prompt, shrinking timer across 3 tiers (100% / 75% / 50% of base).
// User must meet passMark at each tier to advance. All 3 passed = Speed Master.

let _speedTierSession = null;
const SPEED_TIER_MULTIPLIERS = [1.0, 0.75, 0.5];

function renderSpeedTierEntry() {
  const container = document.getElementById('speed-tier-content');

      if (isLessonUnlocked(l.id)) lessons.push({ track, lesson: l, index: i });
    }

  if (lessons.length === 0) {
    container.innerHTML = `
      <div class="mode-header">
        <button class="lesson-back" onclick="navigate('dashboard')" aria-label="Back">

function beginSpeedTier(trackId, lessonIndex) {
  playClick();
  const lesson = getLessonData(trackId, lessonIndex);
  if (!lesson) return;
  const prompt = pickRandomPrompt(lesson);
  _speedTierSession = {
    trackId,
    lessonIndex,
    lesson,
    prompt,
    currentTier: 1,

}

function submitSpeedTierRound() {
  clearInterval(state.timerInterval);
  stopSpeechRecognition();
  stopAudioRecording();
  state.totalPracticeSeconds += state.timerSeconds;

  const input = document.getElementById('practice-input');
  state.practiceText = input ? input.value : '';

  const sess = _speedTierSession;

  const score = autoScoreResponse(state.practiceText, sess.lesson, state.timerSeconds, state.inputMode);
  const passMark = (state.settings && state.settings.passMark) || 70;
  const passed = score.total >= passMark;

  sess.results.push({
    tier: sess.currentTier,
    score,
    passed,
    timeSpent: state.timerSeconds,
    timeLimit: sess.currentTierLimit
  });

  state.practiceLog.push({
    lessonId: sess.lesson.id,
    lessonTitle: sess.lesson.title,
    lessonSubtitle: sess.lesson.subtitle || '',
    trackId: sess.trackId,
    lessonIndex: sess.lessonIndex,
    prompt: sess.prompt.text,
    response: state.practiceText || '',
    score: score.total,
    structure: score.structure,
    clarity: score.clarity,
    depth: score.depth,
    completion: score.completion,
    signals: (score.signals || []).slice(0, 8),
    wpm: score.wpm || 0,
    inputMode: score.inputMode || state.inputMode || 'typing',
    timeSpent: state.timerSeconds || 0,
    mode: 'speed-tier',
    tier: sess.currentTier,
    date: new Date().toISOString()
  });
  if (state.practiceLog.length > 200) state.practiceLog.shift();
  saveState();

  renderSpeedTierRoundResult();
}

function renderSpeedTierRoundResult() {
  const container = document.getElementById('speed-tier-content');
  const sess = _speedTierSession;
  if (!container || !sess || sess.results.length === 0) return;
  const latest = sess.results[sess.results.length - 1];
  const passMark = (state.settings && state.settings.passMark) || 70;
  const isFinalTier = sess.currentTier === 3;

  if (latest.passed) {
    if (state.settings && state.settings.soundEffects) playPass();
    haptic('pass');
  } else {
    if (state.settings && state.settings.soundEffects) playFail();

  const nextActionHTML = latest.passed
    ? (isFinalTier
        ? `<button class="btn btn-primary btn-lg" onclick="renderSpeedTierSummary()">

    : `

    </div>
    <div class="focus-secondary-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="focus-secondary-card" style="opacity:1">
        <div class="focus-secondary-label">Structure</div>

      <div class="focus-secondary-card" style="opacity:1">

      ${nextActionHTML}
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function advanceSpeedTier() {
  playClick();
  _speedTierSession.currentTier++;
  renderSpeedTierRound();
}

function retrySpeedTier() {
  playClick();
  // Remove the failed latest attempt so progress dots reset; retry same tier
  const sess = _speedTierSession;
  if (sess && sess.results.length > 0) {
    sess.results.pop();
  }
  renderSpeedTierRound();
}

function renderSpeedTierSummary() {
  const container = document.getElementById('speed-tier-content');

        <div>
          <div style="font-weight:700;font-size:1.1rem">Speed Master</div>

        return `
          <div class="speed-tier-summary-row ${latest.passed ? 'passed' : 'failed'}">
            <span class="tier-pill tier-${t}">Tier ${t}</span>
            <span>${Math.round(mult * 100)}% time</span>
            <span class="tier-status">${latest.passed ? '✓' : '✗'} ${latest.score.total}/100</span>
          </div>
        `;
      }).join('')}
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="endSpeedTier()">
        <i data-lucide="home" style="width:14px;height:14px"></i> Home
      </button>
      <button class="btn btn-primary" onclick="renderSpeedTierEntry()">
        Another lesson <i data-lucide="arrow-right" style="width:14px;height:14px"></i>
      </button>
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function endSpeedTier() {
  clearInterval(state.timerInterval);

  stopAudioRecording();
  _speedTierSession = null;

}

// ========== AI INTERACTIVE MODES (Stage 3) ==========
// Four modes powered by /.netlify/functions/ai-chat:
//   - Model Answer Generator
//   - Conversation Mode (adaptive follow-up Q&A)
//   - Devil's Advocate Mode (counter-arguments with adjustable intensity)
//   - Audience Simulator (3-round: same prompt, different audiences)

const AI_CHAT_ENDPOINT = '/.netlify/functions/ai-chat';

// Shared helper — POST to the Netlify function and return parsed JSON.
async function callAIChat(payload) {
  if (!location.protocol.startsWith('http')) {
    throw new Error('AI features require the deployed app (not file://).');
  }
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 45000);
  try {
    const res = await fetch(AI_CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!res.ok) {
      let errMsg = `Request failed (${res.status})`;
      try {
        const body = await res.json();
        if (body?.error) errMsg = body.error + (body.detail ? ' — ' + body.detail : '');
      } catch (e) {}
      // Specific, actionable message for the most common deploy issue
      if (res.status === 404) {
        errMsg = 'The AI endpoint was not found (404). Make sure netlify/functions/ai-chat.js is deployed to your Netlify site, then try again.';
      } else if (res.status === 500 && errMsg.toLowerCase().includes('openrouter')) {
        errMsg = 'Server is missing OPENROUTER_API_KEY. Add it to your Netlify environment variables and redeploy.';
      }
      throw new Error(errMsg);
    }
    return await res.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('AI request timed out (45s).');
    throw e;
  }
}

// ---------- SHARED SPEECH-TO-TEXT FOR AI MODE INPUTS ----------
// A reusable helper that lets ANY textarea inside an AI mode overlay accept
// spoken input via the mic button next to it. Each active session gets its own
// SpeechRecognition instance so it doesn't interfere with the main practice
// session's recognition.
const _aiSpeechSessions = new Map(); // textareaId -> { recognition, baseText, isRecording }

function toggleAISpeech(textareaId, btnEl) {
  const session = _aiSpeechSessions.get(textareaId);
  if (session && session.isRecording) {
    stopAISpeech(textareaId);
  } else {
    startAISpeech(textareaId, btnEl);
  }
}

function startAISpeech(textareaId, btnEl) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Speech recognition not supported on this browser.');
    return;
  }
  const textarea = document.getElementById(textareaId);
  if (!textarea) return;

  // Fail fast on insecure contexts — getUserMedia (which speech uses under the hood)
  // requires HTTPS on mobile browsers.
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    showToast('Microphone requires HTTPS. Open the deployed site, not file://.');
    return;
  }

  const recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  // Capture whatever the user has already typed so the transcript appends rather than replaces.
  const baseText = textarea.value ? textarea.value.trim() + ' ' : '';

  const session = { recognition, baseText, isRecording: true, finalTranscript: '' };
  _aiSpeechSessions.set(textareaId, session);

  // Visual feedback
  if (btnEl) {
    btnEl.classList.add('recording');
    btnEl.setAttribute('aria-label', 'Stop recording');
  }

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        session.finalTranscript += (session.finalTranscript.length > 0 ? ' ' : '') + transcript.trim();
      } else {
        interim = transcript;
      }
    }
    textarea.value = (baseText + session.finalTranscript + (interim ? ' ' + interim : '')).trim();
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      showToast('Microphone access denied. Enable it in your browser settings.');
    } else if (event.error !== 'aborted' && event.error !== 'no-speech') {
      showToast('Speech error: ' + event.error);
    }
    stopAISpeech(textareaId);
  };

  recognition.onend = () => {
    // Auto-restart while still recording (browsers stop recognition after silences)
    const cur = _aiSpeechSessions.get(textareaId);
    if (cur && cur.isRecording) {
      try { recognition.start(); } catch (e) { stopAISpeech(textareaId); }
    }
  };

  try {
    recognition.start();
  } catch (e) {
    showToast('Could not start microphone: ' + e.message);
    stopAISpeech(textareaId);
  }
}

function stopAISpeech(textareaId) {
  const session = _aiSpeechSessions.get(textareaId);
  if (!session) return;
  session.isRecording = false;
  try { session.recognition.stop(); } catch (e) {}
  _aiSpeechSessions.delete(textareaId);

  // Reset button visual state — find by data-target attribute
  const btnEl = document.querySelector(`.ai-mic-btn[data-target="${textareaId}"]`);
  if (btnEl) {
    btnEl.classList.remove('recording');
    btnEl.setAttribute('aria-label', 'Speak your response');
  }
}

// Utility to stop ALL active AI speech sessions — used when closing overlays
function stopAllAISpeech() {
  Array.from(_aiSpeechSessions.keys()).forEach(stopAISpeech);
}

// Returns the HTML snippet for a mic button next to an AI textarea.
// Data-target is used by stopAISpeech to find and reset the button after recognition ends.
function renderAIMicButton(textareaId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return ''; // No mic button if the browser doesn't support it
  return `
    <button type="button" class="ai-mic-btn" data-target="${textareaId}"
      onclick="toggleAISpeech('${textareaId}', this)" aria-label="Speak your response" title="Tap to speak — tap again to stop">
      <i data-lucide="mic" style="width:16px;height:16px"></i>
    </button>
  `;
}

// Shared helper — render a persistent error banner inside an AI mode overlay.
// Unlike showToast, this sticks around so the user can read and act on it.
function renderAIModeError(logElementId, message) {
  const log = document.getElementById(logElementId);
  if (!log) return;
  // Remove any previous error
  const existing = log.querySelector('.ai-mode-error');
  if (existing) existing.remove();
  const errDiv = document.createElement('div');
  errDiv.className = 'ai-mode-error';
  errDiv.innerHTML = `
    <i data-lucide="alert-triangle" style="width:14px;height:14px"></i>
    <div>
      <strong>AI call failed</strong>
      <div class="ai-mode-error-msg">${escapeHtmlSafe(message)}</div>
    </div>
  `;
  log.appendChild(errDiv);
  if (typeof lucide !== 'undefined') lucide.createIcons();
  log.scrollTop = log.scrollHeight;
}

// ---------- MODEL ANSWER GENERATOR ----------
// Generates a fresh model answer for any prompt + framework, including user-created custom prompts.
async function generateModelAnswerWithAI(btn) {
  const lesson = state.currentLesson?.lesson;
  const prompt = state.currentPrompt;
  if (!lesson || !prompt) return;

  const originalHTML = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" style="width:14px;height:14px"></i> Generating…';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  try {
    const result = await callAIChat({
      mode: 'generate-model-answer',
      prompt: prompt.text,
      lessonTitle: lesson.title,
      framework: lesson.elements.map(e => e.name),
      elementDescriptions: lesson.elements.map(e => ({ name: e.name, description: e.desc || '' })),
      expertTip: lesson.expertTip || ''
    });

    // Attach generated response to the current prompt so showModelAnswer renders it
    if (result.response && Array.isArray(result.response)) {
      // Map colors back to the lesson's element colors for visual consistency
      prompt.modelResponse = result.response.map((part, i) => ({
        ...part,
        color: lesson.elements[i]?.color || part.color || 'teal'
      }));
      prompt._aiGenerated = true;
      prompt._aiExpertNote = result.expertNote || '';
      showToast('Model answer generated');
      // Close and re-open the model answer view to show the new content
      const existing = document.querySelector('.model-overlay');
      if (existing) existing.remove();
      showModelAnswer();
    } else {
      showToast('AI returned unexpected format');
    }
  } catch (e) {
    showToast(e.message || 'Model answer generation failed');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
}

// ---------- CONVERSATION MODE ----------
let _conversationSession = null;

function startConversationMode() {
  const lesson = state.currentLesson?.lesson;
  const prompt = state.currentPrompt;
  const response = state.practiceText;
  if (!lesson || !prompt || !response) {
    showToast('Complete a practice attempt first to start a conversation.');
    return;
  }

  _conversationSession = {
    mode: 'conversation',
    lesson,
    originalPrompt: prompt.text,
    turns: [{ speaker: 'user', text: response }],
    turnCount: 1,
    inFlight: false
  };

  openConversationOverlay();
  // Automatically request the first AI follow-up
  requestNextConversationTurn();
}

function openConversationOverlay() {
  const existing = document.querySelector('.ai-mode-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay ai-mode-overlay';
  overlay.innerHTML = `
    <div class="modal-card ai-mode-card">
      <button class="modal-close" onclick="endConversationMode()">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
      <div class="ai-mode-header">
        <div class="ai-mode-icon conversation"><i data-lucide="message-circle" style="width:20px;height:20px"></i></div>
        <div>
          <h2>Conversation Mode</h2>
          <p class="ai-mode-subtitle">The AI plays an adaptive role based on your lesson. Stay in the flow.</p>
        </div>
      </div>
      <div class="ai-conversation-log" id="ai-conversation-log"></div>
      <div class="ai-mode-input-row">
        <div class="ai-mode-input-wrap">
          <textarea id="ai-mode-input" class="ai-mode-textarea" placeholder="Your response… (or tap the mic to speak)" rows="3"></textarea>
          ${renderAIMicButton('ai-mode-input')}
        </div>
        <button class="btn btn-primary" id="ai-mode-submit" onclick="submitConversationTurn()">
          <i data-lucide="send" style="width:14px;height:14px"></i> Send
        </button>
      </div>
      <div class="ai-mode-footer">
        <button class="btn btn-ghost" onclick="endConversationMode()">End Conversation</button>
        <span class="ai-mode-turn-count" id="ai-mode-turn-count">Turn 1</span>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  if (typeof lucide !== 'undefined') lucide.createIcons();

  renderConversationLog();
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) endConversationMode();
  });
}

function renderConversationLog() {
  const log = document.getElementById('ai-conversation-log');
  if (!log || !_conversationSession) return;
  const turns = _conversationSession.turns;
  log.innerHTML = `
    <div class="ai-turn ai-turn-prompt">
      <div class="ai-turn-label">Original Prompt</div>
      <div class="ai-turn-body">"${escapeHtmlSafe(_conversationSession.originalPrompt)}"</div>
    </div>
  ` + turns.map(t => `
    <div class="ai-turn ai-turn-${t.speaker}">
      <div class="ai-turn-label">${t.speaker === 'user' ? 'You' : 'AI Coach'}</div>
      <div class="ai-turn-body">${t.ack ? `<em class="ai-turn-ack">${escapeHtmlSafe(t.ack)}</em><br><br>` : ''}${escapeHtmlSafe(t.text)}</div>
    </div>
  `).join('');

  // Scroll the latest turn into view
  log.scrollTop = log.scrollHeight;

  document.getElementById('ai-mode-turn-count').textContent = `Turn ${_conversationSession.turnCount}`;
}

async function requestNextConversationTurn() {
  const sess = _conversationSession;
  if (!sess || sess.inFlight) return;
  sess.inFlight = true;

  // Show thinking indicator
  const log = document.getElementById('ai-conversation-log');
  if (log) {
    const typing = document.createElement('div');
    typing.className = 'ai-turn ai-turn-ai ai-typing';
    typing.id = 'ai-typing-indicator';
    typing.innerHTML = '<div class="ai-turn-label">AI Coach</div><div class="ai-turn-body"><span class="ai-dots"><span></span><span></span><span></span></span></div>';
    log.appendChild(typing);
    log.scrollTop = log.scrollHeight;
  }

  try {
    const lastUser = [...sess.turns].reverse().find(t => t.speaker === 'user');
    const result = await callAIChat({
      mode: 'conversation-turn',
      prompt: sess.originalPrompt,
      response: lastUser ? lastUser.text : '',
      lessonTitle: sess.lesson.title,
      framework: sess.lesson.elements.map(e => e.name),
      conversationHistory: sess.turns.map(t => ({ speaker: t.speaker === 'user' ? 'User' : 'AI', text: t.text }))
    });

    // Remove typing indicator
    const indicator = document.getElementById('ai-typing-indicator');
    if (indicator) indicator.remove();

    sess.turns.push({ speaker: 'ai', text: result.question || '(no question returned)', ack: result.acknowledgment || '' });
    sess.turnCount++;
    renderConversationLog();
    // Focus the input for the user's next reply
    const input = document.getElementById('ai-mode-input');
    if (input) input.focus();
  } catch (e) {
    const indicator = document.getElementById('ai-typing-indicator');
    if (indicator) indicator.remove();
    renderAIModeError('ai-conversation-log', e.message);
    showToast('AI call failed — see details in the conversation');
    // If this was the first attempt and the user has no AI turn yet,
    // pop the user's last message back into the input box so they don't lose it
    if (sess.turns.length === 1 && sess.turns[0].speaker === 'user') {
      const input = document.getElementById('ai-mode-input');
      if (input && !input.value) input.value = sess.turns[0].text;
    }
  } finally {
    sess.inFlight = false;
  }
}

async function submitConversationTurn() {
  const sess = _conversationSession;
  if (!sess || sess.inFlight) return;
  const input = document.getElementById('ai-mode-input');
  const text = input ? input.value.trim() : '';
  if (!text || text.length < 5) {
    showToast('Type a response first');
    return;
  }
  sess.turns.push({ speaker: 'user', text });
  input.value = '';
  renderConversationLog();
  await requestNextConversationTurn();
}

function endConversationMode() {
  stopAllAISpeech();
  _conversationSession = null;
  const overlay = document.querySelector('.ai-mode-overlay');
  if (overlay) overlay.remove();
}

    </div>

async function requestDevilsAdvocateAttack() {
  const sess = _devilsAdvocateSession;
  if (!sess || sess.inFlight) return;
  sess.inFlight = true;

  // Track whether this is the first attack (only the first-attack button is hidden).
  const btn = document.getElementById('attack-first-btn');
  const hadFirstBtn = !!btn;
  if (btn) btn.style.display = 'none';

  const log = document.getElementById('ai-conversation-log');
  if (log) {
    // Clear any previous inline error before a retry
    const oldErr = log.querySelector('.ai-mode-error');
    if (oldErr) oldErr.remove();

    const typing = document.createElement('div');
    typing.className = 'ai-turn ai-turn-devils ai-typing';
    typing.id = 'ai-typing-indicator';
    typing.innerHTML = '<div class="ai-turn-label">⚔️ Devil\'s Advocate</div><div class="ai-turn-body"><span class="ai-dots"><span></span><span></span><span></span></span></div>';
    log.appendChild(typing);
    log.scrollTop = log.scrollHeight;
  }

  try {
    const lastUser = [...sess.turns].reverse().find(t => t.speaker === 'user');
    const result = await callAIChat({
      mode: 'devils-advocate-turn',
      prompt: sess.originalPrompt,
      response: lastUser ? lastUser.text : '',
      lessonTitle: sess.lesson.title,
      intensity: sess.intensity,
      conversationHistory: sess.turns.map(t => ({ speaker: t.speaker === 'user' ? 'User' : 'Opponent', text: t.text }))
    });

    const indicator = document.getElementById('ai-typing-indicator');
    if (indicator) indicator.remove();

    sess.turns.push({ speaker: 'devils', text: result.counterArgument || '(no counter-argument)', weakPoint: result.weakPointAttacked || '' });
    sess.turnCount++;
    renderDevilsAdvocateLog();
    const input = document.getElementById('ai-mode-input');
    if (input) input.focus();
  } catch (e) {
    const indicator = document.getElementById('ai-typing-indicator');
    if (indicator) indicator.remove();
    renderAIModeError('ai-conversation-log', e.message);
    showToast('AI call failed — see details in the debate log');
    // Restore the first-attack button so the user can retry after fixing the deploy.
    // If the user has already had one successful AI turn, hadFirstBtn will be false
    // and the user can just click "Defend" again to retry.
    if (hadFirstBtn) {
      const btn2 = document.getElementById('attack-first-btn');
      if (btn2) btn2.style.display = '';
    }
  } finally {
    sess.inFlight = false;
  }
}

async function submitDevilsAdvocateTurn() {
  const sess = _devilsAdvocateSession;
  if (!sess || sess.inFlight) return;
  const input = document.getElementById('ai-mode-input');
  const text = input ? input.value.trim() : '';

    showToast('Type a defense first');
    return;
  }
  sess.turns.push({ speaker: 'user', text });
  input.value = '';
  renderDevilsAdvocateLog();
  await requestDevilsAdvocateAttack();
}

function endDevilsAdvocateMode() {
  stopAllAISpeech();
  _devilsAdvocateSession = null;
  const overlay = document.querySelector('.ai-mode-overlay');
  if (overlay) overlay.remove();
}

  overlay.className = 'modal-overlay ai-mode-overlay';
  overlay.innerHTML = `
    <div class="modal-card ai-mode-card audience-card">
      <button class="modal-close" onclick="endAudienceSimulator()">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
      <div class="ai-mode-header">
        <div class="ai-mode-icon audience"><i data-lucide="users" style="width:20px;height:20px"></i></div>
        <div>
          <h2>Audience Simulator</h2>
          <p class="ai-mode-subtitle">Same prompt, three different audiences. Adapt each response.</p>
        </div>
      </div>
      <div id="audience-content"></div>
    </div>
  `;
  document.body.appendChild(overlay);
  if (typeof lucide !== 'undefined') lucide.createIcons();
  renderAudienceRound();
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) endAudienceSimulator();
  });
}

function renderAudienceRound() {
  const sess = _audienceSession;
  if (!sess) return;
  const container = document.getElementById('audience-content');
  if (!container) return;

  // If past the last round, show summary
  if (sess.round >= 3) {
    renderAudienceSummary();
    return;
  }

  const audience = sess.audiences[sess.round];
  const isFirstRound = sess.round === 0;

  container.innerHTML = `
    <div class="audience-progress">
      ${[0,1,2].map(i => `<div class="audience-dot ${i < sess.round ? 'done' : i === sess.round ? 'active' : ''}">${i + 1}</div>`).join('')}
    </div>

    <div class="audience-persona-card">
      <div class="audience-persona-label">Round ${sess.round + 1} audience</div>
      <h3 class="audience-persona-title">${escapeHtmlSafe(audience.label)}</h3>
      <p class="audience-persona-desc">${escapeHtmlSafe(audience.description)}</p>
      <div class="audience-persona-details">
        <div><strong>They value:</strong> ${escapeHtmlSafe(audience.priorities)}</div>
        <div><strong>Watch out for:</strong> ${escapeHtmlSafe(audience.redFlags)}</div>
      </div>
    </div>

    <div class="audience-prompt-box">
      <div class="audience-prompt-label">The prompt (same every round)</div>
      <div class="audience-prompt-text">"${escapeHtmlSafe(sess.prompt)}"</div>
    </div>

    <label class="audience-response-label">Your response for <strong>${escapeHtmlSafe(audience.label)}</strong>:</label>
    <div class="ai-mode-input-wrap ai-mode-input-wrap-tall">
      <textarea id="audience-response-input" class="ai-mode-textarea" rows="6" placeholder="How would you say it to this audience? (or tap the mic to speak)">${escapeHtmlSafe(sess.responses[sess.round] || '')}</textarea>
      ${renderAIMicButton('audience-response-input')}
    </div>

    <div class="ai-mode-footer">
      ${isFirstRound ? `
        <button class="btn btn-ghost" onclick="useOriginalResponseForAudience()" title="Use the response you already submitted">
          <i data-lucide="copy" style="width:14px;height:14px"></i> Reuse my practice response
        </button>
      ` : '<span></span>'}
      <button class="btn btn-primary" onclick="submitAudienceRound()" id="audience-submit-btn">
        <i data-lucide="send" style="width:14px;height:14px"></i> Evaluate
      </button>
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function useOriginalResponseForAudience() {
  const input = document.getElementById('audience-response-input');
  if (input && _audienceSession) input.value = _audienceSession.originalResponse;
}

async function submitAudienceRound() {
  const sess = _audienceSession;
  if (!sess || sess.inFlight) return;
  const input = document.getElementById('audience-response-input');
  const text = input ? input.value.trim() : '';
  if (!text || text.length < 10) {
    showToast('Write a response for this audience first');
    return;
  }
  sess.responses[sess.round] = text;
  sess.inFlight = true;

  const submitBtn = document.getElementById('audience-submit-btn');
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i data-lucide="loader-2" style="width:14px;height:14px"></i> Evaluating…';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  try {
    const audience = sess.audiences[sess.round];
    const result = await callAIChat({
      mode: 'audience-round',
      prompt: sess.prompt,
      response: text,
      audience,
      lessonTitle: sess.lesson.title,
      framework: sess.lesson.elements.map(e => e.name)
    });

    sess.results.push({ audience, result, response: text });
    sess.round++;
    sess.inFlight = false;
    renderAudienceRound();
  } catch (e) {
    sess.inFlight = false;
    // Show a persistent inline error banner the user can actually read
    const container = document.getElementById('audience-content');
    if (container) {
      // Remove any previous error first
      const oldErr = container.querySelector('.ai-mode-error');
      if (oldErr) oldErr.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'ai-mode-error';
      errDiv.innerHTML = `
        <i data-lucide="alert-triangle" style="width:14px;height:14px"></i>
        <div>
          <strong>AI call failed</strong>
          <div class="ai-mode-error-msg">${escapeHtmlSafe(e.message)}</div>
        </div>
      `;
      container.insertBefore(errDiv, container.firstChild);
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    showToast('AI call failed — see details above');
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i data-lucide="send" style="width:14px;height:14px"></i> Evaluate';
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
}
